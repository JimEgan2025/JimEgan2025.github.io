<!DOCTYPE html>
<html>
<head>
    <title>AI Data Compiler</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; max-width: 700px; margin: auto; background: #f9f9f9; }
        textarea { width: 100%; height: 120px; margin-bottom: 10px; display: block; border: 1px solid #ccc; padding: 8px; }
        .segment { background: #fff; padding: 10px; margin-bottom: 10px; border-left: 5px solid #007bff; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; background: #007bff; color: white; }
        .del-btn { background: #dc3545; }
    </style>
</head>
<body>
    <h2>AI Data Compiler</h2>
    <input type="text" id="label" placeholder="Enter Label" style="width: 100%; padding: 8px; margin-bottom: 10px;">
    <textarea id="content" placeholder="Paste your data here..."></textarea>
    <button onclick="addSegment()">+ Add Segment</button>

    <h3>Segments</h3>
    <div id="segmentList"></div>

    <div class="controls">
        <button onclick="downloadFile()" style="background: #28a745;">Download .txt File</button>
    </div>

    <script>
        let segments = [];

        function render() {
            const list = document.getElementById('segmentList');
            list.innerHTML = "";
            segments.forEach((s, index) => {
                const div = document.createElement('div');
                div.className = 'segment';
                div.innerHTML = `<span><b>${s.label}</b></span> 
                                 <button class="del-btn" onclick="deleteSegment(${index})">Delete</button>`;
                list.appendChild(div);
            });
        }

        function addSegment() {
            const label = document.getElementById('label').value || "Unnamed Segment";
            const content = document.getElementById('content').value;
            if(!content) return alert("Please paste some content.");
            
            segments.push({label, content});
            document.getElementById('label').value = "";
            document.getElementById('content').value = "";
            render();
        }

        function deleteSegment(index) {
            segments.splice(index, 1);
            render();
        }

        function downloadFile() {
            if(segments.length === 0) return alert("No data to compile.");
            const final = segments.map(s => `[FILE: ${s.label}]\n${s.content}\n\n---\n`).join("\n");
            const blob = new Blob([final], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ai_compiled_data.txt';
            a.click();
        }
    </script>
</body>
</html>
