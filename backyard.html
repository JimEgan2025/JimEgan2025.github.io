<!DOCTYPE html>
<html>
<head>
<title>Vizcaya Weather Command v14</title>
<style>
body { font-family: Arial; background:#111; color:#eee; }
input, button { margin:5px; padding:5px; }
table { border-collapse: collapse; margin-top:10px; }
td, th { border:1px solid #444; padding:4px; text-align:center; }
.high { background:#5a0000; }
.elev { background:#663300; }
.low { background:#003366; }
</style>
</head>

<body>

<h2>Vizcaya Weather Command v14</h2>

Lat: <input id="lat" value="30.5871">
Lon: <input id="lon" value="-97.641"><br>

Surface Temp (F): <input id="t" value="75">
Dew Point (F): <input id="td" value="70">

<button onclick="run()">Run Model</button>

<pre id="summary"></pre>
<div id="table"></div>

<script>
async function run(){

let lat = document.getElementById("lat").value;
let lon = document.getElementById("lon").value;
let t0F = parseFloat(document.getElementById("t").value);
let td0F = parseFloat(document.getElementById("td").value);

let res = await fetch(
`https://api.open-meteo.com/v1/gfs?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,dew_point_2m,total_column_integrated_water_vapour,lifted_index,cape,convective_inhibition&timezone=auto&forecast_days=1`
);

let data = await res.json();

let html = "<table><tr><th>Time</th><th>T</th><th>Td</th><th>PWAT</th><th>CAPE</th><th>CIN</th><th>LI</th><th>Status</th></tr>";

let rows = [];

for(let i=0;i<data.hourly.time.length;i++){

let T = data.hourly.temperature_2m[i];
let Td = data.hourly.dew_point_2m[i];
let capeRaw = data.hourly.cape[i];
let cinRaw = Math.abs(data.hourly.convective_inhibition[i]);
let li = data.hourly.lifted_index[i];
let pwat = (data.hourly.total_column_integrated_water_vapour[i]/25.4).toFixed(2);

// === Excel-style CAPE adjustment ===
let capeAdj = Math.max(200,
capeRaw * (1 + ((t0F - (T*9/5+32)) * 0.22) + ((td0F - (Td*9/5+32)) * 0.12))
);

// CIN mild adjustment
let cinAdj = Math.max(0, cinRaw - 10);

// Status
let status = "Low";
let cls = "low";

if(capeAdj > 2500 && cinAdj < 50){ status="HIGH"; cls="high"; }
else if(capeAdj > 1500){ status="Elevated"; cls="elev"; }

// Time
let time = new Date(data.hourly.time[i]);
let hr = time.getHours();

rows.push({
hr, cape:capeAdj, cin:cinAdj, li, pwat, T, Td
});

html += `<tr class="${cls}">
<td>${hr}:00</td>
<td>${(T*9/5+32).toFixed(1)}</td>
<td>${(Td*9/5+32).toFixed(1)}</td>
<td>${pwat}</td>
<td>${capeAdj.toFixed(0)}</td>
<td>${cinAdj.toFixed(0)}</td>
<td>${li.toFixed(1)}</td>
<td>${status}</td>
</tr>`;
}

html += "</table>";
document.getElementById("table").innerHTML = html;

// === SMART SUMMARY ===

// Current hour
let now = new Date().getHours();
let current = rows.find(r => r.hr === now) || rows[0];

// Peak CAPE
let peak = rows.reduce((a,b)=> a.cape>b.cape?a:b);

// Lowest CIN
let lowCIN = rows.reduce((a,b)=> a.cin<b.cin?a:b);

// Most unstable (CAPE - CIN)
let danger = rows.reduce((a,b)=>
(a.cape - a.cin) > (b.cape - b.cin) ? a : b
);

document.getElementById("summary").innerText = `
MODEL SUMMARY (v14)

CURRENT CONDITIONS
Hour: ${current.hr}:00
CAPE: ${current.cape.toFixed(0)}
CIN: ${current.cin.toFixed(0)}

PEAK CAPE
Hour: ${peak.hr}:00
CAPE: ${peak.cape.toFixed(0)}

LOWEST CIN
Hour: ${lowCIN.hr}:00
CIN: ${lowCIN.cin.toFixed(0)}

MAX INSTABILITY WINDOW
Hour: ${danger.hr}:00
CAPE: ${danger.cape.toFixed(0)}
CIN: ${danger.cin.toFixed(0)}

INTERPRETATION:
Focus on MAX INSTABILITY + LOW CIN overlap.
`;
}
</script>

</body>
</html>
