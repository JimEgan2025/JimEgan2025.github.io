<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vizcaya Auto Forecast v8</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#05070a; color:#cbd5e1; font-family: monospace; }
.card { background:#0f172a; border:1px solid #334155; }
pre { white-space: pre-wrap; }
</style>
</head>

<body class="p-6">

<div class="max-w-5xl mx-auto">

<h1 class="text-xl font-black text-white">
VIZCAYA v8 — AUTO FORECAST NARRATIVE ENGINE
</h1>

<button onclick="run()" class="bg-red-600 px-4 py-2 rounded text-white font-bold mt-3">
GENERATE FULL WEATHER BRIEF
</button>

<div class="grid grid-cols-2 gap-4 mt-4">

<!-- INPUT -->
<div class="card p-4">
<h2 class="text-blue-400 font-bold">BACKYARD OBS</h2>

Temp:
<input id="tobs" class="w-full text-black p-1" value="58.7">

Dew:
<input id="dobs" class="w-full text-black p-1 mt-2" value="48.1">

PWAT:
<input id="pwat" class="w-full text-black p-1 mt-2" value="1.45">
</div>

<!-- STATUS -->
<div id="status" class="card p-4">
<h2 class="text-white font-bold">STATUS</h2>
<div class="text-slate-400">Ready</div>
</div>

</div>

<div id="out" class="mt-6"></div>

</div>

<script>

// -----------------------------
function getModel() {
  return {
    tempF: 80.8,
    dewF: 66.2,
    shear: 30
  };
}

// -----------------------------
function couplingIndex(m, o) {
  return Math.abs(m.tempF - o.tempF)
       + Math.abs(m.dewF - o.dewF);
}

// -----------------------------
function simulate(tempF, dewF) {

  const lcl = (tempF - dewF) * 125;

  let cape = 0;
  let cin = 0;
  let inFree = false;
  let lfc = null;

  for (let z = 0; z <= 12000; z += 100) {

    const env = tempF - (z * 0.0032);
    const parcel = tempF - (z * 0.0098);

    let b = parcel - env;

    if (!inFree && b < 0) cin += b;

    if (!inFree && b > 0 && z > lcl) {
      inFree = true;
      lfc = z;
    }

    if (inFree && b > 0) cape += b;
  }

  return {
    cape: cape * 100,
    cin: cin * 100,
    lcl,
    lfc
  };
}

// -----------------------------
function stormType(cape, shear, pwat) {

  if (pwat < 1.0) return "DRY / NO CONVECTION";
  if (cape < 50) return "STABLE ATMOSPHERE";
  if (shear < 20) return "PULSE STORMS";
  if (shear < 35) return "MULTICELL STORMS";
  return "ORGANIZED / SUPERCELL POTENTIAL";
}

// -----------------------------
function narrative(packet, storm) {

  let intro = "";
  let risk = "";

  if (packet.derived.couplingClass === "HIGH") {
    intro = "A significant atmospheric decoupling is present today. Model instability exists aloft, but surface conditions are not well coupled to that environment.";
  } else {
    intro = "The surface and modeled atmosphere are reasonably aligned, allowing convective interpretation where instability exists.";
  }

  if (packet.derived.cape === 0) {
    risk = "No convective development is expected due to strong inhibition and a stable boundary layer.";
  } else {
    risk = "Convective development is conditionally possible depending on boundary layer recovery and forcing.";
  }

  return { intro, risk };
}

// -----------------------------
function run() {

  const model = getModel();

  const obs = {
    tempF: parseFloat(document.getElementById("tobs").value),
    dewF: parseFloat(document.getElementById("dobs").value)
  };

  const pwat = parseFloat(document.getElementById("pwat").value);

  const coupling = couplingIndex(model, obs);

  const sim = simulate(
    (model.tempF + obs.tempF) / 2,
    (model.dewF + obs.dewF) / 2
  );

  const packet = {
    model,
    observed: obs,
    derived: {
      couplingIndex: coupling,
      couplingClass: coupling > 40 ? "HIGH" : "LOW",
      cape: Math.round(sim.cape),
      cin: Math.round(sim.cin),
      lcl_m: Math.round(sim.lcl),
      lfc_m: sim.lfc
    }
  };

  const storm = stormType(sim.cape, model.shear, pwat);

  const nar = narrative(packet, storm);

  // ---------------- UI ----------------

  document.getElementById("status").innerHTML = `
    <div class="text-yellow-300 font-bold">
      DAILY FORECAST GENERATED
    </div>
    <div class="text-xs text-slate-400 mt-2">
      ${storm}
    </div>
  `;

  document.getElementById("out").innerHTML = `

<!-- HUMAN FORECAST -->
<div class="card p-4">

<h2 class="text-white font-bold">METEOROLOGICAL BRIEFING</h2>

<p class="mt-2">${nar.intro}</p>

<p class="mt-3">${nar.risk}</p>

<hr class="my-4 border-slate-600">

<h3 class="text-green-400 font-bold">Storm Assessment</h3>
${storm}

</div>

<!-- KEY METRICS -->
<div class="card p-4 mt-4">

<h2 class="text-blue-400 font-bold">KEY PARAMETERS</h2>

Coupling Index: ${coupling.toFixed(1)}<br>
CAPE: ${Math.round(sim.cape)}<br>
CIN: ${Math.round(sim.cin)}<br>
LCL: ${Math.round(sim.lcl)} m<br>
PWAT: ${pwat}

</div>

<!-- AI PACKET -->
<div class="card p-4 mt-4">

<h2 class="text-purple-300 font-bold">AI STRUCTURED PACKET</h2>

<pre>${JSON.stringify(packet, null, 2)}</pre>

</div>

  `;
}

</script>

</body>
</html>
