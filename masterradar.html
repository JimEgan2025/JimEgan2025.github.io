<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulf Coast & Florida Radar Monitor</title>
    <style>
        :root {
            --bg-color: #12161a;
            --panel-bg: #1c232a;
            --text-color: #e0e6ed;
            --accent-color: #39b54a; /* Radar green */
            --border-color: #2d3741;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* Control Panel */
        header {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        label {
            font-size: 0.9rem;
            font-weight: 500;
        }
        select, button {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }
        select:focus, button:focus {
            border-color: var(--accent-color);
        }
        select:disabled {
            background-color: #252e37;
            color: #637381;
            cursor: not-allowed;
            border-color: #252e37;
        }
        button {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #12161a;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2fa13e;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
        }
        #status {
            font-size: 0.85rem;
            font-style: italic;
            color: #8a9ba8;
            margin-left: auto;
        }
        /* Image Display Area */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px;
            background-color: #0b0d10;
            overflow: auto;
            position: relative;
        }
        .image-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }
        img {
            width: 98vw;
            height: 92vh;
            max-width: none;
            max-height: none;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
            display: none; 
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
        
        /* Targeted fix to prevent the CONUS-LARGE mosaic from looking vertically stretched */
        img[src*="CONUS-LARGE"] {
            height: auto !important;
            max-height: 90vh !important;
            width: auto !important;
            max-width: 95vw !important;
        }

        #debug-log {
            font-family: monospace;
            font-size: 0.8rem;
            color: #ff6b6b;
            margin-top: 4px;
            text-align: center;
            width: 100%;
            line-height: 1.4;
        }
        /* Loading Spinner */
        .spinner {
            border: 4px solid rgba(255,255,255,0.05);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: var(--accent-color);
            animation: spin 1s linear infinite;
            position: absolute;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <div class="control-group">
            <label for="region">Radar Source & Site:</label>
            <select id="region" onchange="onRegionChange()">
                <optgroup label="Weather Underground National Loops">
                    <option value="wu_us" selected>US National Composite (WU)</option>
                    <option value="wu_sat">US Satellite & Radar Overlay (WU)</option>
                </optgroup>
                <optgroup label="NWS Live Regional Loops (Active Mosaics)">
                    <option value="se">Southeast US / Florida (NWS Loop)</option>
                    <option value="sp">Texas & Southern Plains (NWS Loop)</option>
                    <option value="smv">Central Gulf Coast (NWS Loop)</option>
                    <option value="conus_large">Continental US National View (NWS)</option>
                </optgroup>
                <optgroup label="IEM Real-Time Radar & NWS Warning Overlays">
                    <option value="iem_sp">Texas & Southern Plains + Warnings</option>
                    <option value="iem_se">Florida & Southeast US + Warnings</option>
                    <option value="iem_gm">Gulf of Mexico + Warnings</option>
                    <option value="iem_conus">US National View + Warnings</option>
                </optgroup>
                <optgroup label="Texas & Louisiana Radar Stations">
                    <option value="KBRO">Brownsville, TX (KBRO)</option>
                    <option value="KCRP">Corpus Christi, TX (KCRP)</option>
                    <option value="KHGX">Houston / Galveston, TX (KHGX)</option>
                    <option value="KLCH">Lake Charles, LA (KLCH)</option>
                    <option value="KLIX">New Orleans / Slidell, LA (KLIX)</option>
                </optgroup>
                <optgroup label="Alabama, Mississippi & Florida Panhandle">
                    <option value="KMOB">Mobile, AL (KMOB - Coastal MS/AL)</option>
                    <option value="KEVX">Eglin AFB, FL (KEVX - Pensacola/NW FL)</option>
                    <option value="KTLH">Tallahassee, FL (KTLH - North FL)</option>
                </optgroup>
                <optgroup label="Florida Peninsula & Keys Stations">
                    <option value="KTBW">Tampa Bay, FL (KTBW - West Coast)</option>
                    <option value="KBYX">Key West, FL (KBYX - Florida Keys)</option>
                    <option value="KAMX">Miami, FL (KAMX - South FL)</option>
                    <option value="KMLB">Melbourne, FL (KMLB - East Central FL)</option>
                    <option value="KJAX">Jacksonville, FL (KJAX - Northeast FL)</option>
                </optgroup>
            </select>
        </div>
        <div class="control-group">
            <label for="mode">Format:</label>
            <select id="mode" onchange="loadRadarImage()">
                <option value="loop">Animated Loop</option>
                <option value="static">Static (Latest Frame)</option>
            </select>
        </div>
        <button onclick="loadRadarImage()">Refresh</button>
        <div class="checkbox-group">
            <input type="checkbox" id="cache-bust" checked>
            <label for="cache-bust">Bypass Cache</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="auto-refresh" onchange="toggleAutoRefresh()">
            <label for="auto-refresh">Auto-refresh (2m)</label>
        </div>
        <div id="status">Initializing...</div>
    </header>
    <main>
        <div class="spinner" id="spinner"></div>
        <div class="image-container">
            <img id="radar-img" alt="Radar Display" onload="onImageLoad()" onerror="onImageError()">
        </div>
        <div id="debug-log"></div>
    </main>
    <script>
        const regions = {
            wu_us:       { source: "WU", file: "conus" },
            wu_sat:      { source: "WU", file: "ussat" },

            se:          { source: "NWS", file: "SOUTHEAST" },
            sp:          { source: "NWS", file: "SOUTHPLAINS" },
            smv:         { source: "NWS", file: "SOUTHMISSVLY" },
            conus_large: { source: "NWS", file: "CONUS-LARGE" },

            iem_sp:      { source: "IEM", bbox: "-107,25,-93,37", width: 1500, height: 1200 },
            iem_se:      { source: "IEM", bbox: "-91,24,-79,32", width: 1500, height: 1200 },
            iem_gm:      { source: "IEM", bbox: "-98,18,-80,31", width: 1500, height: 1200 },
            iem_conus:   { source: "IEM", sector: "conus", width: 1800, height: 1200 },

            KBRO:        { source: "NWS", file: "KBRO" },
            KCRP:        { source: "NWS", file: "KCRP" },
            KHGX:        { source: "NWS", file: "KHGX" },
            KLCH:        { source: "NWS", file: "KLCH" },
            KLIX:        { source: "NWS", file: "KLIX" },
            KMOB:        { source: "NWS", file: "KMOB" },
            KEVX:        { source: "NWS", file: "KEVX" },
            KTLH:        { source: "NWS", file: "KTLH" },
            KTBW:        { source: "NWS", file: "KTBW" },
            KBYX:        { source: "NWS", file: "KBYX" },
            KAMX:        { source: "NWS", file: "KAMX" },
            KMLB:        { source: "NWS", file: "KMLB" },
            KJAX:        { source: "NWS", file: "KJAX" }
        };

        const modes = {
            loop:   { suffix: "_loop.gif" },
            static: { suffix: "_0.gif" } 
        };

        let refreshInterval = null;

        function onRegionChange() {
            handleUIControls();
            loadRadarImage();
        }

        function handleUIControls() {
            const regionKey = document.getElementById('region').value;
            const region = regions[regionKey];
            const modeSelect = document.getElementById('mode');

            if (region.source === "WU") {
                modeSelect.value = "loop";
                modeSelect.disabled = true;
            } else if (region.source === "IEM") {
                modeSelect.value = "static";
                modeSelect.disabled = true;
            } else {
                modeSelect.disabled = false;
            }
        }

        function loadRadarImage() {
            const regionKey = document.getElementById('region').value;
            const modeKey = document.getElementById('mode').value;
            const imgElement = document.getElementById('radar-img');
            const spinner = document.getElementById('spinner');
            const statusText = document.getElementById('status');
            const bypassCache = document.getElementById('cache-bust').checked;

            const region = regions[regionKey];
            let baseUrl = "";

            if (region.source === "WU") {
                baseUrl = `https://s.w-x.co/staticmaps/wu/wu/radsum1200_cur/${region.file}/animate.png`;
            } else if (region.source === "IEM") {
                const layers = ["nexrad", "sbw", "county_warnings", "watches", "uscounties"];
                const layerParams = layers.map(l => `layers[]=${l}`).join("&");
                baseUrl = `https://mesonet.agron.iastate.edu/GIS/radmap.php?${layerParams}&width=${region.width}&height=${region.height}`;

                if (region.sector) {
                    baseUrl += `&sector=${region.sector}`;
                } else if (region.bbox) {
                    baseUrl += `&bbox=${region.bbox}`;
                }
            } else {
                const mode = modes[modeKey];
                baseUrl = `https://radar.weather.gov/ridge/standard/${region.file}${mode.suffix}`;
            }

            const separator = baseUrl.includes('?') ? '&' : '?';
            const cacheBusterUrl = bypassCache ? `${baseUrl}${separator}t=${new Date().getTime()}` : baseUrl;

            statusText.textContent = "Fetching radar data...";
            spinner.style.display = "block";
            imgElement.style.display = "none";
            imgElement.src = cacheBusterUrl;
        }

        function onImageLoad() {
            document.getElementById('spinner').style.display = "none";
            document.getElementById('radar-img').style.display = "block";
            document.getElementById('debug-log').innerHTML = "";

            const timeString = new Date().toLocaleTimeString();
            document.getElementById('status').textContent = `Last fetched: ${timeString}`;
        }

        function onImageError() {
            const imgElement = document.getElementById('radar-img');
            const regionKey = document.getElementById('region').value;
            const region = regions[regionKey];
            const modeKey = document.getElementById('mode').value;

            document.getElementById('spinner').style.display = "none";

            if (region.source === "NWS" && modeKey === "loop") {
                document.getElementById('status').textContent = "Loop offline. Attempting static snapshot...";
                document.getElementById('mode').value = "static";
                setTimeout(loadRadarImage, 500); 
            } else {
                document.getElementById('status').textContent = "Failed to load radar imagery.";
                document.getElementById('debug-log').innerHTML = `
                    Failing URL: <a href="${imgElement.src}" target="_blank" style="color: #ff6b6b; text-decoration: underline;">${imgElement.src}</a><br>
                    <span style="color: #8a9ba8; font-size: 0.75rem; display: inline-block; margin-top: 5px;">
                        Tip: Try unchecking <b>"Bypass Cache"</b> above, or click the red link to verify if this radar source is down for maintenance.
                    </span>
                `;
            }
        }

        function toggleAutoRefresh() {
            const checkbox = document.getElementById('auto-refresh');
            if (checkbox.checked) {
                refreshInterval = setInterval(loadRadarImage, 120000);
            } else {
                if (refreshInterval) {
                    clearInterval(refreshInterval);
                }
            }
        }

        window.onload = function() {
            handleUIControls();
            loadRadarImage();
        };
    </script>
</body>
</html>
