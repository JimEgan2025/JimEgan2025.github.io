<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TX-OPS v45.2 | Marine & Coastal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>
    <style>
        :root {
            --bg: #020617; --panel: #0f172a; --border: #1e293b; --text: #e5e7eb; 
            --muted: #94a3b8; --ok: #22c55e; --warn: #ef4444; --watch: #fde047; --risk: #fb923c; --trop: #a855f7; --marine: #38bdf8;
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui; overflow: hidden; }
        header { padding: 8px 15px; background: #020617; border-bottom: 3px solid var(--risk); display: flex; justify-content: space-between; align-items: center; z-index: 1001; position: relative; }
        h1 { margin: 0; font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px; }
        .controls { display: flex; flex-wrap: wrap; gap: 4px; }
        button { background: #1e293b; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 5px 8px; cursor: pointer; font-size: 0.7rem; font-weight: 600; transition: 0.2s; }
        button:hover { border-color: var(--risk); }
        button.active { background: var(--risk); color: #000; border-color: #fff; }
        .grid { display: grid; grid-template-columns: 1fr 300px; height: calc(100vh - 55px); }
        #map { height: 100%; background: #0f172a; }
        .side { display: flex; flex-direction: column; gap: 8px; padding: 10px; overflow-y: auto; background: #020617; border-left: 1px solid var(--border); }
        .card { background: var(--panel); border-radius: 6px; padding: 10px; border: 1px solid var(--border); }
        .card h2 { margin: 0 0 5px; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .small { font-size: 0.75rem; color: var(--muted); line-height: 1.3; }
        .feed-item { padding: 8px 0; border-bottom: 1px solid #1e293b; }
        .trop-text { color: var(--trop); font-weight: bold; }
        .marine-text { color: var(--marine); font-weight: bold; }
        #activeLayers { position: absolute; bottom: 15px; left: 15px; background: rgba(15, 23, 42, 0.9); padding: 6px 10px; border-radius: 4px; font-size: 0.65rem; z-index: 1000; border: 1px solid var(--border); pointer-events: none; }
    </style>
</head>
<body>

<header> 
    <h1>TX-OPS v45.2</h1> 
    <div class="controls">
        <button id="btn-radar" onclick="toggleLayer('radar')">Radar</button>
        <button id="btn-wwa" onclick="toggleLayer('wwa')">Hazards</button>
        <button id="btn-d1" onclick="toggleLayer('d1')">Day 1</button>
        <button id="btn-d2" onclick="toggleLayer('d2')">Day 2</button>
        <button id="btn-d3" onclick="toggleLayer('d3')">Day 3</button>
        <button id="btn-md" onclick="toggleLayer('md')">Mesoscale</button>
        <button id="btn-counties" onclick="toggleLayer('counties')">Counties</button>
        <button id="btn-borders" onclick="toggleLayer('borders')" class="active">Borders</button>
    </div>
    <div id="lastUpdated" class="small" style="color:var(--muted)">Syncing...</div>
</header>

<div class="grid">
    <div id="map"></div>
    <div id="activeLayers">Ready</div>
    <div class="side">
        <div class="card">
            <h2>GULF TROPICAL & MARINE</h2>
            <div id="marine-feed" class="small">Scanning Coastal Zones...</div>
        </div>
        <div class="card">
            <h2>ACTIVE TX HAZARDS (LAND/SEA)</h2>
            <div id="hazard-counts" class="small">
                <span id="tor-count" class="warn">0</span> Tornado Warnings<br>
                <span id="svr-count" class="risk">0</span> Severe T-Storm<br>
                <span id="smw-count" class="marine">0</span> Special Marine<br>
                <span id="ffw-count" class="watch">0</span> Flash Flood
            </div>
        </div>
        <div class="card">
            <h2>SPC MESOSCALE FEED</h2>
            <div id="md-feed" class="small">Loading discussions...</div>
        </div>
    </div>
</div>

<script>
const map = L.map('map', { zoomControl: false }).setView([31.5, -99.5], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const spcBase = 'https://mapservices.weather.noaa.gov/vector/rest/services/outlooks/SPC_wx_outlks/MapServer';
const mdUrl = 'https://mapservices.weather.noaa.gov/vector/rest/services/outlooks/spc_mesoscale_discussion/MapServer';

const layers = {
    radar: L.tileLayer.wms('https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0r.cgi', { layers: 'nexrad-n0r-900913', format: 'image/png', transparent: true, opacity: 0.7 }),
    wwa: L.tileLayer.wms('https://mesonet.agron.iastate.edu/cgi-bin/wms/us/wwa.cgi', { layers: 'wwa', format: 'image/png', transparent: true, opacity: 0.8 }),
    d1: L.esri.dynamicMapLayer({ url: spcBase, layers: [1], opacity: 0.4 }),
    d2: L.esri.dynamicMapLayer({ url: spcBase, layers: [9], opacity: 0.4 }),
    d3: L.esri.dynamicMapLayer({ url: spcBase, layers: [17], opacity: 0.4 }),
    md: L.esri.dynamicMapLayer({ url: mdUrl, layers: [0], opacity: 0.8 }),
    counties: L.esri.dynamicMapLayer({ url: 'https://maps.dot.state.tx.us/arcgis/rest/services/Boundaries/MapServer', layers: [1], opacity: 1 }),
    borders: L.esri.featureLayer({ url: 'https://services.arcgis.com/P3ePLMYs2RVChkJx/arcgis/rest/services/USA_States_Generalized_Boundaries/FeatureServer/0', style: { color: '#ffffff', weight: 2, opacity: 1, fillOpacity: 0 }})
};

layers.borders.addTo(map);
toggleLayer('radar'); toggleLayer('wwa');

function toggleLayer(key) {
    if (map.hasLayer(layers[key])) {
        map.removeLayer(layers[key]);
        document.getElementById(`btn-${key}`).classList.remove('active');
    } else {
        layers[key].addTo(map);
        document.getElementById(`btn-${key}`).classList.add('active');
    }
    if (map.hasLayer(layers.counties)) layers.counties.bringToFront();
    if (map.hasLayer(layers.borders)) layers.borders.bringToFront();
    updateUI();
}

function updateUI() {
    const active = Object.keys(layers).filter(k => map.hasLayer(layers[k])).map(k => k.toUpperCase());
    document.getElementById('activeLayers').innerHTML = `Active: ${active.join(' • ')}`;
}

async function fetchData() {
    try {
        const res = await fetch('https://api.weather.gov/alerts/active?area=TX');
        const data = await res.json();
        let counts = { tor: 0, svr: 0, ffw: 0, smw: 0 };
        
        data.features.forEach(f => {
            const e = f.properties.event;
            if (e === 'Tornado Warning') counts.tor++;
            else if (e === 'Severe Thunderstorm Warning') counts.svr++;
            else if (e === 'Flash Flood Warning') counts.ffw++;
            else if (e === 'Special Marine Warning') counts.smw++;
        });

        document.getElementById('tor-count').innerText = counts.tor;
        document.getElementById('svr-count').innerText = counts.svr;
        document.getElementById('ffw-count').innerText = counts.ffw;
        document.getElementById('smw-count').innerText = counts.smw;
        document.getElementById('lastUpdated').innerText = `Sync: ${new Date().toLocaleTimeString()}`;
    } catch (e) { console.error("Alert fetch error"); }
}

async function fetchMarineAndTropical() {
    try {
        // Querying alerts for marine zones (GM) and specific marine/tropical events
        const res = await fetch('https://api.weather.gov/alerts/active?region_type=marine');
        const data = await res.json();
        const feed = document.getElementById('marine-feed');
        
        // Filter for Gulf of Mexico (GM zones)
        const gulfAlerts = data.features.filter(f => 
            f.properties.affectedZones.some(z => z.includes('GM'))
        );

        if (gulfAlerts.length > 0) {
            feed.innerHTML = '';
            gulfAlerts.forEach(f => {
                const div = document.createElement('div');
                div.className = 'feed-item';
                const isWarning = f.properties.severity === 'Extreme' || f.properties.severity === 'Severe';
                const colorClass = isWarning ? 'warn' : 'marine-text';
                div.innerHTML = `<span class="${colorClass}">${f.properties.event}</span><br><span style="font-size:0.65rem">${f.properties.headline}</span>`;
                feed.appendChild(div);
            });
        } else {
            feed.innerHTML = '<div class="small" style="color:var(--ok)">No active Gulf/Marine hazards.</div>';
        }
    } catch (e) { console.error("Marine fetch error"); }
}

// MD and Init calls
async function fetchMDs() { /* ...Existing MD Fetch Logic... */ }

fetchData();
fetchMarineAndTropical();
setInterval(() => { fetchData(); fetchMarineAndTropical(); }, 60000);
</script>
</body>
</html>
