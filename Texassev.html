<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TX-OPS v45.5 | Hurricane Ready Full Build</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>
    <style>
        :root {
            --bg: #020617; --panel: #0f172a; --border: #1e293b; --text: #e5e7eb; 
            --muted: #94a3b8; --ok: #22c55e; --warn: #ef4444; --watch: #fde047; --risk: #fb923c; --trop: #a855f7; --marine: #38bdf8;
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
        
        header { 
            padding: 8px 15px; 
            background: #020617; 
            border-bottom: 3px solid var(--risk); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 1001; 
            position: relative; 
        }
        h1 { margin: 0; font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px; }
        
        .controls { display: flex; flex-wrap: wrap; gap: 4px; }
        button { 
            background: #1e293b; color: var(--text); border: 1px solid var(--border); 
            border-radius: 4px; padding: 5px 8px; cursor: pointer; font-size: 0.7rem; 
            font-weight: 600; transition: 0.2s; 
        }
        button:hover { border-color: var(--risk); }
        button.active { background: var(--risk); color: #000; border-color: #fff; }
        #btn-nhc.active { background: var(--trop); color: white; }

        .grid { display: grid; grid-template-columns: 1fr 300px; height: calc(100vh - 55px); }
        #map { height: 100%; background: #0f172a; }
        
        .side { display: flex; flex-direction: column; gap: 8px; padding: 10px; overflow-y: auto; background: #020617; border-left: 1px solid var(--border); }
        .card { background: var(--panel); border-radius: 6px; padding: 10px; border: 1px solid var(--border); }
        .card h2 { margin: 0 0 5px; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .small { font-size: 0.75rem; color: var(--muted); line-height: 1.3; }
        .feed-item { padding: 8px 0; border-bottom: 1px solid #1e293b; }
        .feed-item:last-child { border-bottom: none; }
        
        .tx-marine { border-left: 3px solid var(--marine); padding-left: 8px; margin-bottom: 4px; background: rgba(56, 189, 248, 0.05); }
        .marine-text { color: var(--marine); font-weight: 700; }
        .md-text { color: var(--risk); font-weight: 700; }
        .count-val { font-weight: 800; font-size: 0.9rem; }
        
        #activeLayers { 
            position: absolute; bottom: 15px; left: 15px; 
            background: rgba(15, 23, 42, 0.9); padding: 6px 10px; 
            border-radius: 4px; font-size: 0.65rem; z-index: 1000; 
            border: 1px solid var(--border); pointer-events: none; 
        }
    </style>
</head>
<body>

<header> 
    <h1>TX-OPS v45.5</h1> 
    <div class="controls">
        <button id="btn-radar" onclick="toggleLayer('radar')">Radar</button>
        <button id="btn-nhc" onclick="toggleLayer('nhc')">NHC Track</button>
        <button id="btn-wwa" onclick="toggleLayer('wwa')">Hazards</button>
        <button id="btn-d1" onclick="toggleLayer('d1')">Day 1</button>
        <button id="btn-d2" onclick="toggleLayer('d2')">Day 2</button>
        <button id="btn-d3" onclick="toggleLayer('d3')">Day 3</button>
        <button id="btn-md" onclick="toggleLayer('md')">Mesoscale</button>
        <button id="btn-counties" onclick="toggleLayer('counties')">Counties</button>
        <button id="btn-borders" onclick="toggleLayer('borders')" class="active">Borders</button>
    </div>
    <div id="lastUpdated" class="small">Syncing...</div>
</header>

<div class="grid">
    <div id="map"></div>
    <div id="activeLayers">Ready</div>
    <div class="side">
        <div class="card">
            <h2>GULF & MARINE WATCH</h2>
            <div id="marine-feed" class="small">Checking GM Zones...</div>
        </div>
        <div class="card">
            <h2>TX LAND HAZARDS</h2>
            <div id="hazard-counts" class="small">
                <span id="tor-count" class="warn count-val">0</span> Tornado Warnings<br>
                <span id="svr-count" class="risk count-val">0</span> Severe T-Storm<br>
                <span id="ffw-count" class="watch count-val">0</span> Flash Flood
            </div>
        </div>
        <div class="card">
            <h2>SPC MESOSCALE FEED</h2>
            <div id="md-feed" class="small">Fetching discussions...</div>
        </div>
    </div>
</div>

<script>
const map = L.map('map', { zoomControl: false }).setView([31.5, -99.5], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const spcBase = 'https://mapservices.weather.noaa.gov/vector/rest/services/outlooks/SPC_wx_outlks/MapServer';
const mdUrl = 'https://mapservices.weather.noaa.gov/vector/rest/services/outlooks/spc_mesoscale_discussion/MapServer';
const nhcUrl = 'https://mapservices.weather.noaa.gov/tropical/rest/services/tropical/NHC_tropical_weather/MapServer';

const layers = {
    radar: L.tileLayer.wms('https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0r.cgi', { layers: 'nexrad-n0r-900913', format: 'image/png', transparent: true, opacity: 0.7 }),
    wwa: L.tileLayer.wms('https://mesonet.agron.iastate.edu/cgi-bin/wms/us/wwa.cgi', { layers: 'wwa', format: 'image/png', transparent: true, opacity: 0.8 }),
    nhc: L.esri.dynamicMapLayer({ url: nhcUrl, layers: [2, 3, 4], opacity: 0.8 }),
    d1: L.esri.dynamicMapLayer({ url: spcBase, layers: [1], opacity: 0.4 }),
    d2: L.esri.dynamicMapLayer({ url: spcBase, layers: [9], opacity: 0.4 }),
    d3: L.esri.dynamicMapLayer({ url: spcBase, layers: [17], opacity: 0.4 }),
    md: L.esri.dynamicMapLayer({ url: mdUrl, layers: [0], opacity: 0.8 }),
    counties: L.esri.dynamicMapLayer({ url: 'https://maps.dot.state.tx.us/arcgis/rest/services/Boundaries/MapServer', layers: [1], opacity: 1 }),
    borders: L.esri.featureLayer({ url: 'https://services.arcgis.com/P3ePLMYs2RVChkJx/arcgis/rest/services/USA_States_Generalized_Boundaries/FeatureServer/0', style: { color: '#ffffff', weight: 1, fillOpacity: 0 }})
};

layers.borders.addTo(map);
toggleLayer('radar'); toggleLayer('wwa');

function toggleLayer(key) {
    if (map.hasLayer(layers[key])) {
        map.removeLayer(layers[key]);
        document.getElementById(`btn-${key}`).classList.remove('active');
    } else {
        layers[key].addTo(map);
        document.getElementById(`btn-${key}`).classList.add('active');
    }
    // Maintain stacking order
    if (map.hasLayer(layers.counties)) layers.counties.bringToFront();
    if (map.hasLayer(layers.borders)) layers.borders.bringToFront();
    if (map.hasLayer(layers.nhc)) layers.nhc.bringToFront();
    updateUI();
}

function updateUI() {
    const active = Object.keys(layers).filter(k => map.hasLayer(layers[k])).map(k => k.toUpperCase());
    document.getElementById('activeLayers').innerHTML = `Active: ${active.join(' • ')}`;
}

async function fetchAll() {
    try {
        // 1. TX LAND HAZARDS
        const hRes = await fetch('https://api.weather.gov/alerts/active?area=TX');
        const hData = await hRes.json();
        let c = { tor: 0, svr: 0, ffw: 0 };
        hData.features.forEach(f => {
            const e = f.properties.event;
            if (e === 'Tornado Warning') c.tor++;
            if (e === 'Severe Thunderstorm Warning') c.svr++;
            if (e === 'Flash Flood Warning') c.ffw++;
        });
        document.getElementById('tor-count').innerText = c.tor;
        document.getElementById('svr-count').innerText = c.svr;
        document.getElementById('ffw-count').innerText = c.ffw;

        // 2. MARINE FEED (GULF Focus)
        const mRes = await fetch('https://api.weather.gov/alerts/active?region_type=marine');
        const mData = await mRes.json();
        const mFeed = document.getElementById('marine-feed');
        const gulf = mData.features.filter(f => f.properties.affectedZones.some(z => z.includes('GM')));
        
        if (gulf.length > 0) {
            mFeed.innerHTML = gulf.map(f => {
                const isTexas = f.properties.affectedZones.some(z => z.includes('GMZ4') || z.includes('GMZ3'));
                return `
                    <div class="feed-item ${isTexas ? 'tx-marine' : ''}">
                        <span class="marine-text">${f.properties.event}</span> 
                        ${isTexas ? '<b style="font-size:0.6rem; color:var(--warn)">[TX COAST]</b>' : ''}
                        <br>${f.properties.headline || 'Multiple maritime zones affected.'}
                    </div>
                `;
            }).join('');
        } else {
            mFeed.innerHTML = '<span style="color:var(--ok)">No active Gulf threats.</span>';
        }

        // 3. SPC MESOSCALE (Fixed Query)
        const mdRes = await fetch(`${mdUrl}/0/query?where=1%3D1&outFields=md_number,phenomena,issue_date&orderByFields=issue_date DESC&resultRecordCount=3&f=pjson`);
        const mdData = await mdRes.json();
        const mdFeed = document.getElementById('md-feed');
        if (mdData.features && mdData.features.length > 0) {
            mdFeed.innerHTML = mdData.features.map(f => `
                <div class="feed-item"><span class="md-text">MD #${f.attributes.md_number}</span>: ${f.attributes.phenomena}</div>
            `).join('');
        } else {
            mdFeed.innerHTML = 'No recent Mesoscale Discussions.';
        }

        document.getElementById('lastUpdated').innerText = `Sync: ${new Date().toLocaleTimeString()}`;
    } catch (err) { console.error("Global Refresh Error:", err); }
}

fetchAll(); 
setInterval(fetchAll, 60000); // 1-minute auto-refresh
</script>
</body>
</html>
