<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muggy Meter - Visual Dew Point Forecast</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            padding: 20px;
            color: #f8fafc;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 30px 0;
        }
        .header h1 { font-size: 2.5em; color: #38bdf8; margin-bottom: 5px; }
        .header p { color: #94a3b8; }

        /* Graph Container */
        .graph-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 40px 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            position: relative;
            margin-bottom: 30px;
        }

        /* Threshold Lines */
        .threshold-lines {
            position: absolute;
            left: 60px;
            right: 20px;
            top: 40px;
            bottom: 80px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .line {
            width: 100%;
            border-top: 1px dashed rgba(255,255,255,0.1);
            position: relative;
        }
        .line span {
            position: absolute;
            left: -50px;
            top: -10px;
            font-size: 11px;
            color: #64748b;
            font-weight: bold;
        }
        .line.muggy { border-top: 1px solid rgba(239, 68, 68, 0.3); }
        .line.comfort { border-top: 1px solid rgba(16, 185, 129, 0.3); }

        /* The Bars */
        .chart-area {
            height: 350px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding-left: 50px;
            position: relative;
            z-index: 2;
        }
        .bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
            transition: all 0.3s ease;
        }
        .bar {
            width: 70%;
            max-width: 60px;
            border-radius: 8px 8px 4px 4px;
            position: relative;
            transition: height 1s ease-out, background 0.5s;
            cursor: pointer;
            min-height: 20px;
        }
        .bar:hover { filter: brightness(1.2); transform: scaleX(1.05); }
        
        /* Value on top of bar */
        .bar-val {
            position: absolute;
            top: -25px;
            width: 100%;
            text-align: center;
            font-weight: 800;
            font-size: 14px;
        }

        /* Labels at bottom */
        .bar-label {
            margin-top: 15px;
            text-align: center;
        }
        .day-name { font-weight: bold; font-size: 13px; color: #f1f5f9; }
        .date-str { font-size: 10px; color: #64748b; text-transform: uppercase; }

        /* Legend */
        .legend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            background: #0f172a;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🌡️ Muggy Meter</h1>
            <p>10-Day Visual Dew Point Trend for Round Rock, TX</p>
        </div>

        <div class="graph-card">
            <!-- Background Scale Lines -->
            <div class="threshold-lines">
                <div class="line" style="height:0"><span>80°</span></div>
                <div class="line muggy"><span>70°</span></div>
                <div class="line"><span>60°</span></div>
                <div class="line comfort"><span>50°</span></div>
                <div class="line"><span>40°</span></div>
                <div class="line" style="border:none"><span>30°</span></div>
            </div>

            <!-- The Bars will be injected here -->
            <div class="chart-area" id="chartArea"></div>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="dot" style="background: #06b6d4;"></div> Very Dry (&lt;40°)</div>
            <div class="legend-item"><div class="dot" style="background: #10b981;"></div> Dry (40-50°)</div>
            <div class="legend-item"><div class="dot" style="background: #84cc16;"></div> Comfort (50-60°)</div>
            <div class="legend-item"><div class="dot" style="background: #f59e0b;"></div> Noticeable (60-65°)</div>
            <div class="legend-item"><div class="dot" style="background: #ef4444;"></div> Muggy (65-70°)</div>
            <div class="legend-item"><div class="dot" style="background: #991b1b;"></div> Tropical (&gt;70°)</div>
        </div>

        <div class="footer">
            Source: Open-Meteo GFS Model | Syncing Live | <span id="syncTime"></span>
        </div>
    </div>

    <script>
        const LAT = 30.509747, LON = -97.692116;

        function getColor(dp) {
            if (dp < 40) return '#06b6d4';
            if (dp < 50) return '#10b981';
            if (dp < 60) return '#84cc16';
            if (dp < 65) return '#f59e0b';
            if (dp < 70) return '#ef4444';
            return '#991b1b';
        }

        async function fetchWeather() {
            try {
                // Fetching 10 days of daily mean dew point
                const url = `https://api.open-meteo.com/v1/gfs?latitude=${LAT}&longitude=${LON}&daily=dew_point_2m_mean&temperature_unit=fahrenheit&timezone=America/Chicago&forecast_days=10`;
                const res = await fetch(url);
                const data = await res.json();
                renderChart(data.daily);
                document.getElementById('syncTime').textContent = "Last Update: " + new Date().toLocaleTimeString();
            } catch (err) {
                console.error("Fetch failed", err);
            }
        }

        function renderChart(daily) {
            const chartArea = document.getElementById('chartArea');
            chartArea.innerHTML = '';

            daily.time.forEach((dateStr, i) => {
                const dp = daily.dew_point_2m_mean[i];
                const date = new Date(dateStr + 'T00:00:00');
                
                const wrapper = document.createElement('div');
                wrapper.className = 'bar-wrapper';

                // Map dew point (30 to 80 range) to percentage height (0 to 100)
                // We set 30 as the floor for the graph
                const minGraph = 30;
                const maxGraph = 80;
                let heightPct = ((dp - minGraph) / (maxGraph - minGraph)) * 100;
                if (heightPct < 5) heightPct = 5; // Minimum bar visibility

                wrapper.innerHTML = `
                    <div class="bar" style="height: ${heightPct}%; background: ${getColor(dp)}">
                        <div class="bar-val" style="color: ${getColor(dp)}">${Math.round(dp)}°</div>
                    </div>
                    <div class="bar-label">
                        <div class="day-name">${date.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase()}</div>
                        <div class="date-str">${date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</div>
                    </div>
                `;
                chartArea.appendChild(wrapper);
            });
        }

        fetchWeather();
        // Refresh every 30 minutes
        setInterval(fetchWeather, 1800000);
    </script>
</body>
</html>
