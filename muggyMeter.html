<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viccaya WX - Muggy Meter Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --border: #1e293b;
            --viccaya-blue: #38bdf8;
            --text-muted: #94a3b8;
            /* High Contrast Comfort Colors */
            --dry: #0ea5e9;
            --pleasant: #10b981;
            --comfortable: #84cc16;
            --sticky: #f59e0b;
            --muggy: #ef4444;
            --oppressive: #a855f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
            padding: 30px;
            /* Optimized for Facebook Landscape Sharing */
            width: 1080px; 
            margin: auto;
        }

        /* BRAND HEADER - MUCH LARGER */
        .brand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 3px solid var(--border);
        }
        .brand-left h1 {
            font-size: 52px;
            font-weight: 900;
            letter-spacing: -3px;
            line-height: 1;
        }
        .brand-left h1 span { color: var(--viccaya-blue); }
        .brand-left p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 5px;
        }

        .station-id {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            background: var(--viccaya-blue);
            padding: 8px 15px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        /* SUMMARY TEXT - BOXIER AND BOLDER */
        #summary-text {
            display: block;
            margin-bottom: 30px;
            padding: 25px;
            background: linear-gradient(90deg, #1e293b, #0f172a);
            border-radius: 16px;
            font-size: 24px;
            font-weight: 600;
            border: 1px solid var(--border);
            line-height: 1.4;
        }

        /* THE CHART AREA */
        .chart-card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 1px solid #334155;
        }

        .chart-viewport {
            height: 500px;
            position: relative;
            display: flex;
        }

        /* Left Side Scale Labels */
        .y-axis-labels {
            width: 140px;
            display: flex;
            flex-direction: column-reverse;
            padding-right: 15px;
            border-right: 2px solid var(--border);
        }

        .y-label {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* Background Comfort Bands */
        .zones {
            position: absolute;
            inset: 0 0 0 140px; /* Offset by y-axis width */
            display: flex;
            flex-direction: column-reverse;
            z-index: 1;
        }
        .zone {
            width: 100%;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            padding-left: 20px;
        }

        /* Bars Stage */
        .bars-stage {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 0 10px;
        }

        .bar-col {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        .bar {
            width: 70%; /* Thicker bars */
            border-radius: 8px 8px 0 0;
            position: relative;
            background: linear-gradient(to top, rgba(255,255,255,0.1), rgba(255,255,255,0.4));
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .bar-val {
            position: absolute;
            top: -40px;
            width: 100%;
            text-align: center;
            font-weight: 900;
            font-size: 26px; /* Huge numbers */
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        /* X-AXIS - MUCH BOLDER */
        .x-axis {
            height: 100px;
            display: flex;
            margin-left: 140px;
            border-top: 3px solid var(--border);
            z-index: 2;
        }
        .date-item { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }
        .date-item .day { font-weight: 900; font-size: 22px; color: #fff; text-transform: uppercase; }
        .date-item .date { font-size: 14px; font-weight: 700; color: var(--text-muted); }

        /* Color Overlay Classes */
        .z-oppressive { background: rgba(168, 85, 247, 0.15); }
        .z-muggy { background: rgba(239, 68, 68, 0.12); }
        .z-sticky { background: rgba(245, 158, 11, 0.08); }

        .footer {
            margin-top: 40px;
            font-size: 16px;
            color: var(--text-muted);
            text-align: center;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .live-tag {
            color: #10b981;
            font-weight: 900;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
        }
        .dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <div class="brand-left">
            <h1>VICCAYA <span>WX</span></h1>
            <p>Muggy Meter • Humidity Outlook</p>
        </div>
        <div class="brand-right" style="text-align: right;">
            <div class="station-id">ROUND ROCK, TX</div>
            <div class="live-tag"><div class="dot"></div> GFS HIGH-RES CORE</div>
        </div>
    </div>

    <div id="summary-text">Analyzing atmospheric moisture content...</div>

    <div class="chart-card">
        <div class="chart-viewport">
            <!-- Left Scale -->
            <div class="y-axis-labels">
                <div class="y-label" style="height: 20%;">30-40° DRY</div>
                <div class="y-label" style="height: 20%;">40-50° NICE</div>
                <div class="y-label" style="height: 20%;">50-60° COMFY</div>
                <div class="y-label" style="height: 10%;">60-65° STICKY</div>
                <div class="y-label" style="height: 10%;">65-70° MUGGY</div>
                <div class="y-label" style="height: 20%; color:#f87171">70°+ OPPRESSIVE</div>
            </div>

            <!-- Background Bands -->
            <div class="zones">
                <div class="zone" style="height: 20%;"></div>
                <div class="zone" style="height: 20%;"></div>
                <div class="zone" style="height: 20%;"></div>
                <div class="zone z-sticky" style="height: 10%;"></div>
                <div class="zone z-muggy" style="height: 10%;"></div>
                <div class="zone z-oppressive" style="height: 20%;"></div>
            </div>

            <!-- Data Bars -->
            <div class="bars-stage" id="barsStage"></div>
        </div>

        <div class="x-axis" id="xAxis"></div>
    </div>

    <div class="footer">
        VICCAYA WEATHER SERVICES • UPDATED: <span id="update-time">--:--</span>
    </div>
</div>

<script>
    const CONFIG = {
        lat: 30.5097,
        lon: -97.6921,
        min: 30,
        max: 80
    };

    function getComfort(dp) {
        if (dp < 50) return { label: 'VERY DRY', color: 'var(--dry)' };
        if (dp < 60) return { label: 'PLEASANT', color: 'var(--pleasant)' };
        if (dp < 65) return { label: 'STICKY', color: 'var(--sticky)' };
        if (dp < 70) return { label: 'MUGGY', color: 'var(--muggy)' };
        return { label: 'OPPRESSIVE', color: 'var(--oppressive)' };
    }

    async function fetchData() {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/gfs?latitude=${CONFIG.lat}&longitude=${CONFIG.lon}&daily=dew_point_2m_max&temperature_unit=fahrenheit&timezone=America/Chicago&forecast_days=10`);
            const data = await res.json();
            render(data.daily);
        } catch (e) {
            document.getElementById('summary-text').textContent = "ERROR: DATA STREAM OFFLINE";
        }
    }

    function render(daily) {
        const stage = document.getElementById('barsStage');
        const x = document.getElementById('xAxis');
        stage.innerHTML = '';
        x.innerHTML = '';

        let highestDP = 0;
        let highestDay = "";

        daily.time.forEach((time, i) => {
            const dp = daily.dew_point_2m_max[i];
            const comfort = getComfort(dp);
            const date = new Date(time + 'T00:00:00');
            const dayName = date.toLocaleDateString('en-US', {weekday: 'short'});

            if (dp > highestDP) {
                highestDP = dp;
                highestDay = i === 0 ? "Today" : dayName;
            }

            let pct = ((dp - CONFIG.min) / (CONFIG.max - CONFIG.min)) * 100;
            pct = Math.max(10, Math.min(100, pct)); // Taller minimum bar

            const col = document.createElement('div');
            col.className = 'bar-col';
            col.innerHTML = `
                <div class="bar" style="height: ${pct}%; background-color: ${comfort.color}; box-shadow: 0 0 30px ${comfort.color}55">
                    <div class="bar-val" style="color: ${comfort.color}">${Math.round(dp)}°</div>
                </div>
            `;
            stage.appendChild(col);

            const label = document.createElement('div');
            label.className = 'date-item';
            label.innerHTML = `
                <span class="day">${dayName}</span>
                <span class="date">${date.getDate()} ${date.toLocaleDateString('en-US', {month: 'short'})}</span>
            `;
            x.appendChild(label);
        });

        const summary = getComfort(highestDP);
        document.getElementById('summary-text').innerHTML = 
            `MUGGY METER: Peak humidity of <span style="color:${summary.color}; font-weight:900;">${summary.label}</span> expected on <span style="color:#fff">${highestDay}</span>.`;
        
        document.getElementById('update-time').textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }

    fetchData();
</script>

</body>
</html>
