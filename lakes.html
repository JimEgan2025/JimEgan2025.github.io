<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIZCAYA HYDRO | Command Center v1.7</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020408; --card: #0a0c12; --border: #1e293b; --text: #f1f5f9;
            --colorado: #3b82f6; --brazos: #f59e0b; --stable: #10b981; --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); max-width: 1200px; margin: auto; border: 4px solid var(--border); padding-bottom: 50px; min-height: 100vh; }
        header { padding: 25px 40px; background: #000; border-bottom: 3px solid var(--stable); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .basin-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; padding: 20px 30px; background: #05070a; border-bottom: 1px solid var(--border); }
        .basin-total-card { padding: 15px; border-radius: 8px; border: 1px solid var(--border); background: #000; }
        .basin-label { font-size: 11px; font-weight: 900; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; }
        .progress-container { background: #1e293b; height: 12px; border-radius: 6px; overflow: hidden; margin: 8px 0; }
        .progress-bar { height: 100%; transition: width 1s ease-in-out; width: 0%; }
        .basin-val { font-family: 'JetBrains Mono'; font-weight: 800; font-size: 24px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; padding: 30px; }
        .lake-card { background: rgba(10, 12, 18, 0.8); border: 2px solid var(--border); border-radius: 12px; overflow: hidden; }
        .lake-title { padding: 15px 25px; font-size: 22px; font-weight: 900; background: #05070a; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .stats-table { width: 100%; border-collapse: collapse; background: #000; }
        .stats-table th { text-align: left; padding: 12px 25px; font-size: 10px; color: #94a3b8; text-transform: uppercase; border-bottom: 1px solid #1e293b; }
        .stats-table td { padding: 15px 25px; font-family: 'JetBrains Mono'; font-weight: 800; font-size: 18px; border-bottom: 1px solid #1e293b; }
        .status-tag { font-size: 10px; padding: 4px 8px; border-radius: 4px; font-weight: 900; color: white; }
        #status-bar { font-family: 'JetBrains Mono'; font-size: 11px; padding: 10px 40px; background: #10b981; color: #000; font-weight: 800; transition: background 0.3s; }
        button { background:var(--stable); border:none; color:white; padding:10px 20px; border-radius:5px; font-weight:900; cursor:pointer; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<header>
    <div>
        <div style="font-weight: 900; color: #fff; font-size: 32px; letter-spacing: -1px;">HYDRO COMMAND <span style="color:var(--stable)">v1.7</span></div>
        <div style="margin-top: 5px; font-size: 12px; font-weight: 800; color: #94a3b8; letter-spacing: 2px;">LIVE TELEMETRY // JSON WRAPPER MODE</div>
    </div>
    <button onclick="updateDashboard()">REFRESH DATA</button>
</header>

<div id="status-bar">Initializing Connection...</div>

<div class="basin-summary">
    <div class="basin-total-card">
        <div class="basin-label">Colorado River Basin</div>
        <div id="col-val" class="basin-val">--%</div>
        <div class="progress-container"><div id="col-bar" class="progress-bar" style="background:var(--colorado)"></div></div>
    </div>
    <div class="basin-total-card">
        <div class="basin-label">Brazos River Basin</div>
        <div id="bra-val" class="basin-val">--%</div>
        <div class="progress-container"><div id="bra-bar" class="progress-bar" style="background:var(--brazos)"></div></div>
    </div>
</div>

<div class="grid-container" id="main-grid">
    <!-- Data Injected Here -->
</div>

<script>
    const lakes = [
        { slug: "buchanan", name: "BUCHANAN", basin: "Colorado" },
        { slug: "travis", name: "TRAVIS", basin: "Colorado" },
        { slug: "georgetown", name: "GEORGETOWN", basin: "Brazos" },
        { slug: "stillhouse-hollow", name: "STILLHOUSE HOLLOW", basin: "Brazos" }
    ];

    // Using the 'get' endpoint for broader compatibility
    const proxyBase = "https://api.allorigins.win/get?url=";

    async function updateDashboard() {
        const status = document.getElementById('status-bar');
        const container = document.getElementById('main-grid');
        
        status.innerText = "REQUESTING TELEMETRY...";
        status.style.background = "#f59e0b";

        try {
            // 1. Get Basin Data
            const basinUrl = proxyBase + encodeURIComponent("https://waterdatafortexas.org/reservoirs/basins.csv");
            const bResponse = await fetch(basinUrl);
            const bData = await bResponse.json();
            const bLines = bData.contents.split('\n').filter(l => l.trim() !== "");

            bLines.forEach(line => {
                const cols = line.split(',');
                if(cols[0] === "Colorado") {
                    document.getElementById('col-val').innerText = parseFloat(cols[4]).toFixed(1) + "%";
                    document.getElementById('col-bar').style.width = cols[4] + "%";
                }
                if(cols[0] === "Brazos") {
                    document.getElementById('bra-val').innerText = parseFloat(cols[4]).toFixed(1) + "%";
                    document.getElementById('bra-bar').style.width = cols[4] + "%";
                }
            });

            // 2. Get Lake Data
            container.innerHTML = '';
            for (let lake of lakes) {
                status.innerText = `POLLING ${lake.name}...`;
                const lakeUrl = proxyBase + encodeURIComponent(`https://waterdatafortexas.org/reservoirs/individual/${lake.slug}-1year.csv`);
                const lResponse = await fetch(lakeUrl);
                const lData = await lResponse.json();
                
                const lines = lData.contents.trim().split('\n').filter(l => !l.startsWith('#') && l.trim() !== "");
                const rows = lines.slice(1).map(r => r.split(','));
                
                const current = rows[rows.length-1];
                const yesterday = rows[rows.length-2];
                const week = rows[rows.length-8];
                const year = rows[0];

                const diff = parseFloat(current[1]) - parseFloat(yesterday[1]);
                const trendIcon = diff > 0 ? '<span style="color:var(--stable)">↑</span>' : diff < 0 ? '<span style="color:var(--danger)">↓</span>' : '↔';
                const color = lake.basin === "Colorado" ? "var(--colorado)" : "var(--brazos)";
                
                container.innerHTML += `
                    <div class="lake-card">
                        <div class="lake-title">${lake.name} <span class="status-tag" style="background:${color}">${lake.basin}</span></div>
                        <table class="stats-table">
                            <tr><th>Period</th><th>Level / Capacity</th></tr>
                            <tr><td>Today</td><td>${parseFloat(current[1]).toFixed(2)}' ${trendIcon} <span style="font-size:14px; color:#94a3b8">(${parseFloat(current[4]).toFixed(1)}%)</span></td></tr>
                            <tr><td>Yesterday</td><td>${parseFloat(yesterday[1]).toFixed(2)}'</td></tr>
                            <tr><td>7 Days Ago</td><td>${parseFloat(week[1]).toFixed(2)}'</td></tr>
                            <tr><td>Year Ago</td><td>${parseFloat(year[1]).toFixed(2)}'</td></tr>
                        </table>
                    </div>`;
            }

            status.innerText = "SYSTEM ONLINE // ALL DATA POINTS UPDATED";
            status.style.background = "var(--stable)";
        } catch (err) {
            console.error(err);
            status.innerText = "CONNECTION BLOCKED. RUN AS LOCAL .HTML FILE.";
            status.style.background = "var(--danger)";
        }
    }

    // Run on load
    window.onload = updateDashboard;
</script>

</body>
</html>
