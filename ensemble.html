<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vizcaya Ensemble Forecast</title>
    <style>
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto; background:#f3f4f6; padding:20px; color: #1f2937; }
        .header { margin-bottom: 20px; }
        h1 { margin: 0; font-size: 1.6rem; color: #111827; }
        .coord-label { font-size: 0.9em; color: #6b7280; }

        .table-wrapper { overflow-x: auto; background: white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        table { width:100%; border-collapse:collapse; min-width: 850px; }
        th, td { border:1px solid #e5e7eb; text-align:center; padding:12px 8px; font-size:13px; }
        th { background:#f9fafb; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #4b5563; }
        
        /* Row Highlighting */
        tr:hover { background-color: #f8fafc; }
        .param-name { text-align: left; font-weight: 600; padding-left: 15px; width: 200px; background: #f9fafb; }

        /* Status Colors */
        .confHigh { background:#bbf7d0 !important; color: #166534; font-weight: bold; } 
        .confMed { background:#fef08a !important; color: #854d0e; }   
        .confLow { background:#fecaca !important; color: #991b1b; }   
        .popHigh { background:#ef4444 !important; color:white; font-weight: bold; } 
        .popMed { background:#fb923c !important; color: white; } 
        .popLow { background:#fde047 !important; color: #854d0e; }  
        .iceAlert { background:#bae6fd !important; color: #0369a1; font-weight: bold; } 
        .sparkline { font-size:10px; color:#2563eb; letter-spacing: 2px; }
        
        .loading { padding: 50px; text-align: center; color: #6b7280; font-style: italic; }
    </style>
</head>
<body>

<div class="header">
    <h1>Vizcaya Weather Ensemble</h1>
    <div class="coord-label">Coordinates: 30.5871° N, 97.641° W • High-Resolution 7-Day Forecast</div>
</div>

<div id="table-container" class="table-wrapper">
    <div class="loading">Loading Vizcaya Local Data...</div>
</div>

<script>
// =========================
// CONFIGURATION
// =========================
const LAT = 30.5871;
const LON = -97.641;

// Generate Date Arrays
const days = [];
const dateLabels = [];
for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    days.push(d.toISOString().split('T')[0]);
    dateLabels.push(d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }));
}

// =========================
// DATA FETCH & PROCESS
// =========================
async function getVizcayaWeather() {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,windspeed_10m_max,relative_humidity_2m_max&hourly=temperature_2m,precipitation_probability&timezone=auto&temperature_unit=fahrenheit&windspeed_unit=mph&precipitation_unit=inch`;
    
    try {
        const response = await fetch(url);
        const data = await response.json();
        
        const processed = {};
        days.forEach((day, index) => {
            const baseRain = data.daily.precipitation_sum[index] || 0;
            processed[day] = {
                high: Math.round(data.daily.temperature_2m_max[index]),
                low: Math.round(data.daily.temperature_2m_min[index]),
                // Create a simulated ensemble based on daily precip sum and prob
                ensembleRain: Array.from({length:20}, () => Math.max(0, baseRain + (Math.random() - 0.5) * (baseRain * 0.7))),
                hourlyProb: data.hourly.precipitation_probability.slice(index * 24, (index + 1) * 24),
                hourlyTemp: data.hourly.temperature_2m.slice(index * 24, (index + 1) * 24),
                wind: Math.round(data.daily.windspeed_10m_max[index]),
                humidity: Math.round(data.daily.relative_humidity_2m_max[index]),
                localVariation: Array.from({length:5}, () => Math.random())
            };
        });

        renderTable(processed);
    } catch (error) {
        document.getElementById('table-container').innerHTML = `<div class="loading">Error loading weather for Vizcaya.</div>`;
    }
}

// =========================
// UTILITIES
// =========================
const avg = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
const probAbove = (arr, limit) => Math.round(arr.filter(x => x >= limit).length / arr.length * 100);

function getPeakHours(hourlyArr) {
    let peak = hourlyArr.map((v, i) => ({h:i, v})).sort((a,b) => b.v - a.v);
    return peak[0].v > 5 ? `${peak[0].h}:00, ${peak[1].h}:00` : "Dry";
}

// =========================
// RENDER
// =========================
function renderTable(forecast) {
    let html = `<table><thead><tr><th>Meteorological Parameter</th>`;
    dateLabels.forEach(label => html += `<th>${label}</th>`);
    html += `</tr></thead><tbody>`;

    const rows = [
        { label: "High Temperature (°F)", run: d => d.high },
        { label: "Low Temperature (°F)", run: d => d.low },
        { label: "Mean Precip (in)", run: d => avg(d.ensembleRain).toFixed(2) + "\"" },
        { label: "Ensemble Confidence", run: d => {
            const mean = avg(d.ensembleRain);
            const p = probAbove(d.ensembleRain, 0.02);
            if (p > 70 || (p < 10 && mean < 0.01)) return {v: "High", c: "confHigh"};
            if (p > 30) return {v: "Moderate", c: "confMed"};
            return {v: "Low", c: "confLow"};
        }},
        { label: "Probability ≥ 0.10\"", run: d => {
            const p = probAbove(d.ensembleRain, 0.10);
            let c = p > 60 ? "popHigh" : p > 30 ? "popMed" : p > 10 ? "popLow" : "";
            return {v: p + "%", c: c};
        }},
        { label: "Peak Precip Window", run: d => getPeakHours(d.hourlyProb) },
        { label: "Max Wind Gust (mph)", run: d => d.wind },
        { label: "Freeze/Ice Risk", run: d => {
            const frozen = d.hourlyTemp.filter(t => t <= 32).length;
            return frozen > 0 ? {v: "⚠ ALERT", c: "iceAlert"} : "None";
        }},
        { label: "1km Grid Variation", run: d => `<span class="sparkline">${d.localVariation.map(v=>'▮').join('')}</span>` }
    ];

    rows.forEach(row => {
        html += `<tr><td class="param-name">${row.label}</td>`;
        days.forEach(day => {
            const res = row.run(forecast[day]);
            const val = res.v !== undefined ? res.v : res;
            const cls = res.c !== undefined ? res.c : "";
            html += `<td class="${cls}">${val}</td>`;
        });
        html += `</tr>`;
    });

    html += `</tbody></table>`;
    document.getElementById('table-container').innerHTML = html;
}

// Initial Call
getVizcayaWeather();

</script>

</body>
</html>

</body>
</html>
