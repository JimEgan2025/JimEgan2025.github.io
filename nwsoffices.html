<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizcaya 360° Tactical Scan - Texas</title>
    <style>
        :root {
            --tactical-blue: #0f172a;
            --alert-red: #ef4444;
            --valid-green: #22c55e;
            --panel-bg: #ffffff;
            --jarrell-purple: #7c3aed;
        }

        body { font-family: 'Consolas', monospace; background: #050a10; margin: 0; padding: 15px; color: #e2e8f0; }
        
        .dashboard-header { background: var(--tactical-blue); padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        
        .delta-container { display: flex; gap: 10px; }
        .delta-box { background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 8px; text-align: center; border: 1px solid #334155; min-width: 120px; }
        .delta-value { font-size: 1.5rem; font-weight: 800; display: block; color: #5ecbff; }
        
        /* Section 7.4 Escalation Alert */
        .escalation-trigger { border-color: var(--alert-red) !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .escalation-trigger .delta-value { color: var(--alert-red); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 12px; }
        .card { background: #0f172a; border-radius: 10px; padding: 12px; border: 1px solid #1e293b; height: 320px; display: flex; flex-direction: column; }
        .card-header { display: flex; justify-content: space-between; border-bottom: 1px solid #1e293b; padding-bottom: 8px; margin-bottom: 8px; }
        .name { color: #5ecbff; font-weight: bold; }
        
        .messages { font-size: 0.8rem; line-height: 1.4; color: #94a3b8; overflow-y: auto; flex-grow: 1; white-space: pre-wrap; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 4px; border: 1px solid #1e293b; }
        .forensic-ts { font-size: 0.7rem; color: #fde047; margin-top: 8px; font-weight: bold; border-top: 1px solid #1e293b; padding-top: 5px; }
        
        .ai-export-zone { margin-top: 25px; }
        #ai-prompt-box { width: 100%; height: 350px; background: #000; color: #2ecc71; border: 1px solid var(--jarrell-purple); border-radius: 8px; padding: 15px; font-size: 0.85rem; }
        .copy-btn { background: var(--jarrell-purple); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <div>
            <h1 style="margin:0; font-size:1.1rem; letter-spacing:2px; color: #fff;">VIZCAYA 360° TACTICAL SCAN | TEXAS</h1>
            <p id="sync-display" style="font-size:0.7rem; color:#5ecbff; font-weight: bold;">v30.6 FORENSIC NORMALIZATION ACTIVE</p>
        </div>
        <div class="delta-container">
            <div class="delta-box" id="temp-box"><span class="delta-value" id="temp-delta">--°F</span><span style="font-size:0.5rem; text-transform:uppercase;">Temp Delta</span></div>
            <div class="delta-box" id="press-box"><span class="delta-value" id="press-delta">-- mb</span><span style="font-size:0.5rem; text-transform:uppercase;">MSLP Gradient</span></div>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="ai-export-zone">
        <textarea id="ai-prompt-box" readonly>Waiting for forensic payload sync...</textarea>
        <button class="copy-btn" onclick="copyAIPrompt()">COPY v30.6 PAYLOAD FOR PROTOCOL ANALYSIS</button>
    </div>

    <script>
        const offices = [
            { id: "AMA", name: "Amarillo" }, { id: "LUB", name: "Lubbock" },
            { id: "MAF", name: "Midland" }, { id: "SJT", name: "San Angelo" },
            { id: "FWD", name: "Dallas/FW" }, { id: "SHV", name: "Shreveport" },
            { id: "BRO", name: "Brownsville" }, { id: "CRP", name: "Corpus Christi" },
            { id: "HGX", name: "Houston" }, { id: "EWX", name: "Austin/SA" }
        ];

        const authoritativeData = {};

        const fetchJSON = async (url) => {
            const proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;
            const response = await fetch(proxyUrl);
            return await response.json();
        };

        function createCard(o) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header"><span class="name">${o.name}</span><small>${o.id}</small></div>
                <div class="messages" id="msg-${o.id}">Acquiring payload...</div>
                <div class="forensic-ts" id="ts-${o.id}">TS: SCANNING</div>
            `;
            document.getElementById('grid').appendChild(card);
        }

        async function updateGradients() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=35.2,30.5&longitude=-101.8,-97.6&current=temperature_2m,pressure_msl&temperature_unit=fahrenheit`);
                const data = await res.json();
                const tDelta = Math.abs(Math.round(data[1].current.temperature_2m) - Math.round(data[0].current.temperature_2m));
                const pDeltaVal = (data[0].current.pressure_msl - data[1].current.pressure_msl).toFixed(1);
                
                document.getElementById('temp-delta').innerText = `${tDelta}°F`;
                document.getElementById('press-delta').innerText = `${pDeltaVal} mb`;

                // Section 7.4 MSLP Escalation Trigger (Threshold: 1.0 mb)
                if (Math.abs(parseFloat(pDeltaVal)) >= 1.0) {
                    document.getElementById('press-box').classList.add('escalation-trigger');
                }
            } catch (e) { }
        }

        async function loadAFD(wfo) {
            try {
                const list = await fetchJSON(`https://api.weather.gov/products/types/AFD/locations/${wfo}`);
                const items = list['@graph'].sort((a, b) => new Date(b.issuanceTime) - new Date(a.issuanceTime));
                const prodData = await fetchJSON(items[0]['@id']);
                
                // --- FORENSIC NORMALIZATION STEP ---
                const rawText = prodData.productText;
                
                // 1. Fix escaped newlines
                let cleanBody = rawText.replace(/\\n/g, '\n').replace(/\\t/g, '\t');
                
                // 2. Strip malformed leading 'n' (e.g. nIssued, nUpdated)
                cleanBody = cleanBody.replace(/n(?=Issued|Updated|KEY MESSAGES|SYNOPSIS)/g, '\n');

                // --- SCAN NORMALIZED BODY ---
                const timestampPattern = /(?:Issued|Updated) at (\d{1,4} (?:AM|PM) CDT[^\n]+)/i;
                const match = cleanBody.match(timestampPattern);
                const forensicTimestamp = match ? match[1].trim() : "NOT EXTRACTED (MANUAL READ REQUIRED)";

                let intel = "";
                if (cleanBody.includes("KEY MESSAGES")) intel = cleanBody.split("KEY MESSAGES")[1].split("&&")[0].trim();
                else if (cleanBody.includes(".SYNOPSIS...")) intel = cleanBody.split(".SYNOPSIS...")[1].split("&&")[0].trim();
                else intel = cleanBody.substring(0, 1000).trim();

                authoritativeData[wfo] = { forensicTimestamp, intel };
                
                document.getElementById(`msg-${wfo}`).innerText = intel;
                document.getElementById(`ts-${wfo}`).innerText = `TS: ${forensicTimestamp}`;
                updatePayload();
            } catch (err) {
                document.getElementById(`msg-${wfo}`).innerText = "Sync failure.";
            }
        }

        function updatePayload() {
            const mslp = document.getElementById('press-delta').innerText;
            const escalated = Math.abs(parseFloat(mslp)) >= 1.0;

            let p = `[VIZCAYA TACTICAL PAYLOAD v30.6]\n`;
            p += `GRADIENTS: Temp Delta ${document.getElementById('temp-delta').innerText} | MSLP ${mslp}\n`;
            p += `TRIGGER: ${escalated ? "ELEVATED MSLP ESCALATION (Section 7.4)" : "NOMINAL"}\n\n`;

            offices.forEach(o => {
                const d = authoritativeData[o.id];
                if (d) {
                    p += `[${o.id}] FORENSIC TIMESTAMP: ${d.forensicTimestamp}\n`;
                    p += `${d.intel}\n\n`;
                }
            });
            document.getElementById('ai-prompt-box').value = p;
        }

        function copyAIPrompt() {
            const box = document.getElementById('ai-prompt-box');
            box.select();
            navigator.clipboard.writeText(box.value);
            alert("v30.6 TACTICAL PAYLOAD COPIED TO CLIPBOARD.");
        }

        async function refreshAll() {
            await updateGradients();
            for (const o of offices) {
                document.getElementById('sync-display').innerText = `NORMALIZING BODY: ${o.id}`;
                await loadAFD(o.id);
                await new Promise(r => setTimeout(r, 800));
            }
            document.getElementById('sync-display').innerText = "SCAN COMPLETE | TEXAS DOMAIN v30.6";
        }

        offices.forEach(createCard);
        refreshAll();
    </script>
</body>
</html>
