<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Cast 24-Hour GFS Core</title>
    <style>
        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --border: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Container designed for 950px FB Landscape Screenshot */
        .snapshot-wrapper {
            width: 950px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .main-header {
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .main-header h1 {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .location-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .forecast-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        /* Header Row (Times) */
        .time-row th {
            background: #1e293b;
            color: var(--text-main);
            padding: 12px 0;
            font-size: 13px;
            font-weight: 800;
            border-bottom: 2px solid var(--accent);
        }

        .forecast-table td {
            padding: 10px 2px;
            text-align: center;
            border-bottom: 1px solid #1e293b;
            border-right: 1px solid #1e293b;
        }

        /* Metric Styling */
        .val-temp { font-size: 22px; font-weight: 900; display: block; }
        .val-dew { font-size: 15px; font-weight: 700; opacity: 0.9; }
        .val-wind { font-size: 13px; font-weight: 800; }
        .val-precip { font-size: 14px; font-weight: 800; color: #60a5fa; }
        
        .label { 
            font-size: 9px; 
            text-transform: uppercase; 
            color: var(--text-dim); 
            font-weight: 700;
            margin-bottom: 2px;
            display: block;
        }

        .icon-box { font-size: 28px; margin: 5px 0; }

        /* Dynamic Color Scales */
        .temp-hot { color: #f87171; }
        .temp-warm { color: #fbbf24; }
        .temp-mild { color: #34d399; }
        .temp-cool { color: #60a5fa; }

        .cape-tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 900;
        }
        .cape-high { background: #7e22ce; color: white; }
        .cape-med { background: #b91c1c; color: white; }
        .cape-low { background: #1e293b; color: #64748b; }

        #loading { padding: 50px; font-weight: bold; color: var(--accent); }

        .date-divider {
            background: #0f172a;
            color: var(--text-dim);
            font-size: 11px;
            text-align: center;
            padding: 5px;
            font-weight: bold;
            border-bottom: 1px solid #1e293b;
        }
    </style>
</head>
<body>

<div id="loading">📡 INITIALIZING HIGH-RESOLUTION GFS...</div>

<div id="content" style="display:none;">
    <!-- BLOCK 1: 0-12 HOURS -->
    <div class="snapshot-wrapper">
        <div class="main-header">
            <h1>Short-Range Forecast</h1>
            <div class="location-badge">📍 Round Rock, TX</div>
        </div>
        <div class="date-divider" id="date1">---</div>
        <table class="forecast-table">
            <thead><tr id="head1" class="time-row"></tr></thead>
            <tbody id="body1"></tbody>
        </table>
    </div>

    <!-- BLOCK 2: 13-24 HOURS -->
    <div class="snapshot-wrapper">
        <div class="main-header" style="background: linear-gradient(90deg, #1e293b, #475569);">
            <h1>Extended Outlook</h1>
            <div class="location-badge">Next 24 Hours</div>
        </div>
        <div class="date-divider" id="date2">---</div>
        <table class="forecast-table">
            <thead><tr id="head2" class="time-row"></tr></thead>
            <tbody id="body2"></tbody>
        </table>
    </div>
</div>

<script>
    const LAT = 30.5097, LON = -97.6921;

    function getWeatherIcon(code) {
        const map = { 0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️', 45:'🌫️', 51:'🌦️', 61:'🌧️', 80:'🌦️', 95:'⛈️' };
        return map[code] || '☁️';
    }

    function getTempClass(t) {
        if (t >= 90) return 'temp-hot';
        if (t >= 75) return 'temp-warm';
        if (t >= 60) return 'temp-mild';
        return 'temp-cool';
    }

    function getCapeClass(c) {
        if (c > 1500) return 'cape-high';
        if (c > 500) return 'cape-med';
        return 'cape-low';
    }

    function getWindDir(deg) {
        const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
        return dirs[Math.round(deg / 22.5) % 16];
    }

    async function init() {
        try {
            const url = `https://api.open-meteo.com/v1/gfs?latitude=${LAT}&longitude=${LON}&hourly=temperature_2m,relative_humidity_2m,dew_point_2m,precipitation_probability,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,cape&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=America/Chicago&forecast_days=2`;
            const res = await fetch(url);
            const data = await res.json();

            // Set date headers
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date1').innerText = new Date(data.hourly.time[0]).toLocaleDateString(undefined, options);
            document.getElementById('date2').innerText = new Date(data.hourly.time[12]).toLocaleDateString(undefined, options);

            const renderTable = (bodyId, headId, start) => {
                const head = document.getElementById(headId);
                const body = document.getElementById(bodyId);
                
                let rows = {
                    icon: '<tr>',
                    temp: '<tr>',
                    dew: '<tr>',
                    wind: '<tr>',
                    rain: '<tr>',
                    cape: '<tr>'
                };

                for(let i = start; i < start + 12; i++) {
                    const time = new Date(data.hourly.time[i]);
                    const hourStr = time.toLocaleTimeString([], { hour: 'numeric' });
                    const t = Math.round(data.hourly.temperature_2m[i]);
                    const d = Math.round(data.hourly.dew_point_2m[i]);
                    const cape = Math.round(data.hourly.cape[i]);
                    const rain = data.hourly.precipitation_probability[i];

                    head.innerHTML += `<th>${hourStr}</th>`;
                    
                    rows.icon += `<td><div class="icon-box">${getWeatherIcon(data.hourly.weather_code[i])}</div></td>`;
                    
                    rows.temp += `<td><span class="label">Temp</span><span class="val-temp ${getTempClass(t)}">${t}°</span></td>`;
                    
                    rows.dew += `<td><span class="label">Dew</span><span class="val-dew" style="color: #2dd4bf">${d}°</span></td>`;
                    
                    rows.wind += `<td><span class="label">Wind</span><div class="val-wind">${getWindDir(data.hourly.wind_direction_10m[i])} <span style="color:var(--text-dim)">${Math.round(data.hourly.wind_speed_10m[i])}</span></div><div style="font-size:9px; color:#ef4444; font-weight:bold">G${Math.round(data.hourly.wind_gusts_10m[i])}</div></td>`;
                    
                    rows.rain += `<td><span class="label">Rain %</span><span class="val-precip" style="opacity: ${rain > 0 ? 1 : 0.3}">${rain}%</span></td>`;
                    
                    rows.cape += `<td><span class="label">CAPE</span><span class="cape-tag ${getCapeClass(cape)}">${cape}</span></td>`;
                }
                
                body.innerHTML = rows.icon + '</tr>' + rows.temp + '</tr>' + rows.dew + '</tr>' + rows.wind + '</tr>' + rows.rain + '</tr>' + rows.cape + '</tr>';
            };

            // Find current hour to start forecast
            const nowHour = new Date().getHours();
            const startIndex = data.hourly.time.findIndex(t => new Date(t).getHours() === nowHour);
            const useIndex = startIndex >= 0 ? startIndex : 0;

            renderTable('body1', 'head1', useIndex);
            renderTable('body2', 'head2', useIndex + 12);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

        } catch (e) {
            console.error(e);
            document.getElementById('loading').innerText = "Error pulling GFS core data.";
        }
    }

    init();
</script>

</body>
</html>
