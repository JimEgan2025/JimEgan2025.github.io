<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24-Hour Detailed Forecast</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            padding: 15px;
        }

        .snapshot-container {
            width: 950px; /* Perfect width for Facebook landscape screenshots */
            margin: 0 auto 30px auto;
            background: #1e293b;
            border-radius: 12px;
            border: 2px solid #3b82f6;
            overflow: hidden;
        }

        .section-header {
            background: #3b82f6;
            color: white;
            padding: 12px;
            font-size: 22px;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            background: white;
        }

        th {
            background: #334155;
            color: white;
            padding: 10px 2px;
            font-size: 14px;
            border: 1px solid #475569;
        }

        td {
            padding: 12px 2px;
            border: 1px solid #e2e8f0;
            text-align: center;
            color: #1e293b;
            vertical-align: middle;
        }

        /* Large Data Styles */
        .time-label { font-weight: 900; font-size: 16px; color: #1e3a8a; }
        .temp-val { font-size: 24px; font-weight: 900; color: #b91c1c; }
        .dew-val { font-size: 18px; font-weight: 700; color: #0891b2; }
        .icon-box { font-size: 32px; margin: 4px 0; }
        
        .stat-label { font-size: 9px; color: #64748b; text-transform: uppercase; font-weight: bold; margin-top: 4px; }
        .stat-bold { font-weight: 800; font-size: 14px; }

        .cape-tag {
            display: inline-block;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 800;
        }
        .cape-none { background: #f1f5f9; color: #94a3b8; }
        .cape-active { background: #fee2e2; color: #dc2626; }

        #loading { text-align: center; padding: 100px; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

<div id="loading">📡 LOADING HOURLY GFS CORE...</div>

<div id="content" style="display:none;">
    <!-- FIRST 12 HOURS -->
    <div class="snapshot-container">
        <div class="section-header" id="header1">Immediate Forecast: Hours 1-12</div>
        <table id="table1">
            <thead><tr id="head1"></tr></thead>
            <tbody id="body1"></tbody>
        </table>
    </div>

    <!-- SECOND 12 HOURS -->
    <div class="snapshot-container">
        <div class="section-header" id="header2" style="background:#1e40af;">Extended Forecast: Hours 13-24</div>
        <table id="table2">
            <thead><tr id="head2"></tr></thead>
            <tbody id="body2"></tbody>
        </table>
    </div>
</div>

<script>
    const LAT = 30.5097, LON = -97.6921;

    function getWeatherIcon(code) {
        const map = { 0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️', 45:'🌫️', 51:'🌦️', 61:'🌧️', 80:'🌦️', 95:'⛈️' };
        return map[code] || '☁️';
    }

    function getWindDir(deg) {
        const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
        return dirs[Math.round(deg / 22.5) % 16];
    }

    async function init() {
        try {
            const url = `https://api.open-meteo.com/v1/gfs?latitude=${LAT}&longitude=${LON}&hourly=temperature_2m,relative_humidity_2m,dew_point_2m,precipitation_probability,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,cape&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=America/Chicago&forecast_days=2`;
            const res = await fetch(url);
            const data = await res.json();

            // Get current hour index
            const now = new Date();
            const currentHour = now.getHours();
            const startIndex = data.hourly.time.findIndex(t => new Date(t).getHours() === currentHour);

            const renderTable = (tableId, headId, start) => {
                const head = document.getElementById(headId);
                const body = document.getElementById(tableId).getElementsByTagName('tbody')[0];
                
                // Create Rows for different metrics
                const rowTime = document.createElement('tr');
                const rowIcon = document.createElement('tr');
                const rowTemp = document.createElement('tr');
                const rowDew = document.createElement('tr');
                const rowWind = document.createElement('tr');
                const rowRain = document.createElement('tr');
                const rowCape = document.createElement('tr');

                for(let i = start; i < start + 12; i++) {
                    const time = new Date(data.hourly.time[i]);
                    const hourStr = time.toLocaleTimeString([], { hour: 'numeric' });
                    
                    // Time Header
                    const th = document.createElement('th');
                    th.className = 'time-label';
                    th.innerHTML = hourStr;
                    head.appendChild(th);

                    // Icon
                    rowIcon.innerHTML += `<td><div class="icon-box">${getWeatherIcon(data.hourly.weather_code[i])}</div></td>`;
                    
                    // Temp
                    rowTemp.innerHTML += `<td><div class="stat-label">Temp</div><div class="temp-val">${Math.round(data.hourly.temperature_2m[i])}°</div></td>`;
                    
                    // Dew Point
                    rowDew.innerHTML += `<td><div class="stat-label">Dew</div><div class="dew-val">${Math.round(data.hourly.dew_point_2m[i])}°</div></td>`;
                    
                    // Wind
                    const wDir = getWindDir(data.hourly.wind_direction_10m[i]);
                    const wGust = Math.round(data.hourly.wind_gusts_10m[i]);
                    rowWind.innerHTML += `<td><div class="stat-label">Wind</div><div class="stat-bold">${wDir}</div><div style="font-size:11px">G${wGust}</div></td>`;
                    
                    // Rain
                    rowRain.innerHTML += `<td><div class="stat-label">Rain</div><div class="stat-bold">${data.hourly.precipitation_probability[i]}%</div></td>`;
                    
                    // CAPE
                    const cape = Math.round(data.hourly.cape[i]);
                    const capeCls = cape > 100 ? 'cape-active' : 'cape-none';
                    rowCape.innerHTML += `<td><div class="stat-label">Instab.</div><div class="cape-tag ${capeCls}">${cape}</div></td>`;
                }
                
                body.appendChild(rowIcon);
                body.appendChild(rowTemp);
                body.appendChild(rowDew);
                body.appendChild(rowWind);
                body.appendChild(rowRain);
                body.appendChild(rowCape);
            };

            renderTable('table1', 'head1', startIndex);
            renderTable('table2', 'head2', startIndex + 12);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

        } catch (e) {
            document.getElementById('loading').innerText = "Error Loading Forecast Data.";
        }
    }

    init();
</script>

</body>
</html>
