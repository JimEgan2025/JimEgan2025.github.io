<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vizcaya | High-Density Intercept v12</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #00ffcc; --bg: #020617; --dryline: #fb923c; --moist: #22d3ee; --alert: #ef4444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #main-container { display: flex; flex: 1; position: relative; overflow: hidden; }
        #sidebar { width: 350px; background: #010409; border-right: 1px solid #1e293b; padding: 15px; z-index: 10; display: flex; flex-direction: column; }
        #map { flex: 1; background: #0b1120; }

        .header h2 { color: var(--primary); font-size: 0.7rem; letter-spacing: 2px; margin: 0; text-transform: uppercase; border-bottom: 1px solid #1e293b; padding-bottom: 8px; }
        .summary-box { background: rgba(0, 255, 204, 0.05); border: 1px solid var(--primary); padding: 12px; border-radius: 8px; font-size: 0.75rem; line-height: 1.5; margin: 15px 0; border-left: 4px solid var(--primary); }
        .alert-box { border: 1px solid var(--alert); background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px; font-size: 0.7rem; color: #fecaca; }
        
        /* Bottom Data Strip */
        #footer-grid { height: 90px; background: #010409; border-top: 1px solid #1e293b; display: flex; overflow-x: auto; align-items: center; padding: 0 15px; gap: 10px; white-space: nowrap; }
        .stat-card { min-width: 110px; background: #0f172a; padding: 8px; border-radius: 6px; font-size: 0.62rem; border-bottom: 3px solid #334155; flex-shrink: 0; }
        .is-dry { border-bottom-color: var(--dryline); }
        .is-moist { border-bottom-color: var(--moist); }
        .nm { color: #facc15; font-weight: bold; }

        /* Timeline Controls */
        .timeline-container { position: absolute; top: 20px; right: 20px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); padding: 10px 20px; border-radius: 30px; border: 1px solid #334155; z-index: 1000; display: flex; align-items: center; gap: 15px; width: 320px; }
        input[type=range] { flex: 1; accent-color: var(--primary); cursor: pointer; }
        #hrLabel { font-family: monospace; color: var(--primary); font-weight: 900; width: 55px; text-align: right; }
        
        #footer-grid::-webkit-scrollbar { height: 4px; }
        #footer-grid::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="sidebar">
        <div class="header"><h2>VIZCAYA | WESTERN WALL</h2></div>
        <div class="summary-box" id="summary">Scanning Central TX moisture gate...</div>
        <div class="alert-box">
            <strong>DRYLINE PROXIMITY:</strong> <span id="v-status" style="font-weight:bold;">TRACKING</span><br>
            <small id="v-detail">Loading high-resolution station data.</small>
        </div>
    </div>
    <div id="map"></div>
    <div class="timeline-container">
        <b style="color:var(--primary); font-size:0.6rem;">TIMELINE:</b>
        <input type="range" id="ts" min="0" max="24" value="0">
        <span id="hrLabel">NOW</span>
    </div>
</div>

<div id="footer-grid"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const stations = [
    // SLICE 1: FAR NORTH
    { name: "Guymon", lat: 36.68, lon: -101.48, slice: 1, state: "OK" }, 
    { name: "Clayton", lat: 36.45, lon: -103.18, slice: 1, state: "NM" },
    { name: "Dalhart", lat: 36.02, lon: -102.52, slice: 1, state: "TX" },
    { name: "Amarillo", lat: 35.22, lon: -101.83, slice: 1, state: "TX" },
    { name: "Childress", lat: 34.42, lon: -100.20, slice: 1, state: "TX" },

    // SLICE 2: NORTH CENTRAL
    { name: "Tucumcari", lat: 35.17, lon: -103.72, slice: 2, state: "NM" },
    { name: "Clovis", lat: 34.40, lon: -103.20, slice: 2, state: "NM" },
    { name: "Lubbock", lat: 33.57, lon: -101.85, slice: 2, state: "TX" },
    { name: "Guthrie", lat: 33.62, lon: -100.32, slice: 2, state: "TX" },
    { name: "Vernon", lat: 34.15, lon: -99.28, slice: 2, state: "TX" },
    { name: "Wichita Falls", lat: 33.91, lon: -98.49, slice: 2, state: "TX" },

    // SLICE 3: CENTRAL
    { name: "Roswell", lat: 33.39, lon: -104.52, slice: 3, state: "NM" },
    { name: "Lovington", lat: 32.91, lon: -103.35, slice: 3, state: "NM" },
    { name: "Snyder", lat: 32.71, lon: -100.91, slice: 3, state: "TX" },
    { name: "Abilene", lat: 32.44, lon: -99.73, slice: 3, state: "TX" },
    { name: "Dallas", lat: 32.78, lon: -96.80, slice: 3, state: "TX" },

    // SLICE 4: THE VIZCAYA LATITUDE (THE WESTERN WALL)
    { name: "Midland", lat: 31.99, lon: -102.07, slice: 4, state: "TX" },
    { name: "San Angelo", lat: 31.46, lon: -100.43, slice: 4, state: "TX" },
    { name: "Brownwood", lat: 31.71, lon: -98.98, slice: 4, state: "TX" },
    { name: "Comanche", lat: 31.89, lon: -98.60, slice: 4, state: "TX" },
    { name: "Hamilton", lat: 31.70, lon: -98.12, slice: 4, state: "TX" },
    { name: "Burnet", lat: 30.74, lon: -98.24, slice: 4, state: "TX" },
    { name: "Vizcaya", lat: 30.587, lon: -97.641, slice: 4, state: "TX" },

    // SLICE 5: SOUTH HEART
    { name: "Fort Stockton", lat: 30.89, lon: -102.87, slice: 5, state: "TX" },
    { name: "Sonora", lat: 30.57, lon: -100.64, slice: 5, state: "TX" },
    { name: "Mason", lat: 30.75, lon: -99.23, slice: 5, state: "TX" },
    { name: "Llano", lat: 30.75, lon: -98.67, slice: 5, state: "TX" },
    { name: "Goldthwaite", lat: 31.45, lon: -98.57, slice: 5, state: "TX" },
    { name: "Junction", lat: 30.49, lon: -99.77, slice: 5, state: "TX" },
    { name: "Fredericksburg", lat: 30.24, lon: -98.91, slice: 5, state: "TX" },
    { name: "Johnson City", lat: 30.27, lon: -98.41, slice: 5, state: "TX" },
    { name: "Austin", lat: 30.26, lon: -97.74, slice: 5, state: "TX" },

    // SLICE 6: SOUTHERN BORDER
    { name: "Alpine", lat: 30.36, lon: -103.66, slice: 6, state: "TX" },
    { name: "Rocksprings", lat: 30.01, lon: -100.17, slice: 6, state: "TX" },
    { name: "Del Rio", lat: 29.37, lon: -100.90, slice: 6, state: "TX" }
];

const map = L.map('map', { zoomControl: false }).setView([32.0, -100.0], 6.5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let weatherCache = {};
const lineLayer = L.layerGroup().addTo(map);
const markerLayer = L.layerGroup().addTo(map);
const currentHr = new Date().getHours();

async function init() {
    for (let s of stations) {
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lon}&hourly=temperature_2m,dewpoint_2m&temperature_unit=fahrenheit&timezone=America/Chicago`);
            weatherCache[s.name] = await r.json();
        } catch (e) { console.error("Fetch failed", s.name); }
    }
    render(0);
}

function render(offset) {
    lineLayer.clearLayers(); markerLayer.clearLayers();
    const footer = document.getElementById('footer-grid'); footer.innerHTML = "";
    const idx = currentHr + parseInt(offset);
    let pts = [];
    
    const viz = stations.find(s => s.name === "Vizcaya");
    let closestDryLon = -106;

    for (let i = 1; i <= 6; i++) {
        const sliceSet = stations.filter(s => s.slice === i).sort((a, b) => a.lon - b.lon);
        for (let j = 0; j < sliceSet.length - 1; j++) {
            const stA = sliceSet[j]; const stB = sliceSet[j+1];
            const dwA = weatherCache[stA.name]?.hourly.dewpoint_2m[idx];
            const dwB = weatherCache[stB.name]?.hourly.dewpoint_2m[idx];
            
            if (dwA <= 48 && dwB > 48) {
                const midLon = (stA.lon + stB.lon)/2;
                const midLat = (stA.lat + stB.lat)/2;
                pts.push([midLat, midLon]);
                if (Math.abs(midLat - viz.lat) < 1.2) closestDryLon = Math.max(closestDryLon, midLon);
                break;
            }
        }
    }

    const distToViz = Math.round(Math.abs(viz.lon - closestDryLon) * 55);
    const statusEl = document.getElementById('v-status');
    const detailEl = document.getElementById('v-detail');

    if (distToViz < 45) {
        statusEl.innerText = "IMMINENT"; statusEl.style.color = "var(--alert)";
        detailEl.innerText = `Line is crossing the Hill Country (~${distToViz} mi away).`;
    } else {
        statusEl.innerText = "MONITORING"; statusEl.style.color = "var(--primary)";
        detailEl.innerText = `Dryline boundary is ${distToViz} miles West of Vizcaya.`;
    }

    if (pts.length > 1) {
        pts.sort((a, b) => b[0] - a[0]);
        L.polyline(pts, { color: '#fb923c', weight: 5, dashArray: '10, 15', opacity: 0.8 }).addTo(lineLayer);
        document.getElementById('summary').innerHTML = `<b>DRYLINE SUMMARY:</b> T+${offset}H<br>Gradient identified at <b>${Math.abs(pts[0][1]).toFixed(1)}°W</b>. Focus on the <b>Llano/Burnet</b> gate.`;
    }

    stations.sort((a,b) => a.lon - b.lon).forEach(s => {
        const h = weatherCache[s.name]?.hourly;
        if(!h) return;
        const dw = Math.round(h.dewpoint_2m[idx]);
        const temp = Math.round(h.temperature_2m[idx]);
        const dry = dw <= 48;

        const card = document.createElement('div');
        card.className = `stat-card ${dry ? 'is-dry' : 'is-moist'}`;
        card.innerHTML = `<span class="${s.state === 'NM' ? 'nm' : ''}" style="font-size:0.5rem; color:#94a3b8; font-weight:bold;">${s.name.toUpperCase()}</span><br><b>${temp}° / ${dw}°</b>`;
        footer.appendChild(card);

        L.circleMarker([s.lat, s.lon], { 
            radius: s.name === "Vizcaya" ? 10 : 4, 
            color: s.name === "Vizcaya" ? '#fff' : (dry ? '#fb923c' : '#22d3ee'),
            weight: s.name === "Vizcaya" ? 4 : 1,
            fillOpacity: 1 
        }).addTo(markerLayer).bindPopup(`<b>${s.name}</b><br>Dewpoint: ${dw}°F`);
    });

    document.getElementById('hrLabel').innerText = offset == 0 ? "NOW" : "+" + offset + "H";
}

document.getElementById('ts').oninput = (e) => render(e.target.value);
init();
</script>
</body>
</html>
