<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vizcaya | Full Column v27</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #00ffcc; --bg: #020617; --dryline: #fb923c; --moist: #22d3ee; --alert: #ef4444; --insight: #a855f7; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #main-container { display: flex; flex: 1; position: relative; overflow: hidden; }
        #sidebar { width: 340px; background: #010409; border-right: 1px solid #1e293b; padding: 15px; z-index: 10; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        #map { flex: 1; background: #0b1120; }
        .header h2 { color: var(--primary); font-size: 0.7rem; letter-spacing: 2px; margin: 0; text-transform: uppercase; border-bottom: 1px solid #1e293b; padding-bottom: 8px; }
        .cap-box { background: rgba(168, 85, 247, 0.1); border: 1px solid var(--insight); padding: 10px; border-radius: 8px; font-size: 0.75rem; }
        .range-tool { background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 8px; font-size: 0.7rem; margin-top: auto; }
        #footer-grid { height: 95px; background: #010409; border-top: 1px solid #1e293b; display: flex; overflow-x: auto; align-items: center; padding: 0 15px; gap: 10px; white-space: nowrap; }
        .stat-card { min-width: 110px; background: #0f172a; padding: 8px; border-radius: 6px; font-size: 0.62rem; border-bottom: 3px solid #334155; flex-shrink: 0; }
        .is-dry { border-bottom-color: var(--dryline); }
        .is-moist { border-bottom-color: var(--moist); }
        .timeline-container { position: absolute; top: 20px; right: 20px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); padding: 10px 20px; border-radius: 30px; border: 1px solid #334155; z-index: 1000; display: flex; align-items: center; gap: 15px; width: 320px; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="sidebar">
        <div class="header"><h2>VIZCAYA | FULL COLUMN</h2></div>
        
        <div class="cap-box">
            <strong>ATMOSPHERIC LAYERS (VIZCAYA)</strong><br>
            <div style="margin-top:5px; display:flex; justify-content:space-between;">
                <span>700mb (The Lid):</span> <b id="cap-700">--°C</b>
            </div>
            <div style="display:flex; justify-content:space-between;">
                <span>500mb (Steering):</span> <b id="cap-500">--°C</b>
            </div>
            <hr style="border:0; border-top:1px solid #334155; margin:8px 0;">
            <small id="cap-status">Initializing sensors...</small>
        </div>

        <div class="range-tool">
            <b>PROXIMITY RADAR</b><br>
            <span id="dist-val" style="font-size:1.2rem; color:var(--primary); font-family:monospace;">-- MILES</span><br>
            <small id="station-name" style="color:#64748b; text-transform: uppercase;">SELECT NODE</small>
        </div>
    </div>
    <div id="map"></div>
    <div class="timeline-container">
        <input type="range" id="ts" min="0" max="24" value="0" style="flex:1; accent-color:var(--primary);">
        <span id="hrLabel" style="font-family:monospace; color:var(--primary); width:40px; text-align:right;">NOW</span>
    </div>
</div>
<div id="footer-grid"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const V_LAT = 30.587; const V_LON = -97.641;
const stations = [
    { name: "Clayton NM", lat: 36.45, lon: -103.18, s: 1 }, { name: "Amarillo", lat: 35.22, lon: -101.83, s: 1 }, { name: "Childress", lat: 34.42, lon: -100.20, s: 1 },
    { name: "Clovis NM", lat: 34.40, lon: -103.20, s: 2 }, { name: "Lubbock", lat: 33.57, lon: -101.85, s: 2 }, { name: "Brownfield", lat: 33.18, lon: -102.27, s: 2 }, { name: "Lamesa", lat: 32.73, lon: -101.95, s: 2 }, { name: "Wichita Falls", lat: 33.91, lon: -98.49, s: 2 },
    { name: "Snyder", lat: 32.71, lon: -100.91, s: 3 }, { name: "Abilene", lat: 32.44, lon: -99.73, s: 3 }, { name: "Breckenridge", lat: 32.75, lon: -98.90, s: 3 }, { name: "Stephenville", lat: 32.22, lon: -98.20, s: 3 }, { name: "Fort Worth", lat: 32.75, lon: -97.33, s: 3 }, { name: "Dallas", lat: 32.78, lon: -96.80, s: 3 }, { name: "Waco", lat: 31.56, lon: -97.13, s: 3 },
    { name: "Roswell NM", lat: 33.39, lon: -104.52, s: 4 }, { name: "Kermit", lat: 31.85, lon: -103.09, s: 4 }, { name: "Midland", lat: 31.99, lon: -102.07, s: 4 }, { name: "Odessa", lat: 31.84, lon: -102.36, s: 4 }, { name: "Big Spring", lat: 32.25, lon: -101.47, s: 4 }, { name: "San Angelo", lat: 31.46, lon: -100.43, s: 4 }, { name: "Brownwood", lat: 31.71, lon: -98.98, s: 4 }, { name: "Vizcaya", lat: V_LAT, lon: V_LON, s: 4 },
    { name: "Van Horn", lat: 31.04, lon: -104.83, s: 5 }, { name: "Fort Davis", lat: 30.58, lon: -103.89, s: 5 }, { name: "Fort Stockton", lat: 30.89, lon: -102.87, s: 5 }, { name: "Big Lake", lat: 31.19, lon: -101.46, s: 5 }, { name: "Sheffield", lat: 30.69, lon: -101.83, s: 5 }, { name: "Iraan", lat: 30.91, lon: -101.90, s: 5 }, { name: "Eldorado", lat: 30.86, lon: -100.60, s: 5 }, { name: "Sonora", lat: 30.57, lon: -100.64, s: 5 }, { name: "Menard", lat: 30.92, lon: -99.79, s: 5 }, { name: "Brady", lat: 31.13, lon: -99.33, s: 5 }, { name: "Mason", lat: 30.75, lon: -99.23, s: 5 }, { name: "Junction", lat: 30.49, lon: -99.77, s: 5 }, { name: "Rocksprings", lat: 30.01, lon: -100.17, s: 5 }, { name: "Llano", lat: 30.75, lon: -98.67, s: 5 }, { name: "Burnet", lat: 30.74, lon: -98.24, s: 5 }, { name: "Fredericksburg", lat: 30.24, lon: -98.91, s: 5 }, { name: "Austin", lat: 30.26, lon: -97.74, s: 5 },
    { name: "El Paso", lat: 31.76, lon: -106.48, s: 6 }, { name: "Alpine", lat: 30.36, lon: -103.66, s: 6 }, { name: "Ozona", lat: 30.71, lon: -101.20, s: 6 }, { name: "Del Rio", lat: 29.37, lon: -100.90, s: 6 },
    { name: "San Antonio", lat: 29.42, lon: -98.49, s: 7 }, { name: "Uvalde", lat: 29.21, lon: -99.79, s: 7 }, { name: "Victoria", lat: 28.85, lon: -96.92, s: 7 }, { name: "Gonzales", lat: 29.50, lon: -97.45, s: 7 }, { name: "La Grange", lat: 29.90, lon: -96.87, s: 7 }
];

const map = L.map('map', { zoomControl: false }).setView([31.5, -100.5], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let weatherCache = {}; let columnCache = null;
const lineLayer = L.layerGroup().addTo(map);
const markerLayer = L.layerGroup().addTo(map);
const currentHr = new Date().getHours();

async function init() {
    for (let s of stations) {
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lon}&hourly=temperature_2m,dewpoint_2m,winddirection_10m&temperature_unit=fahrenheit&timezone=America/Chicago`);
            weatherCache[s.name] = await r.json();
        } catch (e) { console.error(s.name); }
    }
    const colR = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${V_LAT}&longitude=${V_LON}&hourly=temperature_700hPa,temperature_500hPa&timezone=America/Chicago`);
    columnCache = await colR.json();
    render(0);
}

function render(offset) {
    lineLayer.clearLayers(); markerLayer.clearLayers();
    const idx = currentHr + parseInt(offset);
    const footer = document.getElementById('footer-grid'); footer.innerHTML = "";

    // Atmospheric Column Update
    const t700 = columnCache?.hourly.temperature_700hPa[idx];
    const t500 = columnCache?.hourly.temperature_500hPa[idx];
    document.getElementById('cap-700').innerText = t700 ? t700.toFixed(1) + "°C" : "--°C";
    document.getElementById('cap-500').innerText = t500 ? t500.toFixed(1) + "°C" : "--°C";
    
    if(t700 > 12) document.getElementById('cap-status').innerText = "Hard Cap: Storms unlikely.";
    else if(t700 > 8) document.getElementById('cap-status').innerText = "Moderate Cap: Dynamic lift needed.";
    else document.getElementById('cap-status').innerText = "Weak Cap: Convection active.";

    let pts = [];
    for (let i = 1; i <= 7; i++) {
        const slice = stations.filter(st => st.s === i).sort((a, b) => a.lon - b.lon);
        for (let j = 0; j < slice.length - 1; j++) {
            const hA = weatherCache[slice[j].name]?.hourly;
            const hB = weatherCache[slice[j+1].name]?.hourly;
            if (hA && hB && hA.dewpoint_2m[idx] <= 48 && hB.dewpoint_2m[idx] > 48) {
                pts.push([(slice[j].lat + slice[j+1].lat)/2, (slice[j].lon + slice[j+1].lon)/2]);
            }
        }
    }
    if (pts.length > 1) {
        pts.sort((a, b) => b[0] - a[0]);
        L.polyline(pts, { color: '#fb923c', weight: 4, dashArray: '10, 15', opacity: 0.8 }).addTo(lineLayer);
    }

    stations.forEach(s => {
        const h = weatherCache[s.name]?.hourly; if(!h) return;
        const dw = Math.round(h.dewpoint_2m[idx]); const temp = Math.round(h.temperature_2m[idx]);
        const dry = dw <= 48;
        
        const card = document.createElement('div');
        card.className = `stat-card ${dry ? 'is-dry' : 'is-moist'}`;
        card.innerHTML = `<span style="font-size:0.5rem; color:#94a3b8;">${s.name.toUpperCase()}</span><br><b>${temp}° / ${dw}°</b>`;
        footer.appendChild(card);

        const m = L.circleMarker([s.lat, s.lon], { 
            radius: s.name === "Vizcaya" ? 8 : 4, 
            color: s.name === "Vizcaya" ? '#fff' : (dry ? '#fb923c' : '#22d3ee'), 
            weight: 2, 
            fillOpacity: 1 
        }).addTo(markerLayer);
        
        m.bindPopup(`<b>${s.name}</b><br>Dewpoint: ${dw}°F<br>Temp: ${temp}°F`);
        
        m.on('click', () => {
            const d = (Math.sqrt(Math.pow(s.lat-V_LAT,2)+Math.pow(s.lon-V_LON,2)) * 69).toFixed(0);
            document.getElementById('dist-val').innerText = d + " MILES";
            document.getElementById('station-name').innerText = "FROM " + s.name;
        });
    });
}
document.getElementById('ts').oninput = (e) => {
    document.getElementById('hrLabel').innerText = e.target.value == 0 ? "NOW" : "+" + e.target.value + "H";
    render(e.target.value);
};
init();
</script>
</body>
</html>
