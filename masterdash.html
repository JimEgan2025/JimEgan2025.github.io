<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Master Weather Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: #e6f0ff;
    height: 100vh;
    overflow: hidden;
}

header {
    padding: 10px 14px;
    background: #111a2e;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #223;
    height: 48px;
    box-sizing: border-box;
}

h1 {
    font-size: 16px;
    margin: 0;
}

.risk-badge {
    padding: 6px 10px;
    border-radius: 6px;
    font-weight: bold;
    background: #2b3b55;
}

.container {
    display: flex;
    height: calc(100vh - 48px);
}

.sidebar {
    width: 220px;
    background: #0f1930;
    border-right: 1px solid #22304a;
    padding: 10px;
    box-sizing: border-box;
    overflow-y: auto;
}

.tab {
    padding: 10px;
    margin-bottom: 6px;
    background: #16223d;
    border: 1px solid #22304a;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
}

.tab:hover {
    background: #1c2b4a;
}

.tab.active {
    background: #2b3f66;
    border-color: #3a5aa3;
}

.viewer {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.viewer-header {
    padding: 8px 10px;
    background: #111a2e;
    border-bottom: 1px solid #22304a;
    font-size: 13px;
}

iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: white;
}
</style>
</head>

<body>

<header>
    <h1>Master Weather Dashboard</h1>
    <div class="risk-badge" id="riskBadge">Risk: NORMAL</div>
</header>

<div class="container">
    <div class="sidebar">
        <div class="tab active" onclick="loadPage('alerts', this)">⚠ Alerts</div>
        <div class="tab" onclick="loadPage('afd', this)">AFD</div>
        <div class="tab" onclick="loadPage('almanac', this)">Almanac</div>
        <div class="tab" onclick="loadPage('backyard', this)">Backyard</div>
        <div class="tab" onclick="loadPage('command', this)">Command</div>
        <div class="tab" onclick="loadPage('county', this)">County</div>
        <div class="tab" onclick="loadPage('forecast', this)">Forecast</div>
        <div class="tab" onclick="loadPage('forecast7day', this)">Forecast 7day</div>
        <div class="tab" onclick="loadPage('mobilewx', this)">MobileWX</div>
        <div class="tab" onclick="loadPage('muggy', this)">Muggy Meter</div>
        <div class="tab" onclick="loadPage('nws', this)">NWS</div>
        <div class="tab" onclick="loadPage('500mb', this)">500mb</div>
        <div class="tab" onclick="loadPage('radar', this)">Radar</div>
        <div class="tab" onclick="loadPage('rain', this)">Rain Meter</div>
        <div class="tab" onclick="loadPage('rev_dash', this)">VC 14 Day</div>
        <div class="tab" onclick="loadPage('risk', this)">Risk</div>
        <div class="tab" onclick="loadPage('spc', this)">SPC</div>
        <div class="tab" onclick="loadPage('tropical', this)">Tropical</div>
    </div>

    <div class="viewer">
        <div class="viewer-header" id="viewerTitle">Alerts</div>
        <iframe id="frame" src="https://jimegan2025.github.io/alerts.html" title="Weather dashboard content"></iframe>
    </div>
</div>

<script>
const pages = {
    alerts: "https://jimegan2025.github.io/alerts.html",
    afd: "https://jimegan2025.github.io/afd.html",
    almanac: "https://jimegan2025.github.io/almanac.html",
    backyard: "https://jimegan2025.github.io/backyard.html",
    command: "https://jimegan2025.github.io/command.html",
    county: "https://jimegan2025.github.io/county.html",
    forecast: "https://jimegan2025.github.io/forecast24hr.html",
    forecast7day: "https://jimegan2025.github.io/forecast7day.html",
    mobilewx: "https://jimegan2025.github.io/mobilewx.html",
    muggy: "https://jimegan2025.github.io/muggyMeter.html",
    nws: "https://jimegan2025.github.io/nwsoffices.html",
    "500mb": "https://www.spc.noaa.gov/exper/mesoanalysis/s19/500mb/500mb_sf.gif",
    radar: "https://jimegan2025.github.io/masterrad.html",
    rain: "https://jimegan2025.github.io/rainMeter.html",
    rev_dash: "https://jimegan2025.github.io/rev_dash.html",
    risk: "https://jimegan2025.github.io/risk.html",
    spc: "https://jimegan2025.github.io/spcwpc.html",
    tropical: "https://jimegan2025.github.io/tropical.html"
};

const titles = {
    alerts: "Alerts",
    afd: "AFD",
    almanac: "Almanac",
    backyard: "Backyard",
    command: "Command",
    county: "County",
    forecast: "Forecast",
    forecast7day: "Forecast 7day",
    mobilewx: "MobileWX",
    muggy: "Muggy Meter",
    nws: "NWS",
    "500mb": "500mb",
    radar: "Radar",
    rain: "Rain Meter",
    rev_dash: "VC 14 Day",
    risk: "Risk",
    spc: "SPC",
    tropical: "Tropical"
};

function loadPage(key, el) {
    document.getElementById("frame").src = pages[key];
    document.getElementById("viewerTitle").innerText = titles[key];
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
}
</script>

</body>
</html>
