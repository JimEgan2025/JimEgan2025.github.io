<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizcaya 7-Day Impact Dashboard</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Arial Black', sans-serif; 
            background:#111827; 
            color:#fff;
            padding: 20px;
        }

        .dashboard-container {
            width: 1000px; /* Optimal width for Facebook high-res landscape */
            margin: 0 auto 40px auto;
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header {
            background: #1e3a8a;
            padding: 20px;
            text-align: center;
            border-bottom: 6px solid #3b82f6;
        }
        .header h1 { font-size: 38px; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        .header p { font-size: 20px; color: #bfdbfe; font-weight: bold; }

        /* The 7-Day Grid */
        .grid-7-day {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: #e2e8f0;
            gap: 2px;
            border-bottom: 2px solid #e2e8f0;
        }

        .day-column {
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 5px;
            text-align: center;
        }

        .day-name { color: #1e3a8a; font-size: 22px; font-weight: 900; }
        .day-date { color: #64748b; font-size: 14px; margin-bottom: 10px; }

        .weather-icon { font-size: 55px; margin: 10px 0; min-height: 70px; }
        
        .temp-group { margin: 10px 0; }
        .hi-temp { color: #b91c1c; font-size: 38px; font-weight: 900; display: block; line-height: 1; }
        .lo-temp { color: #1d4ed8; font-size: 26px; font-weight: 900; display: block; margin-top: 5px; }

        .stat-box {
            width: 90%;
            background: #f1f5f9;
            border-radius: 8px;
            padding: 8px 2px;
            margin-top: 10px;
            border: 1px solid #cbd5e1;
        }
        .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: 900; }
        .stat-val { font-size: 14px; color: #1e293b; font-weight: 900; }

        .severity-tag {
            width: 100%;
            padding: 5px 0;
            margin-top: 10px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
        }
        .sev-none { color: #059669; }
        .sev-mod { color: #d97706; background: #fff7ed; }
        .sev-high { color: #fff; background: #dc2626; }

        .almanac-box {
            grid-column: span 7;
            background: #f8fafc;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .almanac-cell {
            padding: 10px 2px;
            font-size: 11px;
            color: #475569;
            text-align: center;
            border-right: 1px solid #e2e8f0;
            line-height: 1.3;
        }

        .footer {
            background: #1e293b;
            color: #94a3b8;
            padding: 15px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }

        #status { color: #fff; text-align: center; padding: 100px; font-size: 24px; }
    </style>
</head>
<body>

<div id="status">📡 SYNCHRONIZING GFS WEATHER MODELS...</div>

<!-- WEEK 1 PANEL -->
<div class="dashboard-container" id="week1-container" style="display:none;">
    <div class="header">
        <h1>WEEK 1 FORECAST</h1>
        <p>Round Rock, Texas • Vizcaya Weather Center</p>
    </div>
    <div class="grid-7-day" id="grid-week1"></div>
    <div class="almanac-box" id="almanac-week1"></div>
    <div class="footer">Source: Open-Meteo GFS | Almanac: Jim Egan Archives</div>
</div>

<!-- WEEK 2 PANEL -->
<div class="dashboard-container" id="week2-container" style="display:none;">
    <div class="header" style="background:#334155;">
        <h1>WEEK 2 EXTENDED</h1>
        <p>Round Rock, Texas • Trend Analysis</p>
    </div>
    <div class="grid-7-day" id="grid-week2"></div>
    <div class="almanac-box" id="almanac-week2"></div>
    <div class="footer">Note: Accuracy decreases beyond Day 7</div>
</div>

<script>
    const LAT = 30.509747, LON = -97.692116;
    const ALMANAC_JSON_URL = 'https://JimEgan2025.github.io/almanac.json';

    const getWindDir = deg => ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(deg / 22.5) % 16];
    
    function getWeatherUI(code) {
        const mapping = {
            0: {icon:'☀️',desc:'Clear'}, 1:{icon:'🌤️',desc:'M. Clear'}, 2:{icon:'⛅',desc:'P. Cloudy'}, 
            3:{icon:'☁️',desc:'Cloudy'}, 45:{icon:'🌫️',desc:'Fog'}, 51:{icon:'🌦️',desc:'Drizzle'}, 
            61:{icon:'🌧️',desc:'Rain'}, 80:{icon:'🌦️',desc:'Showers'}, 95:{icon:'⛈️',desc:'T-Storms'}
        };
        return mapping[code] || {icon:'☁️',desc:'Cloudy'};
    }

    function getSeverity(cape, li) {
        if (cape >= 1500 || li <= -5) return {text:'⚠️ SEVERE',cls:'sev-high'};
        if (cape >= 500 || li <= -2) return {text:'MODERATE',cls:'sev-mod'};
        return {text:'STABLE',cls:'sev-none'};
    }

    async function init() {
        try {
            const almRes = await fetch(ALMANAC_JSON_URL);
            const almData = await almRes.json();

            const url = `https://api.open-meteo.com/v1/gfs?latitude=${LAT}&longitude=${LON}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,wind_speed_10m_max,wind_gusts_10m_max,wind_direction_10m_dominant,weather_code&hourly=cape,lifted_index&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=America/Chicago&forecast_days=15`;
            const res = await fetch(url);
            const data = await res.json();

            document.getElementById('status').style.display = 'none';
            document.getElementById('week1-container').style.display = 'block';
            document.getElementById('week2-container').style.display = 'block';

            const renderWeek = (gridId, almId, startIdx) => {
                const grid = document.getElementById(gridId);
                const almBox = document.getElementById(almId);

                for(let i = startIdx; i < startIdx + 7; i++) {
                    const dateRaw = data.daily.time[i];
                    const d = new Date(dateRaw + 'T00:00:00');
                    const dayName = d.toLocaleDateString('en-US', {weekday:'short'}).toUpperCase();
                    const dateStr = d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
                    const mmdd = dateRaw.slice(5);
                    const ui = getWeatherUI(data.daily.weather_code[i]);
                    const h = Math.round(data.daily.temperature_2m_max[i]);
                    const l = Math.round(data.daily.temperature_2m_min[i]);
                    
                    const maxCape = Math.round(Math.max(...data.hourly.cape.slice(i*24, (i+1)*24)));
                    const minLI = Math.min(...data.hourly.lifted_index.slice(i*24, (i+1)*24)).toFixed(1);
                    const sev = getSeverity(maxCape, minLI);
                    
                    const windDir = getWindDir(data.daily.wind_direction_10m_dominant[i]);
                    const windGust = Math.round(data.daily.wind_gusts_10m_max[i]);

                    // Day Column
                    grid.innerHTML += `
                        <div class="day-column">
                            <div class="day-name">${dayName}</div>
                            <div class="day-date">${dateStr}</div>
                            <div class="weather-icon">${ui.icon}</div>
                            <div class="temp-group">
                                <span class="hi-temp">${h}°</span>
                                <span class="lo-temp">${l}°</span>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Rain</div>
                                <div class="stat-val">${data.daily.precipitation_probability_max[i]}%</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Wind Gust</div>
                                <div class="stat-val">${windDir} ${windGust}</div>
                            </div>
                            <div class="severity-tag ${sev.cls}">${sev.text}</div>
                        </div>
                    `;

                    // Almanac Cell
                    const a = almData[mmdd] || {avgH:'--', avgL:'--', recH:'--', recHY:'--', recL:'--', recLY:'--'};
                    almBox.innerHTML += `
                        <div class="almanac-cell">
                            <b>AVG: ${a.avgH}/${a.avgL}</b><br>
                            REC HI: ${a.recH} (${a.recHY})<br>
                            REC LO: ${a.recL} (${a.recLY})
                        </div>
                    `;
                }
            };

            renderWeek('grid-week1', 'almanac-week1', 1);
            renderWeek('grid-week2', 'almanac-week2', 8);

        } catch (e) {
            document.getElementById('status').innerText = "Sync Error. Please try again.";
        }
    }

    init();
</script>

</body>
</html>
