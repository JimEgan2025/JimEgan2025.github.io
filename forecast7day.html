<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizcaya High-Res Impact Dashboard</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Arial Black', sans-serif; 
            background:#0f172a; 
            color:#fff;
            padding: 10px;
            display: flex; 
            flex-direction: column;
            align-items: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1100px;
            margin-bottom: 40px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        .header {
            background: linear-gradient(180deg, #0f172a 0%, #1e3a8a 100%);
            padding: 20px 10px;
            text-align: center;
            border-bottom: 6px solid #3b82f6;
        }
        .header h1 { font-size: clamp(22px, 5vw, 40px); color: #fff; text-transform: uppercase; line-height: 1.1; }
        .header .sub { font-size: 13px; color: #3b82f6; font-family: Arial; font-weight: bold; margin-top: 5px; letter-spacing: 2px; }

        .grid-7-day {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: #cbd5e1;
            gap: 1px;
        }

        .day-column {
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 5px;
            text-align: center;
            color: #1e293b;
        }
        
        .day-name { color: #1e3a8a; font-size: 22px; font-weight: 900; }
        .day-date { color: #64748b; font-size: 13px; margin-bottom: 8px; font-family: Arial, sans-serif; }

        .weather-icon { font-size: 50px; margin: 5px 0; height: 65px; display: flex; align-items: center; }
        
        .temp-group { margin: 5px 0; }
        .hi-temp { font-size: 38px; font-weight: 900; display: block; line-height: 0.9; }
        .lo-temp { color: #1d4ed8; font-size: 24px; font-weight: 900; display: block; margin-top: 5px; }

        .stat-box {
            width: 90%;
            background: #f8fafc;
            border-radius: 6px;
            padding: 6px 2px;
            margin-top: 6px;
            border: 1px solid #e2e8f0;
        }
        .stat-label { font-size: 9px; color: #64748b; text-transform: uppercase; font-weight: 900; }
        .stat-val { font-size: 13px; color: #1e293b; font-weight: 900; }
        
        .rain-highlight { color: #2563eb !important; background: #dbeafe; }

        .severity-tag {
            width: 100%;
            padding: 8px 0;
            margin-top: 10px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
        }
        .sev-none { color: #10b981; background: #ecfdf5; }
        .sev-mod { color: #d97706; background: #fff7ed; }
        .sev-high { color: #fff; background: #dc2626; }

        .day-almanac {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #cbd5e1;
            font-size: 10px;
            color: #64748b;
            font-family: Arial, sans-serif;
            width: 100%;
        }

        .footer {
            background: #0f172a;
            color: #475569;
            padding: 12px;
            text-align: center;
            font-size: 10px;
            text-transform: uppercase;
        }

        #status { color: #3b82f6; text-align: center; padding: 100px; font-size: 20px; }

        /* Mobile Adjustments */
        @media (max-width: 850px) {
            .grid-7-day { grid-template-columns: 1fr; padding: 10px; gap: 10px; }
            .day-column { 
                display: grid; 
                grid-template-columns: 80px 1fr 1fr; 
                grid-template-areas: "date icon temps" "stats stats stats" "sev sev sev" "alm alm alm";
                text-align: left; padding: 15px; border-radius: 8px;
            }
            .day-name-box { grid-area: date; }
            .weather-icon { grid-area: icon; justify-content: center; height: 50px; }
            .temp-group { grid-area: temps; text-align: right; }
            .stats-container { grid-area: stats; display: flex; gap: 5px; margin-top: 5px;}
            .severity-tag { grid-area: sev; text-align: center; border-radius: 4px; }
            .day-almanac { grid-area: alm; text-align: center; }
        }
    </style>
</head>
<body>

<div id="status">🛰️ SYNCHRONIZING PINPOINT MODELS (HRRR/ECMWF)...</div>

<!-- WEEK 1 -->
<div class="dashboard-container" id="week1-container" style="display:none;">
    <div class="header">
        <h1>VIZCAYA 7-DAY IMPACT</h1>
        <div class="sub">PINPOINT: ROUND ROCK, TX | STARTS TOMORROW</div>
    </div>
    <div class="grid-7-day" id="grid-week1"></div>
    <div class="footer" id="stamp-week1"></div>
</div>

<!-- WEEK 2 -->
<div class="dashboard-container" id="week2-container" style="display:none;">
    <div class="header" style="background: linear-gradient(180deg, #1e293b 0%, #334155 100%); border-bottom-color: #64748b;">
        <h1>WEEK 2 EXTENDED TREND</h1>
        <div class="sub">DAYS 8-14 LONG RANGE OUTLOOK</div>
    </div>
    <div class="grid-7-day" id="grid-week2"></div>
    <div class="footer">Extended Forecast Confidence: Low-Medium | ECMWF-Ensemble</div>
</div>

<script>
    const LAT = 30.509747, LON = -97.692116;
    const ALMANAC_URL = 'https://JimEgan2025.github.io/almanac.json';

    const getWindDir = deg => ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(deg / 22.5) % 16];
    
    function getWeatherUI(code) {
        const mapping = {
            0: {icon:'☀️',desc:'Clear'}, 1:{icon:'🌤️',desc:'M. Clear'}, 2:{icon:'⛅',desc:'P. Cloudy'}, 
            3:{icon:'☁️',desc:'Cloudy'}, 45:{icon:'🌫️',desc:'Fog'}, 51:{icon:'🌦️',desc:'Drizzle'}, 
            61:{icon:'🌧️',desc:'Rain'}, 63:{icon:'🌧️',desc:'Heavy Rain'}, 71:{icon:'❄️',desc:'Snow'},
            80:{icon:'🌦️',desc:'Showers'}, 95:{icon:'⛈️',desc:'T-Storms'}
        };
        return mapping[code] || {icon:'☁️',desc:'Cloudy'};
    }

    function getSeverity(cape, gust) {
        if (cape >= 1200 || gust > 40) return {text:'⚠️ IMPACT RISK',cls:'sev-high'};
        if (cape >= 400 || gust > 25) return {text:'STORM POTENTIAL',cls:'sev-mod'};
        return {text:'STABLE',cls:'sev-none'};
    }

    async function init() {
        try {
            const almRes = await fetch(ALMANAC_URL).catch(() => null);
            const almData = almRes ? await almRes.json() : {};

            // Fetching 15 days of data to ensure we have tomorrow (1) through two full weeks (14)
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,wind_gusts_10m_max,wind_direction_10m_dominant,weather_code&hourly=cape&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=America/Chicago&forecast_days=15`;
            
            const res = await fetch(url);
            const data = await res.json();

            document.getElementById('status').style.display = 'none';
            document.getElementById('week1-container').style.display = 'block';
            document.getElementById('week2-container').style.display = 'block';
            
            const updateTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('stamp-week1').innerText = `Updated ${updateTime} CST | High-Res 3km Models Active`;

            const renderGrid = (gridId, startIndex) => {
                const grid = document.getElementById(gridId);
                for(let i = startIndex; i < startIndex + 7; i++) {
                    const dateRaw = data.daily.time[i];
                    const d = new Date(dateRaw + 'T00:00:00');
                    const dayName = d.toLocaleDateString('en-US', {weekday:'short'}).toUpperCase();
                    const dateStr = d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
                    const mmdd = dateRaw.slice(5);
                    
                    const ui = getWeatherUI(data.daily.weather_code[i]);
                    const h = Math.round(data.daily.temperature_2m_max[i]);
                    const l = Math.round(data.daily.temperature_2m_min[i]);
                    const rainProb = data.daily.precipitation_probability_max[i];
                    const rainAmt = data.daily.precipitation_sum[i];
                    const windGust = Math.round(data.daily.wind_gusts_10m_max[i]);
                    const windDir = getWindDir(data.daily.wind_direction_10m_dominant[i]);
                    
                    const maxCape = Math.max(...data.hourly.cape.slice(i*24, (i+1)*24)) || 0;
                    const sev = getSeverity(maxCape, windGust);
                    const a = almData[mmdd] || {avgH:'--', avgL:'--', recH:'--', recHY:'--'};

                    grid.innerHTML += `
                        <div class="day-column">
                            <div class="day-name-box">
                                <div class="day-name">${dayName}</div>
                                <div class="day-date">${dateStr}</div>
                            </div>
                            <div class="weather-icon">${ui.icon}</div>
                            <div class="temp-group">
                                <span class="hi-temp" style="color:${h >= 90 ? '#b91c1c' : '#1e293b'}">${h}°</span>
                                <span class="lo-temp">${l}°</span>
                            </div>
                            <div class="stats-container">
                                <div class="stat-box">
                                    <div class="stat-label">Rain</div>
                                    <div class="stat-val">${rainProb}%</div>
                                </div>
                                <div class="stat-box ${rainAmt >= 0.1 ? 'rain-highlight' : ''}">
                                    <div class="stat-label">Amt</div>
                                    <div class="stat-val">${rainAmt > 0 ? rainAmt.toFixed(2)+'"' : '0.00"'}</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Gust</div>
                                    <div class="stat-val">${windDir} ${windGust}</div>
                                </div>
                            </div>
                            <div class="severity-tag ${sev.cls}">${sev.text}</div>
                            <div class="day-almanac">
                                <b>AVG: ${a.avgH}/${a.avgL}</b><br>
                                REC: ${a.recH}° (${a.recHY})
                            </div>
                        </div>
                    `;
                }
            };

            // Start Week 1 Tomorrow (Index 1)
            renderGrid('grid-week1', 1);
            // Start Week 2 next week (Index 8)
            renderGrid('grid-week2', 8);

        } catch (e) {
            console.error(e);
            document.getElementById('status').innerText = "Sync Error. Check connection.";
        }
    }

    init();
</script>

</body>
</html>
