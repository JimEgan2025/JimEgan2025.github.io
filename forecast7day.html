<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizcaya 7-Day Impact Dashboard</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Arial Black', sans-serif; 
            background:#0f172a; 
            color:#fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-container {
            width: 1000px;
            margin-bottom: 30px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        .header {
            background: linear-gradient(180deg, #1e3a8a 0%, #1e40af 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 6px solid #3b82f6;
        }
        .header h1 { font-size: 42px; color: #fff; text-transform: uppercase; letter-spacing: 1px; line-height: 1; }
        .header p { font-size: 18px; color: #bfdbfe; font-weight: bold; margin-top: 5px; }

        .grid-7-day {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: #cbd5e1;
            gap: 2px;
        }

        .day-column {
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 5px;
            text-align: center;
        }
        
        .day-name { color: #1e3a8a; font-size: 24px; font-weight: 900; }
        .day-date { color: #64748b; font-size: 14px; margin-bottom: 8px; font-family: Arial, sans-serif; }

        .weather-icon { font-size: 60px; margin: 5px 0; height: 75px; display: flex; align-items: center; }
        
        .temp-group { margin: 5px 0; }
        .hi-temp { font-size: 42px; font-weight: 900; display: block; line-height: 0.9; }
        .lo-temp { color: #1d4ed8; font-size: 26px; font-weight: 900; display: block; margin-top: 5px; }

        .stat-box {
            width: 88%;
            background: #f1f5f9;
            border-radius: 6px;
            padding: 4px 2px;
            margin-top: 6px;
            border: 1px solid #e2e8f0;
        }
        .stat-label { font-size: 9px; color: #64748b; text-transform: uppercase; font-weight: 900; }
        .stat-val { font-size: 13px; color: #1e293b; font-weight: 900; }
        
        /* Highlight rain if > 0.10" */
        .rain-highlight { color: #2563eb !important; }

        .severity-tag {
            width: 100%;
            padding: 6px 0;
            margin-top: 10px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
        }
        .sev-none { color: #10b981; background: #ecfdf5; }
        .sev-mod { color: #d97706; background: #fff7ed; }
        .sev-high { color: #fff; background: #dc2626; }

        .almanac-box {
            grid-column: span 7;
            background: #f8fafc;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            border-top: 2px solid #cbd5e1;
        }
        .almanac-cell {
            padding: 10px 2px;
            font-size: 10px;
            color: #475569;
            text-align: center;
            border-right: 1px solid #e2e8f0;
            line-height: 1.4;
            font-family: Arial, sans-serif;
        }

        .footer {
            background: #1e293b;
            color: #94a3b8;
            padding: 12px;
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
        }

        #status { color: #3b82f6; text-align: center; padding: 100px; font-size: 24px; }
    </style>
</head>
<body>

<div id="status">📡 SYNCHRONIZING WITH GFS MODELS...</div>

<!-- WEEK 1 -->
<div class="dashboard-container" id="week1-container" style="display:none;">
    <div class="header">
        <h1>7-DAY IMPACT FORECAST</h1>
        <p>Round Rock, Texas • Vizcaya Local Coverage</p>
    </div>
    <div class="grid-7-day" id="grid-week1"></div>
    <div class="almanac-box" id="almanac-week1"></div>
    <div class="footer" id="stamp-week1"></div>
</div>

<!-- WEEK 2 -->
<div class="dashboard-container" id="week2-container" style="display:none;">
    <div class="header" style="background:#334155; border-bottom-color: #64748b;">
        <h1>WEEK 2 EXTENDED TREND</h1>
        <p>Round Rock, Texas • Long-Range Outlook</p>
    </div>
    <div class="grid-7-day" id="grid-week2"></div>
    <div class="almanac-box" id="almanac-week2"></div>
    <div class="footer">Confidence Score: Medium-Low | Starts 8 Days From Tomorrow</div>
</div>

<script>
    const LAT = 30.509747, LON = -97.692116;
    const ALMANAC_JSON_URL = 'https://JimEgan2025.github.io/almanac.json';

    const getWindDir = deg => ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(deg / 22.5) % 16];
    
    function getWeatherUI(code) {
        const mapping = {
            0: {icon:'☀️',desc:'Sunny'}, 1:{icon:'🌤️',desc:'M. Clear'}, 2:{icon:'⛅',desc:'P. Cloudy'}, 
            3:{icon:'☁️',desc:'Cloudy'}, 45:{icon:'🌫️',desc:'Fog'}, 51:{icon:'🌦️',desc:'Drizzle'}, 
            61:{icon:'🌧️',desc:'Rain'}, 63:{icon:'🌧️',desc:'Heavy Rain'}, 71:{icon:'❄️',desc:'Snow'},
            80:{icon:'🌦️',desc:'Showers'}, 95:{icon:'⛈️',desc:'T-Storms'}
        };
        return mapping[code] || {icon:'☁️',desc:'Cloudy'};
    }

    function getSeverity(cape, li, gust) {
        if (cape >= 2000 || li <= -6 || gust > 45) return {text:'⚠️ SEVERE RISK',cls:'sev-high'};
        if (cape >= 800 || li <= -3 || gust > 30) return {text:'STORM RISK',cls:'sev-mod'};
        return {text:'STABLE',cls:'sev-none'};
    }

    function getTempColor(temp) {
        if (temp >= 95) return '#b91c1c';
        if (temp >= 85) return '#ea580c';
        if (temp <= 32) return '#2563eb';
        return '#1e293b';
    }

    async function init() {
        try {
            let almData = {};
            try {
                const almRes = await fetch(ALMANAC_JSON_URL);
                almData = await almRes.json();
            } catch(e) { console.warn("Almanac load failed"); }

            const url = `https://api.open-meteo.com/v1/gfs?latitude=${LAT}&longitude=${LON}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,wind_speed_10m_max,wind_gusts_10m_max,wind_direction_10m_dominant,weather_code&hourly=cape,lifted_index&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=America/Chicago&forecast_days=16`;
            const res = await fetch(url);
            const data = await res.json();

            document.getElementById('status').style.display = 'none';
            document.getElementById('week1-container').style.display = 'block';
            document.getElementById('week2-container').style.display = 'block';
            
            const updateTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('stamp-week1').innerText = `Updated ${updateTime} CST | 7-Day Window Starts Tomorrow`;

            const renderWeek = (gridId, almId, startIdx) => {
                const grid = document.getElementById(gridId);
                const almBox = document.getElementById(almId);

                for(let i = startIdx; i < startIdx + 7; i++) {
                    const dateRaw = data.daily.time[i];
                    const d = new Date(dateRaw + 'T00:00:00');
                    const dayName = d.toLocaleDateString('en-US', {weekday:'short'}).toUpperCase();
                    const dateStr = d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
                    const mmdd = dateRaw.slice(5);
                    const ui = getWeatherUI(data.daily.weather_code[i]);
                    const h = Math.round(data.daily.temperature_2m_max[i]);
                    const l = Math.round(data.daily.temperature_2m_min[i]);
                    
                    const rainProb = data.daily.precipitation_probability_max[i];
                    const rainAmt = data.daily.precipitation_sum[i];
                    const rainDisplay = rainAmt > 0 ? `${rainAmt.toFixed(2)}"` : `---`;
                    
                    const maxCape = Math.round(Math.max(...data.hourly.cape.slice(i*24, (i+1)*24)));
                    const minLI = Math.min(...data.hourly.lifted_index.slice(i*24, (i+1)*24)).toFixed(1);
                    const windGust = Math.round(data.daily.wind_gusts_10m_max[i]);
                    const sev = getSeverity(maxCape, minLI, windGust);
                    const windDir = getWindDir(data.daily.wind_direction_10m_dominant[i]);

                    grid.innerHTML += `
                        <div class="day-column">
                            <div class="day-name">${dayName}</div>
                            <div class="day-date">${dateStr}</div>
                            <div class="weather-icon">${ui.icon}</div>
                            <div class="temp-group">
                                <span class="hi-temp" style="color:${getTempColor(h)}">${h}°</span>
                                <span class="lo-temp">${l}°</span>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Rain Prob</div>
                                <div class="stat-val">${rainProb}%</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Amount</div>
                                <div class="stat-val ${rainAmt >= 0.1 ? 'rain-highlight' : ''}">${rainDisplay}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Wind Gust</div>
                                <div class="stat-val">${windDir} ${windGust} mph</div>
                            </div>
                            <div class="severity-tag ${sev.cls}">${sev.text}</div>
                        </div>
                    `;

                    const a = almData[mmdd] || {avgH:'--', avgL:'--', recH:'--', recHY:'--', recL:'--', recLY:'--'};
                    almBox.innerHTML += `
                        <div class="almanac-cell">
                            <b>AVG: ${a.avgH}/${a.avgL}</b><br>
                            HI: ${a.recH} (${a.recHY})<br>
                            LO: ${a.recL} (${a.recLY})
                        </div>
                    `;
                }
            };

            // Start Week 1 at index 1 (Tomorrow)
            renderWeek('grid-week1', 'almanac-week1', 1); 
            // Start Week 2 at index 8 (Next Week)
            renderWeek('grid-week2', 'almanac-week2', 8); 

        } catch (e) {
            console.error(e);
            document.getElementById('status').innerText = "Sync Error. Check connection.";
        }
    }

    init();
</script>

</body>
</html>
