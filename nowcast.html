<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIZCAYA WEATHER NOWCAST</title>
    <style>
        /* High-Impact Social Media Styles */
        :root {
            --bg-dark: #000000;
            --card-bg: #ffffff;
            --accent-blue: #2563eb;
            --accent-red: #ef4444;
            --text-main: #000000;
            --text-muted: #475569;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        
        body { 
            font-family: 'Arial Black', sans-serif; 
            background: var(--bg-dark); 
            color: #fff;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .social-container {
            width: 1000px; /* Wider for better social aspect ratio */
            background: var(--card-bg);
            border: 4px solid #334155;
            overflow: hidden;
            color: var(--text-main);
        }

        /* Large News-Style Banner */
        .alert-banner {
            background: var(--accent-blue);
            color: white;
            padding: 25px;
            text-align: center;
            font-size: 38px; /* Massive */
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 8px solid rgba(0,0,0,0.2);
        }

        .main-display {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            padding: 40px;
            background: #fff;
            gap: 20px;
        }

        .location-tag {
            font-size: 20px;
            color: var(--accent-blue);
            text-transform: uppercase;
            margin-bottom: -10px;
        }

        .big-temp { 
            font-size: 150px; /* Extreme visibility */
            font-weight: 900;
            line-height: 1; 
            letter-spacing: -6px;
            margin-left: -5px;
        }
        
        .condition-text { 
            font-size: 42px; 
            font-weight: 900;
            color: #1e293b;
            margin-bottom: 10px;
            line-height: 1.1;
        }

        .feels-line {
            font-size: 24px;
            color: var(--text-muted);
            font-weight: 900;
        }

        /* Stats Cards - Chunky */
        .stats-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .impact-card {
            background: #f1f5f9;
            border-left: 15px solid var(--accent-blue);
            padding: 20px;
        }

        .impact-val { font-size: 48px; font-weight: 900; color: #000; line-height: 1; }
        .impact-label { font-size: 18px; color: var(--text-muted); text-transform: uppercase; }

        /* Hourly Timeline - Dark for contrast */
        .timeline-container {
            padding: 30px;
            background: #1e293b;
            color: white;
        }
        
        .timeline-header {
            font-size: 22px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 2px;
            color: #94a3b8;
        }

        .timeline-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 8px;
        }

        .hour-tick {
            text-align: center;
            padding: 15px 5px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        
        .active-hour { background: var(--accent-blue); }

        .hour-time { font-size: 16px; font-weight: 900; margin-bottom: 8px; }
        .hour-icon { font-size: 32px; margin-bottom: 8px; }
        .hour-temp { font-size: 26px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .hour-rain { font-size: 16px; font-weight: 900; color: #60a5fa; }

        .footer {
            background: #000;
            color: #64748b;
            padding: 15px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }

        #status { font-size: 30px; color: white; font-weight: 900; }
    </style>
</head>
<body>

<div id="status">📡 GENERATING REPORT...</div>

<div class="social-container" id="dashboard" style="display:none;">
    <div class="alert-banner" id="banner-text">VIZCAYA WEATHER ALERT</div>
    
    <div class="main-display">
        <div class="current-focus">
            <div class="location-tag">ROUND ROCK, TX</div>
            <div class="big-temp" id="curr-temp">--°</div>
            <div class="condition-text" id="curr-desc">LOADING</div>
            <div class="feels-line">
                FEELS LIKE <span id="feels-like" style="color:#000">--°</span>
            </div>
            <div class="feels-line" style="margin-top:5px;">
                HIGH: <span id="day-high" style="color:var(--accent-red)">--°</span> | 
                LOW: <span id="day-low" style="color:var(--accent-blue)">--°</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="impact-card">
                <div class="impact-label">RAINFALL NEXT 12H</div>
                <div class="impact-val" id="total-remaining">0.00"</div>
            </div>
            <div class="impact-card" style="border-left-color: #f59e0b;">
                <div class="impact-label">PEAK GUSTS</div>
                <div class="impact-val" id="peak-wind">-- MPH</div>
            </div>
        </div>
    </div>

    <div class="timeline-container">
        <div class="timeline-header">12-HOUR HOURLY OUTLOOK</div>
        <div class="timeline-grid" id="hourly-grid">
            <!-- Data Injected Here -->
        </div>
    </div>

    <div class="footer">
        VIZCAYA TODAY • UPDATED <span id="update-time"></span>
    </div>
</div>

<script>
    const LAT = 30.5871, LON = -97.641;

    function getWeatherIcon(code) {
        const mapping = {
            0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️', 
            51: '🌦️', 61: '🌧️', 63: '🌧️', 65: '🌧️', 80: '🌦️', 95: '⛈️'
        };
        return mapping[code] || '☁️';
    }

    async function updateNowcast() {
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=temperature_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,precipitation_probability&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=America/Chicago&forecast_days=2`;
            
            const res = await fetch(url);
            const data = await res.json();

            document.getElementById('status').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            const now = new Date();
            const currentHour = now.getHours();

            // Header Stats
            document.getElementById('curr-temp').innerText = Math.round(data.hourly.temperature_2m[currentHour]) + "°";
            document.getElementById('feels-like').innerText = Math.round(data.hourly.apparent_temperature[currentHour]) + "°";
            document.getElementById('curr-desc').innerText = "CLOUDY"; // Standard fallback
            
            const code = data.hourly.weather_code[currentHour];
            const mapping = {0:'CLEAR', 1:'SUNNY', 2:'PARTLY CLOUDY', 3:'OVERCAST', 45:'FOGGY', 51:'DRIZZLE', 61:'RAIN', 63:'MODERATE RAIN', 65:'HEAVY RAIN', 80:'SHOWERS', 95:'T-STORMS'};
            document.getElementById('curr-desc').innerText = (mapping[code] || 'CLOUDY').toUpperCase();

            document.getElementById('day-high').innerText = Math.round(data.daily.temperature_2m_max[0]) + "°";
            document.getElementById('day-low').innerText = Math.round(data.daily.temperature_2m_min[0]) + "°";
            document.getElementById('update-time').innerText = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}).toUpperCase();

            // 12h Stats
            let totalRain = 0;
            let maxWind = 0;
            for (let i = 0; i < 12; i++) {
                totalRain += data.hourly.precipitation[currentHour + i];
                if (data.hourly.wind_speed_10m[currentHour + i] > maxWind) maxWind = data.hourly.wind_speed_10m[currentHour + i];
            }
            document.getElementById('total-remaining').innerText = totalRain.toFixed(2) + '"';
            document.getElementById('peak-wind').innerText = Math.round(maxWind) + " MPH";

            const banner = document.getElementById('banner-text');
            if (totalRain > 0.5) {
                banner.innerText = "⚠️ HEAVY RAIN ALERT";
                banner.style.background = "#b91c1c";
            } else if (totalRain > 0) {
                banner.innerText = "☔ RAIN IN THE FORECAST";
                banner.style.background = "#2563eb";
            } else {
                banner.innerText = "✅ CLEAR SKIES AHEAD";
                banner.style.background = "#059669";
            }

            // Grid
            const grid = document.getElementById('hourly-grid');
            grid.innerHTML = ''; 

            for (let i = 0; i < 12; i++) {
                const idx = currentHour + i;
                const timeLabel = new Date();
                timeLabel.setHours(timeLabel.getHours() + i);
                const timeStr = timeLabel.toLocaleTimeString([], {hour: 'numeric'}).replace(" ", "");
                
                const temp = Math.round(data.hourly.temperature_2m[idx]);
                const rain = data.hourly.precipitation[idx];
                
                grid.innerHTML += `
                    <div class="hour-tick ${i === 0 ? 'active-hour' : ''}">
                        <div class="hour-time">${timeStr}</div>
                        <div class="hour-icon">${getWeatherIcon(data.hourly.weather_code[idx])}</div>
                        <div class="hour-temp">${temp}°</div>
                        <div class="hour-rain">${rain > 0 ? rain.toFixed(1) + '"' : '0"'}</div>
                    </div>
                `;
            }

        } catch (e) {
            document.getElementById('status').innerText = "ERROR LOADING DATA";
        }
    }

    updateNowcast();
    setInterval(updateNowcast, 15 * 60 * 1000);
</script>

</body>
</html>
