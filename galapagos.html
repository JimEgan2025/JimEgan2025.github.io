<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sony & Galaxy S25 Ultra: Interactive Galápagos Field Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: #0b1116; }
        #sidebar { width: 400px; background: #1c2833; color: white; display: flex; flex-direction: column; box-shadow: 4px 0 10px rgba(0,0,0,0.5); z-index: 1001; }
        .sidebar-header { padding: 15px; background: #17202a; border-bottom: 3px solid #f1c40f; text-align: center; }
        .section { padding: 15px; border-bottom: 1px solid #2c3e50; }
        h3 { margin: 0 0 10px 0; font-size: 11px; text-transform: uppercase; color: #f1c40f; letter-spacing: 2px; }
        
        #location-list { flex-grow: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; background: #17202a; }
        .location-item { padding: 15px; border-bottom: 1px solid #2c3e50; cursor: pointer; transition: 0.3s; }
        .location-item:hover { background: #2c3e50; }
        .item-name { font-weight: bold; font-size: 15px; color: #f1c40f; }
        
        .fly-btn { 
            background: #3498db; color: white; border: none; border-radius: 4px; 
            padding: 8px; width: 100%; margin-top: 8px; cursor: pointer; font-weight: bold; 
            text-transform: uppercase; font-size: 10px;
        }

        #map { flex-grow: 1; }

        /* Popup Styling */
        .leaflet-popup-content-wrapper { background: #1c2833; color: white; border-radius: 8px; border: 1px solid #34495e; }
        .leaflet-popup-tip { background: #1c2833; }
        .popup-title { font-weight: bold; color: #f1c40f; border-bottom: 1px solid #34495e; margin-bottom: 10px; padding-bottom: 5px; display: block; }
        
        .susan-tag { background: #8e44ad; color: white; padding: 2px 5px; border-radius: 3px; font-size: 9px; font-weight: bold; display: inline-block; margin-right: 5px; }
        .jim-tag { background: #d35400; color: white; padding: 2px 5px; border-radius: 3px; font-size: 9px; font-weight: bold; display: inline-block; margin-right: 5px; }
        .galaxy-tag { background: #27ae60; color: white; padding: 2px 5px; border-radius: 3px; font-size: 9px; font-weight: bold; display: inline-block; margin-right: 5px; }
        
        .advice-text { font-size: 12px; line-height: 1.4; margin-bottom: 8px; color: #ecf0f1; }

        /* Map Legend */
        .map-legend {
            position: absolute; bottom: 20px; right: 20px; background: rgba(28, 40, 51, 0.9);
            padding: 10px; border-radius: 8px; border: 1px solid #34495e; z-index: 1000; color: white; font-size: 11px;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2 style="margin:0; font-size: 18px;">SONY & GALAXY MAP</h2>
            <span style="font-size: 10px; color: #bdc3c7;">10-Day PDF Itinerary Guide</span>
        </div>

        <div class="section">
            <h3>Expedition Itinerary</h3>
            <span style="font-size: 11px; color: #95a5a6;">Click a site to fly the map and open the gear tips.</span>
        </div>

        <ul id="location-list"></ul>
    </div>

    <div id="map">
        <div class="map-legend">
            <div style="font-weight:bold; margin-bottom: 5px; color:#f1c40f;">GEAR LEGEND</div>
            <div class="legend-item"><span class="dot" style="background:#8e44ad;"></span> Susan: Sony 200-600mm</div>
            <div class="legend-item"><span class="dot" style="background:#d35400;"></span> Jim: Sony a6600 / Lumix</div>
            <div class="legend-item"><span class="dot" style="background:#27ae60;"></span> Both: Galaxy S25 Ultra</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map', {zoomControl: false}).setView([-0.39, -90.45], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);

        const itinerary = [
            { 
                name: "North Seymour", lat: -0.395, lon: -90.285, zoom: 15,
                advice: `
                    <span class="popup-title">NORTH SEYMOUR SHOOTING GUIDE</span>
                    <div class="advice-text"><span class='susan-tag'>SONY</span> 200-600mm: Focus on Frigatebird throat pouches. Bird Eye-AF is a must.</div>
                    <div class="advice-text"><span class='jim-tag'>LUMIX</span> ZS200: Use 24mm wide for the silvery forest landscape.</div>
                    <div class="advice-text"><span class='galaxy-tag'>S25U</span> Portrait Mode: Ideal for Land Iguanas at 3x zoom.</div>
                `
            },
            { 
                name: "Isabela (Western Loop)", lat: -0.015, lon: -91.330, zoom: 13,
                advice: `
                    <span class="popup-title">ISABELA OPEN WATER GUIDE</span>
                    <div class="advice-text"><span class='susan-tag'>SONY</span> 200-600mm: Scan for Whale Breaches and Mola Mola.</div>
                    <div class="advice-text"><span class='galaxy-tag'>S25U</span> 4K/60 Video: Use 'Super Steady' for bow-riding dolphins.</div>
                `
            },
            { 
                name: "Fernandina (Punta Espinosa)", lat: -0.265, lon: -91.447, zoom: 15,
                advice: `
                    <span class="popup-title">FERNANDINA VOLCANIC GUIDE</span>
                    <div class="advice-text"><span class='galaxy-tag'>S25U</span> 0.6x Ultrawide: Best tool for the vast lava fields.</div>
                    <div class="advice-text"><span class='susan-tag'>SONY</span> 70-300mm: Close portraits of Flightless Cormorant turquoise eyes.</div>
                    <div class="advice-text"><span class='jim-tag'>SONY</span> a6600: Macro textures of 'Pahoehoe' lava rope patterns.</div>
                `
            },
            { 
                name: "Española (Gardner Bay)", lat: -1.350, lon: -89.650, zoom: 15,
                advice: `
                    <span class="popup-title">ESPAÑOLA WILDLIFE GUIDE</span>
                    <div class="advice-text"><span class='susan-tag'>SONY</span> 200-600mm: Albatross take-offs. Shutter speed: 1/2500.</div>
                    <div class="advice-text"><span class='galaxy-tag'>S25U</span> 100x Space Zoom: Spot Albatross on cliffs from the shore.</div>
                    <div class="advice-text"><span class='jim-tag'>SONY</span> a6600: 'Christmas' Iguanas (Red/Green) colorful portraits.</div>
                `
            },
            { 
                name: "Santa Cruz (Highlands)", lat: -0.650, lon: -90.350, zoom: 14,
                advice: `
                    <span class="popup-title">SANTA CRUZ HIGHLANDS GUIDE</span>
                    <div class="advice-text"><span class='susan-tag'>SONY</span> 70-300mm: Tortoise shells in the mist. Use F8 for detail.</div>
                    <div class="advice-text"><span class='galaxy-tag'>S25U</span> 8K Video: A slow cinematic pan of the tortoises grazing.</div>
                `
            },
            { 
                name: "Bartolomé (Pinnacle Rock)", lat: -0.283, lon: -90.548, zoom: 15,
                advice: `
                    <span class="popup-title">BARTOLOMÉ SUMMIT GUIDE</span>
                    <div class="advice-text"><span class='galaxy-tag'>S25U</span> Expert RAW: At the summit, use this for the best sky/ocean HDR.</div>
                    <div class="advice-text"><span class='jim-tag'>LUMIX</span> ZS200: Use 24mm for the classic Pinnacle Rock vista.</div>
                    <div class="advice-text"><span class='susan-tag'>SONY</span> 70-300mm: Find Penguins on the waterline rocks below.</div>
                `
            },
            { 
                name: "Genovesa (Prince Philip's Steps)", lat: 0.330, lon: -89.945, zoom: 15,
                advice: `
                    <span class="popup-title">GENOVESA BIRD ISLAND GUIDE</span>
                    <div class="advice-text"><span class='galaxy-tag'>S25U</span> Slo-Mo Video: Capture the petrel swarms in slow motion.</div>
                    <div class="advice-text"><span class='susan-tag'>SONY</span> 70-300mm: Red-footed boobies nesting in shrubs at eye-level.</div>
                    <div class="advice-text"><span class='jim-tag'>LUMIX</span> ZS200: Zoom 360mm to see sharks from the cliff edge.</div>
                `
            },
            { 
                name: "San Cristobal (Kicker Rock)", lat: -0.730, lon: -89.500, zoom: 14,
                advice: `
                    <span class="popup-title">KICKER ROCK NAVIGATOR</span>
                    <div class="advice-text"><span class='susan-tag'>SONY</span> 200-600mm: Frigatebirds circling the 500ft split peak.</div>
                    <div class="advice-text"><span class='jim-tag'>LUMIX</span> ZS200: Vertical pano of the entire rock formation.</div>
                    <div class="advice-text"><span class='galaxy-tag'>S25U</span> Portrait Mode: Use 3x zoom for Sea Lions huddling in the mid-town beach.</div>
                `
            }
        ];

        const markers = [];
        const list = document.getElementById('location-list');

        itinerary.forEach((site, index) => {
            // Create the Marker
            const marker = L.marker([site.lat, site.lon]).addTo(map)
                .bindPopup(site.advice, { maxWidth: 300 });
            
            markers.push(marker);

            // Create Sidebar Item
            const li = document.createElement('li');
            li.className = 'location-item';
            li.innerHTML = `
                <div class="item-name">${index + 1}. ${site.name}</div>
                <button class="fly-btn" onclick="openSite(${index})">Sync Map & View Power Tips</button>
            `;
            list.appendChild(li);
        });

        function openSite(index) {
            const site = itinerary[index];
            const marker = markers[index];

            // Fly to location
            map.flyTo([site.lat, site.lon], site.zoom, { animate: true, duration: 3 });
            
            // Delay popup until flight is almost finished
            setTimeout(() => {
                marker.openPopup();
            }, 2500);
        }
    </script>
</body>
</html>
