<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizcaya Rain Probability - Strategic View</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --header-dark: #000000;
            --likely: #064e3b;
            --widespread: #065f46;
            --scattered: #047857;
            --widely: #059669;
            --isolated: #10b981;
            --accent: #38bdf8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: #f8fafc;
            min-height: 100vh;
            padding: 0;
        }

        .source-banner {
            background: var(--header-dark);
            color: #64748b;
            font-size: 10px;
            text-align: center;
            padding: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            border-bottom: 2px solid var(--accent);
        }
        .source-banner span { color: #f8fafc; }

        .container { max-width: 1300px; margin: 0 auto; padding: 20px; }

        .chart-header {
            text-align: center;
            background: #1e3a8a;
            padding: 15px;
            margin-bottom: 2px;
            border-radius: 8px 8px 0 0;
        }
        .chart-header h1 {
            font-size: 2.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
            color: white;
        }

        .graph-wrapper {
            background: #111;
            padding: 10px;
            border: 2px solid #334155;
            border-radius: 0 0 8px 8px;
            height: 500px;
            position: relative;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-left: 5px solid var(--isolated);
        }
        .stat-label { font-size: 11px; text-transform: uppercase; color: #94a3b8; font-weight: 800; }
        .stat-val { font-size: 28px; font-weight: 900; color: white; margin-top: 5px; }

        #loader { text-align: center; padding: 100px; font-weight: 900; letter-spacing: 2px; color: var(--accent); }
    </style>
</head>
<body>

    <div class="source-banner">
        Meteorological Core: <span>Open-Meteo GFS 0.25°</span> &nbsp;&bull;&nbsp; Historical Rule: <span>Jim's 130-Year Local Archive</span>
    </div>

    <div class="container">
        <div id="loader">📡 INTERROGATING ATMOSPHERIC MODELS...</div>

        <div id="mainContent" style="display:none;">
            <div class="chart-header">
                <h1>Chance of Rain</h1>
            </div>
            <div class="graph-wrapper">
                <canvas id="rainChart"></canvas>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">10-Day Total Precip</div>
                    <div class="stat-val" id="totalRain">--</div>
                </div>
                <div class="stat-card" style="border-left-color: var(--accent);">
                    <div class="stat-label">Historical Norm</div>
                    <div class="stat-val" id="normRain">--</div>
                </div>
                <div class="stat-card" style="border-left-color: #f59e0b;">
                    <div class="stat-label">Climate Variance</div>
                    <div class="stat-val" id="variance">--</div>
                </div>
            </div>
        </div>
    </div>

<script>
    const LAT = 30.509747, LON = -97.692116;

    async function init() {
        try {
            const almRes = await fetch('https://jimegan2025.github.io/almanac.json');
            const almanac = await almRes.json();

            // Fetch hourly for Day/Night precision
            const url = `https://api.open-meteo.com/v1/gfs?latitude=${LAT}&longitude=${LON}&hourly=precipitation_probability&daily=precipitation_sum&precipitation_unit=inch&timezone=America/Chicago&forecast_days=8`;
            const res = await fetch(url);
            const data = await res.json();

            processAndRender(data, almanac);
        } catch (e) {
            document.getElementById('loader').innerText = "⚠️ UPLINK FAILED";
        }
    }

    function processAndRender(data, almanac) {
        const labels = [];
        const values = [];
        const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];

        // Split data into Day (6am-6pm) and Night (6pm-6am)
        for (let i = 0; i < 7; i++) {
            const dayStart = i * 24 + 6;
            const nightStart = i * 24 + 18;

            const dayProb = Math.max(...data.hourly.precipitation_probability.slice(dayStart, dayStart + 12));
            const nightProb = Math.max(...data.hourly.precipitation_probability.slice(nightStart, nightStart + 12));

            const dateObj = new Date(data.daily.time[i] + 'T00:00:00');
            const dayName = days[dateObj.getDay()];

            labels.push([dayName, 'DAY'], [dayName, 'NIGHT']);
            values.push(dayProb, nightProb);
        }

        // Summary Stats logic
        const total = data.daily.precipitation_sum.reduce((a, b) => a + b, 0);
        const startNorm = Number(almanac[data.daily.time[0].slice(5)]?.accP || 0);
        const endNorm = Number(almanac[data.daily.time[7].slice(5)]?.accP || 0);
        const norm = Math.abs(endNorm - startNorm);

        document.getElementById('loader').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('totalRain').innerText = total.toFixed(2) + '"';
        document.getElementById('normRain').innerText = norm.toFixed(2) + '"';
        document.getElementById('variance').innerText = (total - norm).toFixed(2) + '"';

        renderChart(labels, values);
    }

    function renderChart(labels, values) {
        const ctx = document.getElementById('rainChart').getContext('2d');
        
        // Plugin to draw the background bands
        const backgroundZonalPlugin = {
            id: 'backgroundZonalPlugin',
            beforeDraw: (chart) => {
                const {ctx, chartArea, scales: {y}} = chart;
                const zones = [
                    { min: 80, max: 100, color: '#064e3b' }, // Likely
                    { min: 60, max: 80, color: '#065f46' },  // Widespread
                    { min: 40, max: 60, color: '#047857' },  // Scattered
                    { min: 20, max: 40, color: '#059669' },  // Widely Scattered
                    { min: 0, max: 20, color: '#10b981' },   // Isolated
                ];

                zones.forEach(zone => {
                    ctx.fillStyle = zone.color;
                    const top = y.getPixelForValue(zone.max);
                    const bottom = y.getPixelForValue(zone.min);
                    ctx.fillRect(chartArea.left, top, chartArea.width, bottom - top);
                });
            }
        };

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: '#cffafe', // Light cyan bars
                    borderColor: 'white',
                    borderWidth: 1,
                    barPercentage: 0.8,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        position: 'left',
                        ticks: {
                            color: 'white',
                            font: { weight: 'bold', size: 14 },
                            callback: (val) => {
                                const labels = {100:'LIKELY', 80:'WIDESPREAD', 60:'SCATTERED', 40:'WIDELY SCATTERED', 20:'ISOLATED', 0:''};
                                return labels[val] || '';
                            }
                        },
                        grid: { color: 'rgba(255,255,255,0.1)' }
                    },
                    yRight: {
                        beginAtZero: true,
                        max: 100,
                        position: 'right',
                        ticks: {
                            color: '#4ade80',
                            font: { weight: 'bold' },
                            callback: (val) => val + '%'
                        },
                        grid: { display: false }
                    },
                    x: {
                        ticks: {
                            color: 'white',
                            font: { size: 11, weight: 'bold' }
                        },
                        grid: { display: false }
                    }
                }
            },
            plugins: [backgroundZonalPlugin]
        });
    }

    init();
</script>
</body>
</html>
