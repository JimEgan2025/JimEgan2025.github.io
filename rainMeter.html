<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rain Meter - 10 Day Precipitation Forecast</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            padding: 20px;
            color: #f8fafc;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header { text-align: center; padding: 30px 0; }
        .header h1 { font-size: 2.5em; color: #38bdf8; margin-bottom: 5px; }
        .header p { color: #94a3b8; }

        .chart-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }
        .chart-container { height: 400px; position: relative; }

        .data-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .summary-item {
            background: #334155;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-bottom: 4px solid #38bdf8;
        }
        .summary-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 8px; }
        .summary-value { font-size: 28px; font-weight: 800; color: #f1f5f9; }
        .summary-note { font-size: 12px; margin-top: 5px; font-weight: bold; }

        .footer { text-align: center; font-size: 12px; color: #475569; margin-top: 20px; }
        .loading { text-align: center; padding: 100px; font-weight: bold; color: #38bdf8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌧️ Rain Meter</h1>
            <p>10-Day Rainfall Forecast & Historical Norms</p>
        </div>

        <div id="loader" class="loading">📡 Syncing with Almanac & GFS Models...</div>

        <div id="mainContent" style="display:none;">
            <div class="chart-card">
                <div class="chart-container">
                    <canvas id="precipChart"></canvas>
                </div>
            </div>

            <div class="data-summary">
                <div class="summary-item">
                    <div class="summary-label">Total Forecasted</div>
                    <div class="summary-value" id="totalRain">0.00"</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Historical Norm</div>
                    <div class="summary-value" id="normRain">0.00"</div>
                    <div class="summary-note" id="normDiff">--</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Max Daily Event</div>
                    <div class="summary-value" id="maxRain">0.00"</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Rainy Days</div>
                    <div class="summary-value" id="rainyDays">0</div>
                </div>
            </div>
        </div>

        <div class="footer">
            Location: Round Rock, TX | Source: Open-Meteo GFS (Inches) | Almanac: JimEgan2025
        </div>
    </div>

    <script>
        const LAT = 30.509747, LON = -97.692116;
        const ALMANAC_URL = 'https://jimegan2025.github.io/almanac.json';
        let chart = null;

        async function init() {
            try {
                // 1. Fetch Almanac Data
                const almRes = await fetch(ALMANAC_URL);
                const almanac = await almRes.json();

                // 2. Fetch GFS Forecast (Added precipitation_unit=inch to fix mm bug)
                const url = `https://api.open-meteo.com/v1/gfs?latitude=${LAT}&longitude=${LON}&daily=precipitation_sum,precipitation_probability_max&precipitation_unit=inch&timezone=America/Chicago&forecast_days=10`;
                const res = await fetch(url);
                const weather = await res.json();

                processAndDisplay(weather.daily, almanac);
            } catch (err) {
                document.getElementById('loader').innerHTML = `<span style="color:red">Error syncing data: ${err.message}</span>`;
            }
        }

        function processAndDisplay(daily, almanac) {
            const labels = [];
            const amounts = [];
            const probs = [];
            
            let totalForecast = 0;
            let maxRain = 0;
            let rainyDays = 0;

            // Calculate Historical Norm for this 10-day window
            const firstKey = daily.time[0].slice(5);
            const lastKey = daily.time[9].slice(5);
            const startNorm = Number(almanac[firstKey]?.accP || 0);
            const endNorm = Number(almanac[lastKey]?.accP || 0);
            const tenDayNorm = Math.abs(endNorm - startNorm);

            daily.time.forEach((t, i) => {
                const date = new Date(t + 'T00:00:00');
                labels.push(date.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' }));
                
                const amt = daily.precipitation_sum[i] || 0;
                const prob = daily.precipitation_probability_max[i] || 0;

                amounts.push(amt);
                probs.push(prob);

                totalForecast += amt;
                if (amt > maxRain) maxRain = amt;
                if (amt > 0.01) rainyDays++;
            });

            // Update UI
            document.getElementById('loader').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            
            document.getElementById('totalRain').innerText = totalForecast.toFixed(2) + '"';
            document.getElementById('maxRain').innerText = maxRain.toFixed(2) + '"';
            document.getElementById('rainyDays').innerText = rainyDays;
            document.getElementById('normRain').innerText = tenDayNorm.toFixed(2) + '"';
            
            const diff = totalForecast - tenDayNorm;
            const diffEl = document.getElementById('normDiff');
            diffEl.innerText = `${diff >= 0 ? '+' : ''}${diff.toFixed(2)}" vs Norm`;
            diffEl.style.color = diff >= 0 ? '#38bdf8' : '#94a3b8';

            renderChart(labels, amounts, probs);
        }

        function renderChart(labels, amounts, probs) {
            const ctx = document.getElementById('precipChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Amount (Inches)',
                            data: amounts,
                            backgroundColor: '#38bdf8',
                            borderRadius: 5,
                            yAxisID: 'yAmt',
                            order: 2
                        },
                        {
                            label: 'Probability (%)',
                            data: probs,
                            type: 'line',
                            borderColor: '#f59e0b',
                            borderDash: [5, 5],
                            borderWidth: 2,
                            pointRadius: 4,
                            yAxisID: 'yProb',
                            order: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        yAmt: {
                            position: 'left',
                            title: { display: true, text: 'Inches', color: '#94a3b8' },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#94a3b8' },
                            suggestedMax: 0.5
                        },
                        yProb: {
                            position: 'right',
                            title: { display: true, text: 'Probability %', color: '#f59e0b' },
                            grid: { display: false },
                            ticks: { color: '#f59e0b' },
                            min: 0,
                            max: 100
                        },
                        x: {
                            ticks: { color: '#f1f5f9' },
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        legend: { labels: { color: '#f1f5f9', font: { weight: 'bold' } } },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    if (context.dataset.label.includes('Amount')) {
                                        return `Amount: ${context.parsed.y.toFixed(2)}"`;
                                    }
                                    return `Probability: ${context.parsed.y}%`;
                                }
                            }
                        }
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
