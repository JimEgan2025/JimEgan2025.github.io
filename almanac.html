<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizcaya Climate Almanac — Master Console</title>
    <style>
        :root { 
            --bg: #0f0f0f; 
            --card: #1a1a1a; 
            --accent: #d4a017; 
            --blue: #38bdf8; 
            --text: #e2e8f0; 
            --dim: #888; 
            --border: #2d3748;
        }
        body { 
            font-family: Consolas, Monaco, "Courier New", monospace, -apple-system, sans-serif;
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 30px 15px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            width: 100%; 
            max-width: 1000px; 
        }
        
        /* Dashboard Header */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--border); 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
        }
        h1 { 
            margin: 0; 
            font-size: 1.5rem; 
            color: var(--blue); 
            font-weight: 700;
        }

        /* Mode Toggle Tabs */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab-btn {
            background-color: #222;
            border: 1px solid var(--border);
            color: var(--dim);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            color: #fff;
            border-color: #4a5568;
        }
        .tab-btn.active {
            background-color: var(--blue);
            color: #0f172a;
            border-color: var(--blue);
        }

        /* Selector Controls */
        .controls-container {
            background-color: var(--card);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        select { 
            background: #222; 
            color: #fff; 
            border: 1px solid #444; 
            padding: 8px 12px; 
            font-size: 14px; 
            border-radius: 4px; 
            cursor: pointer; 
            outline: none;
        }
        
        /* Grid Layouts */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px;
        }
        .card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 140px;
        }
        .card.temp { border-top: 4px solid var(--accent); }
        .card.rain { border-top: 4px solid var(--blue); }
        .card h3 { 
            margin: 0 0 10px 0; 
            font-size: 0.8rem; 
            color: var(--dim); 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        .big-val { 
            font-size: 2.2rem; 
            font-weight: bold; 
            margin-bottom: 10px; 
            color: #fff; 
        }
        .big-val span { 
            font-size: 1rem; 
            color: var(--dim); 
            font-weight: normal; 
        }
        .row { 
            display: flex; 
            justify-content: space-between; 
            padding: 6px 0; 
            border-top: 1px solid #2a2a2a; 
            font-size: 0.85rem; 
        }
        .label { color: var(--dim); }
        .val { font-weight: bold; color: #ff9999; }
        .yr { color: #555; font-size: 0.7rem; margin-left: 4px; }

        /* Today / Daily Lookup Specials */
        .full-width {
            grid-column: span 1;
        }
        @media (min-width: 768px) {
            .full-width {
                grid-column: span 2;
            }
        }

        /* Outlook Table (Program 2) */
        .table-container {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow-x: auto;
            margin-top: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 13px; 
            text-align: center;
        }
        th { 
            background: #1f2937; 
            color: var(--blue); 
            padding: 10px; 
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }
        td { 
            padding: 10px; 
            border-bottom: 1px solid var(--border); 
        }
        tr:last-child td {
            border-bottom: none;
        }

        /* Status Indicator classes */
        #status { 
            font-size: 11px; 
            padding: 6px 12px; 
            border-radius: 4px; 
            font-weight: bold;
        }
        .err-msg { background: #7f1d1d; color: #fecaca; }
        .ok-msg { background: #064e3b; color: #a7f3d0; }

        /* AI Briefing Button */
        .ai-btn {
            background-color: #064e3b; 
            color: #a7f3d0; 
            border: 1px solid #10b981; 
            padding: 8px 16px; 
            border-radius: 4px; 
            font-size: 11px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background 0.2s;
            outline: none;
        }
        .ai-btn:hover {
            background-color: #047857;
        }
        .pending-text {
            color: #64748b;
            font-style: italic;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 id="displayTitle">Vizcaya Climate Almanac</h1>

        </div>
        <div id="status" class="err-msg">Connecting...</div>
    </header>

    <!-- Tab Toggles -->
    <div class="tab-container">
        <button id="tab-daily" class="tab-btn active" onclick="switchTab('daily')">Daily Lookup & Outlook</button>
        <button id="tab-monthly" class="tab-btn" onclick="switchTab('monthly')">Monthly & Annual Summary</button>
    </div>

    <!-- Controls Row -->
    <div class="controls-container">
        <!-- Monthly Selector (Tab 2) -->
        <select id="monthSelect" onchange="updateMonthlyUI()" style="display: none;">
            <option value="01_january">January</option>
            <option value="02_february">February</option>
            <option value="03_march">March</option>
            <option value="04_april">April</option>
            <option value="05_may">May</option>
            <option value="06_june">June</option>
            <option value="07_july">July</option>
            <option value="08_august">August</option>
            <option value="09_september">September</option>
            <option value="10_october">October</option>
            <option value="11_november">November</option>
            <option value="12_december">December</option>
            <option value="annual">Annual Summary</option>
        </select>

        <!-- Daily Selectors (Tab 1) -->
        <div id="dailySelectors" style="display: flex; gap: 10px; align-items: center;">
            <label style="font-size: 13px; color: var(--dim); font-weight: bold;">Lookup Date:</label>
            <select id="lookupMonth" onchange="updateDailyUI()">
                <option value="01">Jan</option><option value="02">Feb</option><option value="03">Mar</option>
                <option value="04">Apr</option><option value="05">May</option><option value="06">Jun</option>
                <option value="07">Jul</option><option value="08">Aug</option><option value="09">Sep</option>
                <option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
            </select>
            <select id="lookupDay" onchange="updateDailyUI()"></select>
        </div>
    </div>

    <!-- Active View Grid -->
    <div id="statsGrid" class="stats-grid"></div>

    <!-- Rolling 14-Day Outlook Table (Active in Tab 1) -->
    <div id="outlookContainer" class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="text-align: left; padding-left: 20px;">Forecast Date</th>
                    <th>Record High</th>
                    <th>Record Low</th>
                    <th>Normal High/Low</th>
                </tr>
            </thead>
            <tbody id="next14Body"></tbody>
        </table>
    </div>

    <!-- AI TACTICAL BRIEFING CONTAINER (NEW) -->
    <div class="section-title" style="margin-top: 35px; border-left-color: #10b981;">🤖 AI Tactical Briefing Generator</div>
    <div class="table-container" style="padding: 15px; background-color: var(--card);">
        <p style="font-size: 11px; color: var(--dim); margin-bottom: 8px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px;">Compiled plain-text context for LLMs (Click box or button to copy)</p>
        <textarea id="aiBriefingText" readonly style="width: 100%; height: 160px; background-color: #090d16; color: #38bdf8; border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: monospace; font-size: 12px; resize: none; overflow-y: scroll; outline: none; margin-bottom: 8px;" onclick="this.select()"></textarea>
        <div style="text-align: right;">
            <button class="ai-btn" onclick="copyBriefingToClipboard()">📋 Copy Climate Context for AI</button>
        </div>
    </div>

</div>

    // Tab Switcher Controller
    function switchTab(tabId) {
        currentTab = tabId;
        
        // Update tab buttons
        document.getElementById('tab-daily').classList.toggle('active', tabId === 'daily');
        document.getElementById('tab-monthly').classList.toggle('active', tabId === 'monthly');

        // Update selector displays
        document.getElementById('dailySelectors').style.display = tabId === 'daily' ? 'flex' : 'none';
        document.getElementById('monthSelect').style.display = tabId === 'monthly' ? 'block' : 'none';

        // Update main table container display
        document.getElementById('outlookContainer').style.display = tabId === 'daily' ? 'block' : 'none';

        // Redraw output based on view
        if (tabId === 'daily') {
            updateDailyUI();
        } else {
            updateMonthlyUI();
        }
    }

    async function loadData() {
        const statusDiv = document.getElementById('status');
        try {
            const response = await fetch(JSON_URL);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status} - ${response.statusText}`);
            }

            almanacData = await response.json();
            statusDiv.innerText = "ALMANAC INSTANCES LOADED";
            statusDiv.className = "ok-msg";

            // Auto-detect and populate current date
            const today = new Date();
            document.getElementById('lookupMonth').value = String(today.getMonth() + 1).padStart(2, '0');
            document.getElementById('lookupDay').value = String(today.getDate()).padStart(2, '0');
            
            // Set default tab on load to Daily
            switchTab('daily');

        } catch (err) {
            statusDiv.innerHTML = `<b>Error:</b> ${err.message}<br><small>Failed to fetch daily almanac JSON.</small>`;
            statusDiv.className = "err-msg";
        }
    }

    // --- VIEW 1: DAILY LOOKUP & 14-DAY OUTLOOK ---
    function updateDailyUI() {
        if (!almanacData) return;

        const mm = document.getElementById('lookupMonth').value;
        const dd = document.getElementById('lookupDay').value;
        const key = `${mm}-${dd}`;
        const data = almanacData[key];

        const grid = document.getElementById('statsGrid');
        document.getElementById('displayTitle').innerText = `DAILY RECORDS: ${mm}/${dd}`;

        if (data) {
            grid.innerHTML = `
                <div class="card temp">
                    <h3>Record High</h3>
                    <div class="big-val">${data.recH}<span>°F</span></div>
                    <div class="row" style="border: none;"><span class="label">Observed Year</span><span class="val">${data.recHY}</span></div>
                </div>
                <div class="card temp">
                    <h3>Record Low</h3>
                    <div class="big-val" style="color:#60a5fa">${data.recL}<span>°F</span></div>
                    <div class="row" style="border: none;"><span class="label">Observed Year</span><span class="val" style="color:#93c5fd">${data.recLY}</span></div>
                </div>
                <div class="card temp">
                    <h3>Daily Normals</h3>
                    <div class="big-val">${data.avgH}<span>°F</span></div>
                    <div class="row"><span class="label">Normal Low</span><span class="val" style="color:#cbd5e1">${data.avgL}°F</span></div>
                </div>
                <div class="card rain">
                    <h3>Precipitation YTD</h3>
                    <div class="big-val">${data.accP}<span>"</span></div>
                    <div class="row" style="border: none;"><span class="label">YTD Normal Accumulation</span></div>
                </div>
            `;
            
            buildOutlookTable(mm, dd);
            updateAIBriefing(); // Sync the AI text box on daily changes
        }
    }

    function buildOutlookTable(m, d) {
        const tbody = document.getElementById('next14Body');
        tbody.innerHTML = '';
        
        let current = new Date(2024, parseInt(m)-1, parseInt(d));

        for (let i = 0; i < 14; i++) {
            const mm = String(current.getMonth() + 1).padStart(2, '0');
            const dd = String(current.getDate()).padStart(2, '0');
            const dayData = almanacData[`${mm}-${dd}`];

            if (dayData) {
                tbody.innerHTML += `<tr>
                    <td style="text-align: left; padding-left: 20px; font-weight: bold; color: var(--blue);">
                        ${current.toLocaleString('default', { month: 'short', day: 'numeric' })}
                    </td>
                    <td style="font-weight: bold; color: #fff;">${dayData.recH}° <span style="font-size: 11px; color: var(--dim);">(${dayData.recHY})</span></td>
                    <td style="font-weight: bold; color: #60a5fa;">${dayData.recL}° <span style="font-size: 11px; color: var(--dim);">(${dayData.recLY})</span></td>
                    <td style="font-weight: bold; color: #cbd5e1;">${dayData.avgH}° / ${dayData.avgL}°</td>
                </tr>`;
            }
            current.setDate(current.getDate() + 1);
        }
    }

    // --- VIEW 2: MONTHLY & ANNUAL SUMMARY ---

        const key = document.getElementById('monthSelect').value;

        const grid = document.getElementById('statsGrid');
        
        document.getElementById('displayTitle').innerText = (key === 'annual') ? "ANNUAL CLIMATE SUMMARY" : key.split('_')[1].toUpperCase() + " CLIMATE RECORDS";

        grid.innerHTML = `
            <div class="card temp">
                <h3>Average Temperature</h3>
                <div class="big-val">${d.average_temp.mean}<span>°F</span></div>
                <div class="row"><span class="label">Record High Avg</span><span><span class="val">${d.average_temp.record_max_avg}°</span><span class="yr">${d.average_temp.record_max_year}</span></span></div>
                <div class="row"><span class="label">Record Low Avg</span><span><span class="val" style="color:#60a5fa">${d.average_temp.record_min_avg}°</span><span class="yr">${d.average_temp.record_min_year}</span></span></div>
            </div>
            <div class="card temp">
                <h3>Average Highs</h3>
                <div class="big-val">${d.average_high.mean}<span>°F</span></div>
                <div class="row"><span class="label">Extreme High</span><span><span class="val">${d.average_high.record_max}°</span><span class="yr">${d.average_high.record_max_year}</span></span></div>
                <div class="row"><span class="label">Lowest High</span><span><span class="val" style="color:#60a5fa">${d.average_high.record_min}°</span><span class="yr">${d.average_high.record_min_year}</span></span></div>
            </div>
            <div class="card temp">
                <h3>Average Lows</h3>
                <div class="big-val">${d.average_low.mean}<span>°F</span></div>
                <div class="row"><span class="label">Highest Low</span><span><span class="val">${d.average_low.record_max}°</span><span class="yr">${d.average_low.record_max_year}</span></span></div>
                <div class="row"><span class="label">Extreme Low</span><span><span class="val" style="color:#60a5fa">${d.average_low.record_min}°</span><span class="yr">${d.average_low.record_min_year}</span></span></div>
            </div>
            <div class="card rain">
                <h3>Average Rainfall</h3>
                <div class="big-val">${d.rainfall.mean}<span>"</span></div>
                <div class="row"><span class="label">Wettest</span><span><span class="val" style="color:#34d399">${d.rainfall.record_wettest}"</span><span class="yr">${d.rainfall.record_wettest_year}</span></span></div>
                <div class="row"><span class="label">Driest</span><span><span class="val" style="color:#fbbf24">${d.rainfall.record_driest}"</span><span class="yr">${d.rainfall.record_driest_year}</span></span></div>
            </div>
        `;

        updateAIBriefing(); // Sync the AI text box on monthly changes
    }

    // --- AI BRIEFING COMPILER & CLIPBOARD SYSTEM ---
    function updateAIBriefing() {
        if (!almanacData) return;

        // Get daily metrics from active daily selectors (synced date)
        const mm = document.getElementById('lookupMonth').value;
        const dd = document.getElementById('lookupDay').value;
        const dailyKey = `${mm}-${dd}`;
        const dRec = almanacData[dailyKey];

        // Map corresponding month name from selection list
        const monthNames = [
            "01_january", "02_february", "03_march", "04_april", "05_may", "06_june",
            "07_july", "08_august", "09_september", "10_october", "11_november", "12_december"
        ];
        const monthlyKey = monthNames[parseInt(mm) - 1];
        const mRec = climateData[monthlyKey];

        if (!dRec || !mRec) return;

        const monthNameString = monthlyKey.split('_')[1].toUpperCase();

        // Standardized plain-text context block for direct ingestion into AI systems
        const briefingText = `[VIZCAYA CLIMATE ALMANAC BRIEFING]
Target Date: ${mm}/${dd} (${monthNameString})

-- DAILY CLIMATE DATA (${mm}/${dd}) --
Daily Record High : ${dRec.recH}°F (${dRec.recHY})
Daily Record Low  : ${dRec.recL}°F (${dRec.recLY})
Daily Normal High : ${dRec.avgH}°F
Daily Normal Low  : ${dRec.avgL}°F
YTD Normal Rain   : ${dRec.accP}"

-- MONTHLY CLIMATE DATA (${monthNameString}) --
Average Temp      : ${mRec.average_temp.mean}°F (Record Max Avg: ${mRec.average_temp.record_max_avg}°F in ${mRec.average_temp.record_max_year} | Record Min Avg: ${mRec.average_temp.record_min_avg}°F in ${mRec.average_temp.record_min_year})
Average Highs     : ${mRec.average_high.mean}°F (Extreme High: ${mRec.average_high.record_max}°F in ${mRec.average_high.record_max_year} | Lowest High: ${mRec.average_high.record_min}°F in ${mRec.average_high.record_min_year})
Average Lows      : ${mRec.average_low.mean}°F (Highest Low: ${mRec.average_low.record_max}°F in ${mRec.average_low.record_max_year} | Extreme Low: ${mRec.average_low.record_min}°F in ${mRec.average_low.record_min_year})
Average Rainfall  : ${mRec.rainfall.mean}" (Wettest Month: ${mRec.rainfall.record_wettest}" in ${mRec.rainfall.record_wettest_year} | Driest Month: ${mRec.rainfall.record_driest}" in ${mRec.rainfall.record_driest_year})`;

        document.getElementById("aiBriefingText").value = briefingText;
    }

    function copyBriefingToClipboard() {
        const txtArea = document.getElementById("aiBriefingText");
        if (txtArea) {
            txtArea.select();
            navigator.clipboard.writeText(txtArea.value);
            alert("Vizcaya climate context copied to clipboard!");
        }
    }

    // Auto-detect month on load for fallback setting
    const monthList = ["01_january","02_february","03_march","04_april","05_may","06_june","07_july","08_august","09_september","10_october","11_november","12_december"];
    const currentMonth = monthList[new Date().getMonth()];
    document.getElementById('monthSelect').value = currentMonth;

    // Run fetch on load
    loadData();
</script>
