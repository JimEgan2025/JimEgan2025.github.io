<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizcaya Almanac | Round Rock, TX</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        .search-container { background: #ecf0f1; padding: 20px; border-radius: 10px; margin-bottom: 25px; }
        select { padding: 10px; border-radius: 5px; border: 1px solid #bdc3c7; font-size: 16px; margin: 5px; width: 80px; }
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .data-point { background: #fff; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        .label { display: block; font-size: 11px; color: #95a5a6; text-transform: uppercase; font-weight: bold; }
        .value { font-size: 18px; font-weight: bold; color: #2c3e50; }
        .full-width { grid-column: span 2; background: #e8f4fd; }
        #status { font-size: 12px; margin-bottom: 10px; padding: 8px; border-radius: 5px; }
        .err-msg { background: #fdedec; color: #a93226; border: 1px solid #fadbd8; }
        .ok-msg { background: #e9f7ef; color: #1d8348; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85em; }
        th { background: #3498db; color: white; padding: 8px; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h1>Vizcaya Almanac</h1>
    <div id="status">Connecting...</div>

    <div class="search-container">
        <select id="monthSelect" onchange="updateUI()">
            <option value="01">Jan</option><option value="02">Feb</option><option value="03">Mar</option>
            <option value="04">Apr</option><option value="05">May</option><option value="06">Jun</option>
            <option value="07">Jul</option><option value="08">Aug</option><option value="09">Sep</option>
            <option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
        </select>
        <select id="daySelect" onchange="updateUI()"></select>
    </div>

    <h2 id="dateHeader">---</h2>

    <div class="results-grid">
        <div class="data-point"><span class="label">Record High</span><span id="recHigh" class="value">--</span></div>
        <div class="data-point"><span class="label">Record Low</span><span id="recLow" class="value">--</span></div>
        <div class="data-point"><span class="label">Average High</span><span id="avgHigh" class="value">--</span></div>
        <div class="data-point"><span class="label">Average Low</span><span id="avgLow" class="value">--</span></div>
        <div class="data-point full-width"><span class="label">Precipitation Norm</span><span id="precip" class="value">--</span></div>
    </div>

    <table id="outlookTable">
        <thead><tr><th>Date</th><th>Rec H</th><th>Rec L</th><th>Avg H/L</th></tr></thead>
        <tbody id="next14Body"></tbody>
    </table>
</div>

<script>
    const JSON_URL = 'https://JimEgan2025.github.io/almanac.json';
    let almanacData = null;

    // Fill Day Dropdown
    const dSelect = document.getElementById('daySelect');
    for(let i=1; i<=31; i++) {
        let val = String(i).padStart(2, '0');
        dSelect.innerHTML += `<option value="${val}">${i}</option>`;
    }

    async function loadData() {
        const statusDiv = document.getElementById('status');
        try {
            const response = await fetch(JSON_URL);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status} - ${response.statusText}`);
            }

            almanacData = await response.json();
            statusDiv.innerText = "Data Loaded Successfully";
            statusDiv.className = "ok-msg";

            const today = new Date();
            document.getElementById('monthSelect').value = String(today.getMonth() + 1).padStart(2, '0');
            document.getElementById('daySelect').value = String(today.getDate()).padStart(2, '0');
            
            updateUI();
        } catch (err) {
            statusDiv.innerHTML = `<b>Error:</b> ${err.message}<br><small>Ensure file is at JimEgan2025.github.io/almanac.json</small>`;
            statusDiv.className = "err-msg";
        }
    }

    function updateUI() {
        if (!almanacData) return;

        const mm = document.getElementById('monthSelect').value;
        const dd = document.getElementById('daySelect').value;
        const key = `${mm}-${dd}`;
        const data = almanacData[key];

        if (data) {
            document.getElementById('dateHeader').innerText = `${mm}/${dd}`;
            document.getElementById('recHigh').innerText = `${data.recH}° (${data.recHY})`;
            document.getElementById('recLow').innerText = `${data.recL}° (${data.recLY})`;
            document.getElementById('avgHigh').innerText = `${data.avgH}°`;
            document.getElementById('avgLow').innerText = `${data.avgL}°`;
            document.getElementById('precip').innerText = `${data.accP}"`;
            
            buildTable(mm, dd);
        }
    }

    function buildTable(m, d) {
        const tbody = document.getElementById('next14Body');
        tbody.innerHTML = '';
        let current = new Date(2024, parseInt(m)-1, parseInt(d));

        for (let i = 0; i < 14; i++) {
            const mm = String(current.getMonth() + 1).padStart(2, '0');
            const dd = String(current.getDate()).padStart(2, '0');
            const dayData = almanacData[`${mm}-${dd}`];

            if (dayData) {
                tbody.innerHTML += `<tr>
                    <td>${current.toLocaleString('default', { month: 'short', day: 'numeric' })}</td>
                    <td>${dayData.recH}°</td><td>${dayData.recL}°</td>
                    <td>${dayData.avgH}°/${dayData.avgL}°</td>
                </tr>`;
            }
            current.setDate(current.getDate() + 1);
        }
    }

    loadData();
</script>
</body>
</html>
