<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Texas Weather Warnings</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0b0f1a;
    color: #e8eefc;
}

header {
    background: #111a2e;
    padding: 14px 18px;
    font-size: 20px;
    font-weight: bold;
    border-bottom: 2px solid #2b3a66;
}

#status {
    padding: 8px 18px;
    font-size: 13px;
    color: #9fb3d9;
}

#controls {
    padding: 10px 18px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

button {
    background: #1b2a4a;
    color: #e8eefc;
    border: 1px solid #2b3a66;
    padding: 6px 10px;
    cursor: pointer;
    border-radius: 4px;
}

button:hover {
    background: #24385f;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #223055;
    text-align: left;
    vertical-align: top;
}

th {
    background: #16213a;
}

/* Severity */
.sev { color: #ff4d4d; font-weight: bold; }
.mod { color: #ffcc00; font-weight: bold; }
.min { color: #66ccff; }

/* Focus region */
.focus {
    background: rgba(0, 255, 170, 0.08);
    border-left: 3px solid #00ffaa;
}

.dim { opacity: 0.35; }

/* Countdown */
.countdown {
    font-weight: bold;
    color: #cfe3ff;
}

.expired {
    color: #666;
}

/* AI box */
#aiPanel {
    padding: 14px 18px;
    border-top: 2px solid #2b3a66;
    margin-top: 20px;
}

textarea {
    width: 100%;
    height: 160px;
    background: #0f1626;
    color: #e8eefc;
    border: 1px solid #2b3a66;
    border-radius: 6px;
    padding: 10px;
    font-size: 13px;
    resize: vertical;
}

footer {
    padding: 10px 18px;
    font-size: 12px;
    color: #8aa0c8;
}
</style>
</head>

<body>

<header>Texas Active Weather Warnings</header>

<div id="status">Loading alerts...</div>

<div id="controls">
    <button onclick="toggleFocus()">Central Texas Focus: OFF</button>
    <button onclick="toggleMinor()">Hide Minor Alerts: OFF</button>
</div>

<table>
<thead>
<tr>
<th>Severity</th>
<th>Event</th>
<th>Affected Area</th>
<th>Time Remaining</th>
<th>Expires</th>
</tr>
</thead>
<tbody id="alerts"></tbody>
</table>

<div id="aiPanel">
    <h3 style="margin:0 0 8px 0;">AI Weather Notes</h3>

    <textarea id="aiBox"
        placeholder="Auto-generated alert summary will appear here..."></textarea>

    <div style="margin-top:8px; display:flex; gap:10px;">
        <button onclick="copyAlerts()">Copy Current Alerts</button>
        <button onclick="clearBox()">Clear</button>
    </div>
</div>

<footer>
Central Texas focus: Williamson • Travis • Bell County
</footer>

<script>
const endpoint = "https://api.weather.gov/alerts/active?area=TX";

let focusMode = false;
let hideMinor = false;

function toggleFocus() {
    focusMode = !focusMode;
    document.querySelector("#controls button").innerText =
        "Central Texas Focus: " + (focusMode ? "ON" : "OFF");
    loadAlerts();
}

function toggleMinor() {
    hideMinor = !hideMinor;
    document.querySelectorAll("#controls button")[1].innerText =
        "Hide Minor Alerts: " + (hideMinor ? "ON" : "OFF");
    loadAlerts();
}

function minutesUntil(t) {
    if (!t) return null;
    return Math.floor((new Date(t) - new Date()) / 60000);
}

function format(mins) {
    if (mins === null) return "N/A";
    if (mins < 0) return "Expired";
    if (mins < 60) return mins + " min";
    return `${Math.floor(mins / 60)} hr ${mins % 60} min`;
}

function sevClass(sev, mins) {
    if (mins !== null && mins <= 15) return "sev";
    if (sev === "Severe") return "sev";
    if (sev === "Moderate") return "mod";
    return "min";
}

function isCentral(area) {
    if (!area) return false;
    const a = area.toLowerCase();
    return a.includes("williamson") ||
           a.includes("travis") ||
           a.includes("bell") ||
           a.includes("austin");
}

function isMinor(sev, event) {
    if (!sev) return true;
    const s = sev.toLowerCase();
    const e = (event || "").toLowerCase();

    return s.includes("minor") ||
           e.includes("statement") ||
           e.includes("advisory");
}

async function loadAlerts() {
    try {
        document.getElementById("status").innerText = "Updating...";

        const res = await fetch(endpoint, {
            headers: { "Accept": "application/geo+json" }
        });

        const data = await res.json();
        const features = data.features || [];

        const tbody = document.getElementById("alerts");
        tbody.innerHTML = "";

        let filtered = features;

        if (hideMinor) {
            filtered = filtered.filter(f =>
                !isMinor(f.properties.severity, f.properties.event)
            );
        }

        if (!filtered.length) {
            tbody.innerHTML = "<tr><td colspan='5'>No matching alerts</td></tr>";
            autoFillAI([]);
            return;
        }

        filtered.forEach(f => {
            const p = f.properties;

            const mins = minutesUntil(p.expires || p.ends);
            const central = isCentral(p.areaDesc);

            let rowClass = "";
            if (focusMode) rowClass = central ? "focus" : "dim";
            else rowClass = central ? "focus" : "";

            const row = `
                <tr class="${rowClass}">
                    <td class="${sevClass(p.severity, mins)}">${p.severity || ""}</td>
                    <td><b>${p.event || ""}</b><br>${p.headline || ""}</td>
                    <td>${p.areaDesc || ""}</td>
                    <td class="countdown">${format(mins)}</td>
                    <td>${new Date(p.expires || p.ends).toLocaleString()}</td>
                </tr>
            `;

            tbody.innerHTML += row;
        });

        document.getElementById("status").innerText =
            `Alerts: ${filtered.length} | Focus: ${focusMode ? "ON" : "OFF"} | Minor filter: ${hideMinor ? "ON" : "OFF"} | ${new Date().toLocaleTimeString()}`;

        autoFillAI(filtered);

    } catch (e) {
        console.error(e);
        document.getElementById("status").innerText =
            "Warning feed unavailable";
    }
}

/* AI BOX */
function autoFillAI(features) {
    let text = "";

    if (!features.length) {
        text = "No active alerts or all filtered out.";
    } else {
        features.forEach(f => {
            const p = f.properties;

            text +=
`EVENT: ${p.event}
SEVERITY: ${p.severity}
AREA: ${p.areaDesc}
HEADLINE: ${p.headline || ""}
EXPIRES: ${p.expires}

---\n`;
        });
    }

    document.getElementById("aiBox").value = text;
}

function copyAlerts() {
    document.getElementById("aiBox").select();
    document.execCommand("copy");
}

function clearBox() {
    document.getElementById("aiBox").value = "";
}

loadAlerts();
setInterval(loadAlerts, 60000);
</script>

</body>
</html>
