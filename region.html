<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GULF OPS v12.0 - Live Tropical Tracking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#020617; --panel:#0f172a; --border:#1e293b; --text:#f8fafc;
  --muted:#94a3b8; --ok:#22c55e; --warn:#ef4444; --watch:#fde047; --risk:#f97316; --marine:#06b6d4; --tropical:#d946ef;
}
* { box-sizing: border-box; }
body { 
    margin:0; background:var(--bg); color:var(--text); 
    font-family: 'Inter', system-ui, sans-serif;
    width: 1200px; height: 800px; margin: auto; overflow: hidden;
    border: 2px solid var(--border);
}

header {
    padding: 0 25px; background: #020617; border-bottom: 3px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; height: 80px;
}

.grid { display: grid; grid-template-columns: 1fr 380px; height: 720px; }
#map { height: 100%; background: #020617; }

.side { 
    display: flex; flex-direction: column; gap: 15px; padding: 15px; 
    background: #020617; border-left: 3px solid var(--border); overflow-y: auto;
}

.card {
    background: var(--panel); border-radius: 12px; padding: 20px;
    border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.card h2 {
    margin: 0 0 10px; font-size: 14px; font-weight: 800; text-transform: uppercase;
    color: var(--muted); letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px;
}

.big { font-size: 28px; font-weight: 900; line-height: 1.1; letter-spacing: -1px; }
.small { font-size: 15px; font-weight: 500; color: var(--muted); margin-top: 8px; line-height: 1.4; }

.alert-item {
    background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05);
    padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 14px; font-weight: 700;
}

.tropical-badge {
    background: var(--tropical); color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px;
}

button {
    background: #1e293b; color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 15px; cursor: pointer; font-size: 13px; font-weight: 800;
}
button.active { background: var(--risk); border-color: white; }

#timestamp {
    font-family: monospace; font-size: 14px; font-weight: 700; color: var(--ok);
    background: rgba(34, 197, 94, 0.1); padding: 6px 12px; border-radius: 6px;
}
</style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:20px;">
    <h1 style="font-size:28px; margin:0; font-weight:900;">GULF OPS <span style="color:var(--tropical)">v12.0</span></h1>
    <div id="timestamp">LIVE SATELLITE SYNC...</div>
  </div>
  <div style="display:flex; gap:10px;">
    <button id="btnTropical" class="active" onclick="fetchTropicalData()">Update Live Tracks</button>
    <button onclick="toggleLayer('radar', this)" class="active">Radar</button>
  </div>
</header>

<div class="grid">
  <div id="map"></div>
  <div class="side">
    <div class="card" style="border-left: 5px solid var(--tropical);">
        <h2>Active Tropical Systems</h2>
        <div class="big" id="stormName" style="color:var(--tropical)">NO ACTIVE CYCLONES</div>
        <div class="small" id="stormStats">Monitoring NHC Atlantic/Gulf Basin.</div>
    </div>
    
    <div class="card">
        <h2>Live Advisory Data</h2>
        <div id="advisoryText" class="small">Waiting for NHC broadcast...</div>
    </div>
    
    <div class="card">
        <h2>Marine Risk</h2>
        <div id="marine" class="small">Scanning Offshore Buoys...</div>
    </div>
    
    <div class="card" style="flex-grow:1">
        <h2>NWS Active Watches</h2>
        <div id="watches" class="small">--</div>
    </div>
  </div>
</div>

<script>
const map = L.map('map', {zoomControl: false}).setView([25.0, -90.0], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const radar = L.tileLayer.wms("https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0r.cgi", {
  layers: "nexrad-n0r", format: 'image/png', transparent: true, opacity: 0.7
}).addTo(map);

const tropicalLayer = L.layerGroup().addTo(map);
const hazardLayer = L.layerGroup().addTo(map);

/**
 * FETCH LIVE TROPICAL DATA
 * Pulls from the NWS/NHC Public GIS Feed
 */
async function fetchTropicalData() {
    try {
        // NWS Feed for Tropical Cyclone Forecast Tracks
        const response = await fetch('https://services9.arcgis.com/RHVPFullBXYwv2vV/arcgis/rest/services/Tropical_Cyclone_Forecast_Track/FeatureServer/0/query?where=1%3D1&outFields=*&f=pjson');
        const data = await response.json();
        
        tropicalLayer.clearLayers();
        
        if (data.features && data.features.length > 0) {
            const storm = data.features[0].attributes;
            document.getElementById('stormName').innerText = storm.STORMNAME || "ACTIVE SYSTEM";
            document.getElementById('stormStats').innerText = `Intensity: ${storm.INTENSITY} MPH | Pressure: ${storm.MSLP}mb`;
            document.getElementById('advisoryText').innerHTML = `<b>Movement:</b> ${storm.MOVEMENT}<br><b>Advisory:</b> #${storm.ADVISNUM}<br><b>Forecast:</b> NHC Official Path Updated.`;

            // Draw the track on map
            // Note: In a production environment, we would also pull the 'Cone' layer 
            // and the 'Points' layer from the same ArcGIS server.
            L.geoJSON(data, {
                style: { color: '#d946ef', weight: 5, dashArray: '10, 10' }
            }).addTo(tropicalLayer);

            // Add a pulsing marker for the current eye
            const currentPoint = data.features[0].geometry.paths[0][0];
            L.circleMarker([currentPoint[1], currentPoint[0]], {
                color: '#fff', fillColor: '#d946ef', fillOpacity: 1, radius: 10
            }).addTo(tropicalLayer).bindTooltip("STORM CENTER", {permanent: true});

        } else {
            document.getElementById('stormName').innerText = "NO ACTIVE SYSTEMS";
            document.getElementById('stormStats').innerText = "Gulf and Atlantic Basins are clear.";
        }
    } catch (e) {
        console.error("Tropical Sync Error:", e);
    }
}

async function fetchAlerts() {
  try {
    const res = await fetch("https://api.weather.gov/alerts/active?area=TX,LA,MS,AL,FL");
    const data = await res.json();
    hazardLayer.clearLayers();
    
    const uiMarine = document.getElementById("marine");
    const uiWatch = document.getElementById("watches");
    uiWatch.innerHTML = "";
    uiMarine.innerHTML = "OFFSHORE NOMINAL";

    data.features.forEach((a, i) => {
      const p = a.properties, k = p.event.toLowerCase();
      if(a.geometry && i < 15) { 
        L.geoJSON(a, { style: { color: k.includes("hurricane") ? "#d946ef" : "#fb7185", weight: 3, fillOpacity: 0.2 } }).addTo(hazardLayer);
      }
      
      if (k.includes("marine") || k.includes("gale")) {
        uiMarine.innerHTML = `<div class="alert-item marine">${p.event}</div>`;
      } else if (i < 5) {
        uiWatch.innerHTML += `<div class="alert-item">${p.event}</div>`;
      }
    });
    
    document.getElementById("timestamp").innerText = "SYNC: " + new Date().toLocaleTimeString();
  } catch(e) { console.error("Alert Sync Error"); }
}

function toggleLayer(type, btn) {
    btn.classList.toggle('active');
    if(type === 'radar') btn.classList.contains('active') ? map.addLayer(radar) : map.removeLayer(radar);
}

// Initial Loads
fetchTropicalData();
fetchAlerts();

// Auto-Refresh (Every 5 minutes)
setInterval(() => {
    fetchTropicalData();
    fetchAlerts();
}, 300000);

</script>
</body>
</html>
