<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tropical & Global Command | v2.0</title>
    <style>
        :root { --primary: #0ea5e9; --bg: #030712; --panel: #111827; --text: #f3f4f6; --accent: #f59e0b; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; align-items: center; justify-content: center; }
        
        #sidebar { width: 580px; background: var(--panel); border: 1px solid #1f2937; padding: 25px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7); }
        h2 { color: var(--primary); font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 10px 0; border-bottom: 2px solid var(--primary); padding-bottom: 8px; text-align: center; }
        
        .section-label { font-size: 0.6rem; color: var(--accent); font-weight: bold; margin: 15px 0 8px 0; text-transform: uppercase; letter-spacing: 1px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        
        .btn-sync { background: #1f2937; color: var(--primary); border: 1px solid var(--primary); padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; transition: 0.3s; }
        .btn-sync:hover { background: var(--primary); color: #fff; box-shadow: 0 0 10px var(--primary); }
        
        .briefing-box { background: #020617; border: 1px solid #1e293b; padding: 15px; border-radius: 6px; margin-top: 15px; }
        textarea { width: 100%; height: 260px; background: transparent; border: none; color: #d1d5db; font-family: 'Courier New', monospace; font-size: 0.75rem; resize: none; outline: none; line-height: 1.5; }
        
        .footer { font-size: 0.6rem; color: #6b7280; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Tropical & Global Command v2.0</h2>

    <div class="section-label">1. Tropical Hazards (Week 2-3)</div>
    <div class="btn-grid">
        <button class="btn-sync" onclick="window.open('https://www.cpc.ncep.noaa.gov/products/precip/CWlink/ghaz/index.php')">Hazards Outlook</button>
        <button class="btn-sync" onclick="window.open('https://www.cpc.ncep.noaa.gov/products/precip/CWlink/MJO/mjo.shtml')">MJO Pulse</button>
    </div>

    <div class="section-label">2. Global Indicators (ENSO & SSTs)</div>
    <div class="btn-grid">
        <button class="btn-sync" onclick="window.open('https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/lanina/enso_evolution-status-fcsts-web.pdf')">ENSO Lifecycle (PDF)</button>
        <button class="btn-sync" onclick="window.open('https://www.ospo.noaa.gov/data/sst/anomaly/curr_anim.gif')">Atlantic SST Anomaly</button>
    </div>

    <div class="briefing-box">
        <textarea id="briefing-text" readonly></textarea>
    </div>
    
    <div class="footer">CPC & OSPO Monitoring | Focus: El Niño Transition 2026</div>
</div>

<script>
    function updateBriefing() {
        const briefing = `GLOBAL STRATEGIC BRIEFING | ${new Date().toLocaleDateString()}
-------------------------------------------
ENSO STATUS: Neutral (Transitioning to El Niño)
PDO: Negative / AMO: Positive (Warm Phase)

STRATEGIC ANALYSIS:
1. EL NIÑO WATCH: 82% probability of onset by July. This typically increases Gulf wind shear, which may suppress storm formation frequency but not intensity.
2. ATLANTIC WARMTH: The AMO warm phase persists. Record-high SSTs in the Western Gulf serve as high-octane fuel for any system that escapes the wind shear.
3. VIZCAYA CORRELATION: While El Niño often brings wetter winters to Round Rock, the negative PDO may limit summer rainfall, increasing stagnant air/heat risks until the "uncapping" events occur.

AI TACTICAL RECOMMENDATION:
Prioritize the SST Anomaly map. If the Gulf remains "hot" (dark orange/red) while El Niño shear is weak in August, the risk to Texas infrastructure from high-intensity moisture surges is extreme.`;

        document.getElementById('briefing-text').value = briefing;
    }
    updateBriefing();
</script>
</body>
</html>
