<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizcaya Climate Almanac - Master Copy</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #d4a017; --blue: #007bff; --text: #e0e0e0; --dim: #888; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 1.5rem; color: var(--blue); }
        select { background: #222; color: #fff; border: 1px solid #444; padding: 10px; font-size: 1rem; border-radius: 4px; width: 100%; max-width: 300px; cursor: pointer; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 8px; border-top: 4px solid #444; }
        .card.temp { border-top-color: var(--accent); }
        .card.rain { border-top-color: var(--blue); }
        .card h3 { margin: 0 0 10px 0; font-size: 0.8rem; color: var(--dim); text-transform: uppercase; }
        .big-val { font-size: 2.2rem; font-weight: bold; margin-bottom: 10px; color: #fff; }
        .big-val span { font-size: 1rem; color: var(--dim); font-weight: normal; }
        .row { display: flex; justify-content: space-between; padding: 6px 0; border-top: 1px solid #2a2a2a; font-size: 0.85rem; }
        .label { color: var(--dim); }
        .val { font-weight: bold; color: #ff9999; }
        .yr { color: #555; font-size: 0.7rem; margin-left: 4px; }
    </style>
</head>
<body>
