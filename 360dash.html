<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizcaya Pro Weather | Warning & Energy Suite</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body { 
            font-family:'Segoe UI', system-ui, -apple-system, sans-serif; 
            background:#f0f2f5; color:#111827; line-height:1.5; 
            padding-top: 90px; 
        }

        /* FIXED COMMAND HEADER */
        .header { 
            background:#1e3a8a; color:white; padding:15px 25px; text-align:center; 
            position: fixed; top: 0; width: 100%; height: 90px; z-index: 4000; 
            display: flex; flex-direction: column; justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .header h1 { font-size: 2.2em; letter-spacing: 1px; }
        .header p { font-size: 1.2em; opacity: 0.9; }

        .container { max-width: 1950px; margin: 0 auto; padding: 0 15px; }

        .table-container { 
            background: white; border-radius: 0 0 15px 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); border: 2px solid #cbd5e1; 
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }

        /* STICKY COLUMN LABELS */
        thead th { 
            background: #1f2937; color: white; padding: 15px 5px; 
            font-size: 15px; text-transform: uppercase; letter-spacing: 1px;
            position: sticky; top: 90px; z-index: 3500; 
            border-right: 1px solid #4b5563; text-align: center;
        }

        /* STICKY DAY SEPARATOR */
        .day-separator td { 
            background: #334155 !important; font-weight: 900; color: #ffffff; 
            font-size: 22px; padding: 20px 25px; 
            position: sticky; top: 141px; z-index: 3000; 
            border-bottom: 4px solid #1e3a8a; text-align: left;
        }
        .day-summary { float: right; font-weight: 700; color: #facc15; font-size: 18px; }
        .summary-val { color: #ffffff; margin-right: 15px; }

        /* DATA ROWS */
        tr { border-bottom: 2px solid #e2e8f0; }
        td { 
            padding: 15px 5px; font-size: 19px; 
            vertical-align: middle; border-right: 1px solid #f1f5f9; 
            text-align: center; background: white; font-weight: 600;
        }

        /* WARNING ENGINE COLOR CODING */
        /* Heat & Feels Like */
        .warn-heat-extreme { background: #7e22ce !important; color: white !important; } /* 105+ Purple */
        .warn-heat-high { background: #ea580c !important; color: white !important; }    /* 90+ Orange */
        .warn-cold-freeze { background: #60a5fa !important; color: white !important; }  /* <32 Light Blue */
        .warn-cold-hard { background: #1e3a8a !important; color: white !important; }    /* <15 Deep Blue */
        
        /* Wind Gusts */
        .warn-wind-high { background: #fef08a !important; color: #92400e !important; }   /* 30+ Yellow */
        .warn-wind-severe { background: #dc2626 !important; color: white !important; }  /* 50+ Red */

        /* Dew Point */
        .dew-muggy { color: #0d9488 !important; font-weight: 900 !important; text-decoration: underline; } /* 70+ Sticky */

        /* SOLAR EVENTS */
        .sunrise-row td { background: #fef3c7 !important; color: #92400e !important; font-size: 20px !important; font-weight: 900; }
        .sunset-row td { background: #e0e7ff !important; color: #1e3a8a !important; font-size: 20px !important; font-weight: 900; }

        /* HIGHLIGHTS */
        .is-now td { border-top: 4px solid #f59e0b; border-bottom: 4px solid #f59e0b; }
        .is-night td { background-color: #f8fafc; color: #64748b; }

        /* CELL SPECIFICS */
        .temp-cell { font-weight: 900; font-size: 1.45em; display: block; }
        .precip-amt { color: #1e40af; font-size: 16px; font-weight: 800; margin-top: 5px; display: block; }
        .et-active { color: #15803d !important; background: #f0fdf4 !important; font-weight: 900; }
        .pressure-cell { font-family: 'Courier New', monospace; font-weight: 800; }

        .badge { padding: 5px 10px; border-radius: 8px; font-size: 15px; font-weight: 900; color: white; display: inline-block; }
        .cape-active { background: #ea580c; }
        .cape-none { background: #e5e7eb; color: #6b7280; font-weight: 600; }

        #topBtn {
            position: fixed; bottom: 30px; right: 30px; z-index: 5000;
            background: #1e3a8a; color: white; border: none; width: 70px; height: 70px;
            border-radius: 50%; cursor: pointer; display: none; box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            font-size: 35px;
        }

        @media (max-width: 1300px) { .hide-tablet { display: none; } }
    </style>
</head>
<body>

<button id="topBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">▲</button>

<div class="header">
    <h1>Vizcaya Pro Weather Suite</h1>
    <p id="updateTime">Syncing Meteorological Warning Engine...</p>
</div>

<div class="container">
    <div id="status" style="text-align:center; padding:150px; font-size: 28px; font-weight: bold; color: #1e3a8a;">📡 Establish High-Res Connection...</div>
    
    <div id="mainContent" class="table-container" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th style="width:140px">Time</th>
                    <th style="width:70px"></th>
                    <th style="text-align:left; padding-left:25px">Conditions</th>
                    <th style="width:120px">Temp / Feels</th>
                    <th style="width:100px">Dew Pt</th>
                    <th style="width:130px">Precip Prob/Amt</th>
                    <th style="width:100px">ET (Loss)</th>
                    <th style="width:140px">Wind / Gust</th>
                    <th style="width:80px">Dir</th>
                    <th style="width:110px" class="hide-tablet">Pres (inHg)</th>
                    <th style="width:120px" class="hide-tablet">Solar Energy</th>
                    <th style="width:150px">Cloud Base / Vis</th>
                    <th style="width:110px">CAPE</th>
                    <th style="width:80px">Risk</th>
                </tr>
            </thead>
            <tbody id="hourlyBody"></tbody>
        </table>
    </div>
</div>

<script>
    const LAT = 30.5871;
    const LON = -97.641;
    const VC_API_KEY = "556ZX74XKT3VBMGFNX626Q9JJ";

    const getWindDir = deg => ['N','NE','E','SE','S','SW','W','NW'][Math.round(deg / 45) % 8];
    const getMoonIcon = phase => {
        if (phase === 0 || phase === 1) return '🌑'; if (phase < 0.25) return '🌙'; if (phase === 0.25) return '🌓';
        if (phase < 0.5) return '🌔'; if (phase === 0.5) return '🌕'; if (phase < 0.75) return '🌖';
        if (phase === 0.75) return '🌗'; return '🌘';
    };

    // WARNING ENGINE HELPERS
    function getFeelsClass(temp) {
        if (temp >= 105) return 'warn-heat-extreme';
        if (temp >= 90) return 'warn-heat-high';
        if (temp <= 15) return 'warn-cold-hard';
        if (temp <= 32) return 'warn-cold-freeze';
        return '';
    }

    function getGustClass(gust) {
        if (gust >= 50) return 'warn-wind-severe';
        if (gust >= 30) return 'warn-wind-high';
        return '';
    }

    async function fetchHourly() {
        try {
            const now = new Date();
            const startStr = now.toLocaleDateString('en-CA');
            const endDate = new Date(); endDate.setDate(now.getDate() + 17);
            const endStr = endDate.toLocaleDateString('en-CA');
            const url = `https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${LAT},${LON}/${startStr}/${endStr}?unitGroup=us&include=days,hours&key=${VC_API_KEY}&contentType=json`;

            const res = await fetch(url);
            const data = await res.json();
            renderHourly(data.days);
        } catch (err) {
            document.getElementById('status').innerText = "Critical Error: " + err.message;
        }
    }

    function renderHourly(days) {
        const body = document.getElementById('hourlyBody');
        body.innerHTML = '';
        const now = new Date();
        const currentHourTs = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours()).getTime();
        let renderedCount = 0;

        days.forEach(day => {
            if (!day.hours || renderedCount >= 360) return;
            const validHours = day.hours.filter(h => new Date(day.datetime + 'T' + h.datetime).getTime() >= currentHourTs);
            if (validHours.length === 0) return;

            const dateObj = new Date(day.datetime + 'T00:00:00');
            const dayLabel = day.datetime === now.toLocaleDateString('en-CA') ? "TODAY" : dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            
            body.insertAdjacentHTML('beforeend', `
                <tr class="day-separator">
                    <td colspan="14">
                        📅 ${dayLabel.toUpperCase()} ${getMoonIcon(day.moonphase)}
                        <div class="day-summary">
                            HI: <span class="summary-val">${Math.round(day.tempmax)}°</span> 
                            LO: <span class="summary-val">${Math.round(day.tempmin)}°</span> 
                            RAIN: <span class="summary-val">${(day.precip || 0).toFixed(2)}"</span>
                        </div>
                    </td>
                </tr>`);

            const sunRiseH = parseInt(day.sunrise.split(':')[0]);
            const sunSetH = parseInt(day.sunset.split(':')[0]);

            validHours.forEach((hour) => {
                if (renderedCount >= 360) return;
                const hr = parseInt(hour.datetime.split(':')[0]);
                const hTs = new Date(day.datetime + 'T' + hour.datetime).getTime();
                
                if (hr === sunRiseH) body.insertAdjacentHTML('beforeend', `<tr class="sunrise-row"><td colspan="14">☀️ SUNRISE AT ${day.sunrise.slice(0,5)} AM</td></tr>`);
                if (hr === sunSetH) body.insertAdjacentHTML('beforeend', `<tr class="sunset-row"><td colspan="14">🌙 SUNSET AT ${day.sunset.slice(0,5)} PM</td></tr>`);

                const feelsCls = getFeelsClass(hour.feelslike);
                const gustCls = getGustClass(hour.windgust);
                const dewCls = hour.dew >= 70 ? 'dew-muggy' : '';
                const etCls = (hour.et || 0) > 0 ? 'et-active' : '';

                const tr = document.createElement('tr');
                if (hTs === currentHourTs) tr.className = 'is-now';
                else if (hr < 6 || hr >= 20) tr.className = 'is-night';

                tr.innerHTML = `
                    <td class="time-cell">${hr % 12 || 12}:00 ${hr >= 12 ? 'PM' : 'AM'}</td>
                    <td style="font-size:2.2em">${['☀️','🌙','⛅','☁️','🌧️','🌦️','⛈️','❄️','🌫️','🌨️','💨'][['clear-day','clear-night','partly-cloudy-day','cloudy','rain','showers-day','thunder-rain','snow','fog','sleet','wind'].indexOf(hour.icon)] || '☁️'}</td>
                    <td style="text-align:left; padding-left:25px; font-weight:800">${hour.conditions}</td>
                    <td class="${feelsCls}">
                        <span class="temp-cell" style="color:inherit">${Math.round(hour.temp)}°</span>
                        <span style="font-size:15px; opacity:0.8; display:block">Feels ${Math.round(hour.feelslike)}°</span>
                    </td>
                    <td class="${dewCls}">${Math.round(hour.dew)}°</td>
                    <td style="${hour.precip > 0 ? 'background:#eff6ff' : ''}">
                        <span class="precip-prob">${Math.round(hour.precipprob)}%</span>
                        <span class="precip-amt">${(hour.precip || 0).toFixed(2)}"</span>
                    </td>
                    <td class="${etCls}">${(hour.et || 0).toFixed(3)}"</td>
                    <td class="${gustCls}">
                        ${Math.round(hour.windspeed)} 
                        <span style="font-weight:900; font-size:16px; display:block">G${Math.round(hour.windgust)}</span>
                    </td>
                    <td><span style="font-weight:900; color:#1e3a8a">${getWindDir(hour.winddir)}</span></td>
                    <td class="pressure-cell hide-tablet">${(hour.pressure * 0.02953).toFixed(2)}</td>
                    <td class="hide-tablet" style="font-weight:800">${(hour.solarenergy || 0).toFixed(1)}<br><span style="color:#ca8a04; font-size:14px">MJ/m²</span></td>
                    <td class="cloud-cell"><b>${hour.cloudbase ? Math.round(hour.cloudbase).toLocaleString() + ' ft' : (hour.cloudcover > 25 ? Math.round(((hour.temp-hour.dew)/4.4)*1000).toLocaleString() + ' ft' : "Clear Sky")}</b><br><span style="font-size:15px">Vis: ${hour.visibility || 10} mi</span></td>
                    <td><span class="badge ${hour.cape > 0 ? 'cape-active' : 'cape-none'}">${Math.round(hour.cape) || 'Stable'}</span></td>
                    <td><b style="color:${hour.severerisk > 30 ? '#ef4444' : '#111827'}; font-size:1.2em">${hour.severerisk || 0}</b></td>
                `;
                body.appendChild(tr);
                renderedCount++;
            });
        });
        document.getElementById('status').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('updateTime').innerText = `360-Hour Meteorological Suite Active | ${new Date().toLocaleTimeString()}`;
    }

    window.onscroll = function() { document.getElementById("topBtn").style.display = (window.pageYOffset > 800) ? "block" : "none"; };
    fetchHourly();
</script>
</body>
</html>
