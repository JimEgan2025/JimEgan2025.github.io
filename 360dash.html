<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizcaya Pro Weather | Final Almanac Suite</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body { 
            font-family:'Segoe UI', system-ui, -apple-system, sans-serif; 
            background:#f0f2f5; color:#111827; line-height:1.5; 
            padding-top: 100px; 
        }

        /* FIXED COMMAND HEADER */
        .header { 
            background:#1e3a8a; color:white; padding:15px; text-align:center; 
            position: fixed; top: 0; width: 100%; height: 100px; z-index: 4000; 
            display: flex; flex-direction: column; justify-content: center; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }
        .header h1 { font-size: 2.5em; letter-spacing: 1px; font-weight: 800; }
        .header p { font-size: 1.3em; opacity: 0.9; }

        .container { max-width: 1950px; margin: 0 auto; padding: 0 15px; }

        /* STICKY DAY SEPARATOR */
        .day-separator td { 
            background: #1e293b !important; color: #ffffff; 
            padding: 25px; 
            position: sticky; top: 100px; z-index: 3000; 
            border-bottom: 6px solid #facc15; text-align: left;
        }
        .day-label { font-size: 28px; font-weight: 900; display: block; color: #facc15; margin-bottom: 10px; }
        
        .day-summary-grid { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .forecast-box { flex: 1.5; font-size: 22px; }
        .almanac-box { flex: 1.5; text-align: right; border-left: 3px solid #4b5563; padding-left: 30px; font-size: 18px; color: #e2e8f0; line-height: 1.4; }
        
        .summary-val { color: #ffffff; font-weight: 900; font-size: 1.2em; margin-right: 20px; }
        .almanac-val { color: #fbbf24; font-weight: 800; }
        .anomaly-badge { padding: 4px 12px; border-radius: 8px; font-size: 16px; font-weight: 900; color: white; margin-left: 15px; vertical-align: middle; }

        /* DATA ROWS */
        tr { border-bottom: 2px solid #cbd5e1; }
        td { padding: 20px 5px; font-size: 22px; vertical-align: middle; border-right: 1px solid #e2e8f0; text-align: center; background: white; font-weight: 700; }

        /* COLUMN HEADERS */
        thead th { 
            background: #334155; color: white; padding: 15px 5px; font-size: 16px; 
            text-transform: uppercase; position: sticky; top: 100px; z-index: 3500; 
            text-align: center;
        }

        /* WARNING ENGINE COLORS */
        .warn-heat { background: #ea580c !important; color: white !important; }    
        .warn-freeze { background: #3b82f6 !important; color: white !important; }  
        .is-now td { border-top: 8px solid #f59e0b; border-bottom: 8px solid #f59e0b; background: #fffbeb !important; }
        .is-night td { background-color: #f8fafc; color: #94a3b8; }
        
        .sunrise-row td { background: #fef3c7 !important; color: #92400e !important; font-size: 20px !important; font-weight: 900; }
        .sunset-row td { background: #e0e7ff !important; color: #1e3a8a !important; font-size: 20px !important; font-weight: 900; }

        #status { text-align:center; padding:150px; font-size: 32px; font-weight: bold; color: #1e3a8a; }
        #topBtn { position: fixed; bottom: 30px; right: 30px; z-index: 5000; background: #1e3a8a; color: white; border: none; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; font-size: 40px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); display: none; }
    </style>
</head>
<body>

<button id="topBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">▲</button>

<div class="header">
    <h1>Vizcaya Pro Weather & Almanac</h1>
    <p id="updateTime">360-Hour Meteorological Intelligence Suite</p>
</div>

<div class="container">
    <div id="status">📡 Synchronizing Climatological Data...</div>
    <div id="mainContent" style="display:none;" class="table-container">
        <table style="width: 100%; border-collapse: collapse; table-layout: fixed; background: white; border: 4px solid #1f2937;">
            <thead>
                <tr>
                    <th style="width:160px;">Time</th>
                    <th style="width:80px"></th>
                    <th style="text-align:left; padding-left:30px;">Conditions</th>
                    <th style="width:150px;">Temp / Feels</th>
                    <th style="width:120px;">Dew Pt</th>
                    <th style="width:160px;">Rain % / In.</th>
                    <th style="width:130px;">ET Loss</th>
                    <th style="width:160px;">Wind / Gust</th>
                    <th style="width:100px;">Dir</th>
                    <th style="width:180px;">Cloud Base / Vis</th>
                    <th style="width:120px;">CAPE</th>
                    <th style="width:100px;">Risk</th>
                </tr>
            </thead>
            <tbody id="hourlyBody"></tbody>
        </table>
    </div>
</div>

<script>
    const VC_API_KEY = "556ZX74XKT3VBMGFNX626Q9JJ";
    // UPDATED: Points directly to your JSON file
    const ALMANAC_URL = 'https://JimEgan2025.github.io/almanac.json';
    
    let almanacData = {};

    // Simplified to just fetch the JSON
    async function sourceAlmanac() {
        try {
            const response = await fetch(ALMANAC_URL);
            if (!response.ok) throw new Error("JSON Fetch failed");
            almanacData = await response.json();
            return true;
        } catch (e) { 
            console.error("Almanac Load Error", e); 
            return false; 
        }
    }

    const getWindDir = deg => ['N','NE','E','SE','S','SW','W','NW'][Math.round(deg / 45) % 8];

    function getWeatherIcon(icon) {
        const mapping = {"clear-day":"☀️","clear-night":"🌙","partly-cloudy-day":"⛅","partly-cloudy-night":"☁️","cloudy":"☁️","rain":"🌧️","showers-day":"🌦️","thunder-rain":"⛈️","snow":"❄️","fog":"🌫️","sleet":"🌨️","wind":"💨"};
        return mapping[icon] || "☁️";
    }

    async function init() {
        // Load Almanac first
        await sourceAlmanac();
        
        const now = new Date();
        const startStr = now.toLocaleDateString('en-CA'); // YYYY-MM-DD
        const endDate = new Date(); 
        endDate.setDate(now.getDate() + 15);
        const endStr = endDate.toLocaleDateString('en-CA');
        
        try {
            const res = await fetch(`https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/30.5871,-97.641/${startStr}/${endStr}?unitGroup=us&include=days,hours&key=${VC_API_KEY}&contentType=json`);
            if (!res.ok) throw new Error("Weather API Error");
            const data = await res.json();
            render(data.days);
        } catch (e) { 
            document.getElementById('status').innerText = "API Error: " + e.message; 
        }
    }

    function render(days) {
        const body = document.getElementById('hourlyBody');
        const now = new Date();
        const currentHourTs = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours()).getTime();
        let renderedCount = 0;

        body.innerHTML = ""; // Clear existing

        days.forEach(day => {
            if (!day.hours || renderedCount >= 360) return;

            // mmdd key (10-28) to match your JSON
            const mmdd = day.datetime.slice(5); 
            const hist = almanacData[mmdd];
            
            const netBalance = (day.precip || 0) - (day.et || 0);
            const netColor = netBalance < 0 ? '#f87171' : '#4ade80';

            let histBlock = `<div>History Unavailable</div>`;
            let anomalyTag = "";
            
            if (hist) {
                histBlock = `
                    <div>AVG: <span class="almanac-val">${hist.avgH}°/${hist.avgL}°</span></div>
                    <div>REC HI: <span class="almanac-val">${hist.recH}° (${hist.recHY})</span> | REC LO: <span class="almanac-val">${hist.recL}° (${hist.recLY})</span></div>
                    <div>DAILY NET H2O: <span class="almanac-val" style="color:${netColor}">${netBalance.toFixed(3)}"</span></div>
                `;
                const diff = day.tempmax - hist.avgH;
                if (diff >= 7) anomalyTag = `<span class="anomaly-badge" style="background:#ea580c">ABOVE NORMAL</span>`;
                else if (diff <= -7) anomalyTag = `<span class="anomaly-badge" style="background:#2563eb">BELOW NORMAL</span>`;
            }

            // Day Separator Row
            body.insertAdjacentHTML('beforeend', `
                <tr class="day-separator">
                    <td colspan="12">
                        <div class="day-summary-grid">
                            <div class="forecast-box">
                                <span class="day-label">${day.datetime === now.toLocaleDateString('en-CA') ? "TODAY" : new Date(day.datetime + 'T00:00:00').toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'}).toUpperCase()} ${anomalyTag}</span>
                                <span>FCST: <span class="summary-val">${Math.round(day.tempmax)}°/${Math.round(day.tempmin)}°</span></span>
                                <span>RAIN: <span class="summary-val">${(day.precip || 0).toFixed(2)}"</span></span>
                            </div>
                            <div class="almanac-box">${histBlock}</div>
                        </div>
                    </td>
                </tr>`);

            day.hours.forEach(hour => {
                const hTime = new Date(day.datetime + 'T' + hour.datetime).getTime();
                if (hTime < currentHourTs || renderedCount >= 360) return;

                const hr = parseInt(hour.datetime.split(':')[0]);
                
                // Sunrise/Sunset Alerts
                if (hour.datetime.slice(0,5) === day.sunrise.slice(0,5)) body.insertAdjacentHTML('beforeend', `<tr class="sunrise-row"><td colspan="12">☀️ SUNRISE AT ${day.sunrise.slice(0,5)} AM</td></tr>`);
                if (hour.datetime.slice(0,5) === day.sunset.slice(0,5)) body.insertAdjacentHTML('beforeend', `<tr class="sunset-row"><td colspan="12">🌙 SUNSET AT ${day.sunset.slice(0,5)} PM</td></tr>`);

                const feelsCls = hour.feelslike >= 100 ? 'warn-heat' : (hour.feelslike <= 32 ? 'warn-freeze' : '');
                const gustCls = hour.windgust >= 35 ? 'warn-heat' : '';

                body.insertAdjacentHTML('beforeend', `
                    <tr class="${hTime === currentHourTs ? 'is-now' : ''} ${hr < 6 || hr >= 20 ? 'is-night' : ''}">
                        <td style="font-weight:900; color:#1e3a8a">${hr % 12 || 12}:00 ${hr >= 12 ? 'PM' : 'AM'}</td>
                        <td style="font-size:3em">${getWeatherIcon(hour.icon)}</td>
                        <td style="text-align:left; padding-left:30px; font-weight:800">${hour.conditions}</td>
                        <td class="${feelsCls}">
                            <span style="font-size:1.4em; display:block">${Math.round(hour.temp)}°</span>
                            <span style="font-size:16px; font-weight:600; opacity:0.8">Feels ${Math.round(hour.feelslike)}°</span>
                        </td>
                        <td style="${hour.dew >= 70 ? 'color:#0f766e; background:#ccfbf1' : ''}">${Math.round(hour.dew)}°</td>
                        <td style="${hour.precip > 0 ? 'background:#eff6ff' : ''}">
                            <span style="color:#2563eb; display:block">${Math.round(hour.precipprob)}%</span>
                            <span style="font-size:18px">${(hour.precip || 0).toFixed(2)}"</span>
                        </td>
                        <td style="color:#166534; background:#f0fdf4">${(hour.et || 0).toFixed(3)}"</td>
                        <td class="${gustCls}">${Math.round(hour.windspeed)} <span style="font-size:18px; display:block">G${Math.round(hour.windgust)}</span></td>
                        <td>${getWindDir(hour.winddir)}</td>
                        <td><b>${hour.cloudbase ? Math.round(hour.cloudbase).toLocaleString() : '---'} ft</b><br><span style="font-size:16px">Vis: ${hour.visibility || 10} mi</span></td>
                        <td>${Math.round(hour.cape) || '0'}</td>
                        <td><b style="color:${hour.severerisk > 30 ? '#ef4444' : '#111827'}">${hour.severerisk || 0}</b></td>
                    </tr>`);
                renderedCount++;
            });
        });

        document.getElementById('status').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
    }

    // Scroll to Top logic
    window.onscroll = function() { 
        document.getElementById("topBtn").style.display = (window.pageYOffset > 800) ? "block" : "none"; 
    };

    // Run the program
    init();
</script>
</body>
</html>
