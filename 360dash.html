<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizcaya Pro Weather | Water & Energy Manager</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body { 
            font-family:'Segoe UI', system-ui, -apple-system, sans-serif; 
            background:#f0f2f5; color:#111827; line-height:1.5; 
            padding-top: 90px; 
        }

        /* FIXED COMMAND HEADER */
        .header { 
            background:#1e3a8a; color:white; padding:15px 25px; text-align:center; 
            position: fixed; top: 0; width: 100%; height: 90px; z-index: 4000; 
            display: flex; flex-direction: column; justify-content: center; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }
        .header h1 { font-size: 2.4em; letter-spacing: 1px; font-weight: 800; }
        .header p { font-size: 1.2em; opacity: 0.9; }

        .container { max-width: 1950px; margin: 0 auto; padding: 0 15px; }

        .table-container { 
            background: white; border-radius: 0 0 15px 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); border: 3px solid #334155; 
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }

        /* STICKY COLUMN LABELS */
        thead th { 
            background: #1f2937; color: white; padding: 15px 5px; 
            font-size: 16px; text-transform: uppercase; letter-spacing: 1px;
            position: sticky; top: 90px; z-index: 3500; 
            border-right: 1px solid #4b5563; text-align: center;
        }

        /* STICKY DAY SEPARATOR */
        .day-separator td { 
            background: #334155 !important; font-weight: 900; color: #ffffff; 
            font-size: 24px; padding: 22px 25px; 
            position: sticky; top: 144px; z-index: 3000; 
            border-bottom: 5px solid #1e3a8a; text-align: left;
        }
        .day-summary { float: right; font-weight: 700; color: #facc15; font-size: 19px; line-height: 1.2; }
        .summary-val { color: #ffffff; margin-right: 15px; }
        .net-loss { color: #f87171 !important; font-weight: 900; } /* Red for water loss */
        .net-gain { color: #4ade80 !important; font-weight: 900; } /* Green for water gain */

        /* DATA ROWS */
        tr { border-bottom: 2px solid #cbd5e1; }
        td { 
            padding: 18px 5px; font-size: 22px; 
            vertical-align: middle; border-right: 1px solid #e2e8f0; 
            text-align: center; background: white; font-weight: 700;
        }

        /* WARNING ENGINE */
        .warn-heat-extreme { background: #7e22ce !important; color: white !important; } 
        .warn-heat-high { background: #ea580c !important; color: white !important; }    
        .warn-cold-freeze { background: #3b82f6 !important; color: white !important; }  
        .warn-cold-hard { background: #1e3a8a !important; color: white !important; }    
        .warn-wind-high { background: #fde047 !important; color: #854d0e !important; }   
        .warn-wind-severe { background: #dc2626 !important; color: white !important; }  
        
        /* ET STYLING */
        .et-cell { color: #166534; background: #f0fdf4; font-weight: 900; }
        .et-high-loss { background: #15803d !important; color: white !important; }

        .dew-muggy { background: #ccfbf1 !important; color: #0f766e !important; text-decoration: underline; }

        /* SOLAR EVENTS */
        .sunrise-row td { background: #fef3c7 !important; color: #92400e !important; font-size: 22px !important; font-weight: 900; }
        .sunset-row td { background: #e0e7ff !important; color: #1e3a8a !important; font-size: 22px !important; font-weight: 900; }

        /* HIGHLIGHTS */
        .is-now td { border-top: 6px solid #f59e0b; border-bottom: 6px solid #f59e0b; }
        .is-night td { background-color: #f8fafc; color: #94a3b8; }

        /* CELL SPECIFICS */
        .temp-cell { font-weight: 900; font-size: 1.5em; display: block; }
        .precip-amt { color: #1e40af; font-size: 18px; margin-top: 5px; display: block; }
        .pressure-cell { font-family: 'Courier New', monospace; font-weight: 900; color: #374151; }

        .badge { padding: 6px 12px; border-radius: 10px; font-size: 16px; font-weight: 900; color: white; display: inline-block; }
        .cape-active { background: #ea580c; border: 2px solid #9a3412; }
        .cape-none { background: #e5e7eb; color: #6b7280; font-weight: 600; }

        #topBtn {
            position: fixed; bottom: 30px; right: 30px; z-index: 5000;
            background: #1e3a8a; color: white; border: none; width: 80px; height: 80px;
            border-radius: 50%; cursor: pointer; display: none; box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            font-size: 40px;
        }

        @media (max-width: 1400px) { .hide-tablet { display: none; } }
    </style>
</head>
<body>

<button id="topBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">▲</button>

<div class="header">
    <h1>Vizcaya Pro Weather Suite</h1>
    <p id="updateTime">Syncing High-Resolution Water & Energy Models...</p>
</div>

<div class="container">
    <div id="status" style="text-align:center; padding:150px; font-size: 32px; font-weight: bold; color: #1e3a8a;">📡 Establish High-Res Connection...</div>
    
    <div id="mainContent" class="table-container" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th style="width:160px">Time</th>
                    <th style="width:80px"></th>
                    <th style="text-align:left; padding-left:30px">Conditions</th>
                    <th style="width:140px">Temp / Feels</th>
                    <th style="width:110px">Dew Pt</th>
                    <th style="width:150px">Precip Prob/Amt</th>
                    <th style="width:120px">ET (Loss)</th>
                    <th style="width:160px">Wind / Gust</th>
                    <th style="width:90px">Dir</th>
                    <th style="width:120px" class="hide-tablet">Pres (inHg)</th>
                    <th style="width:130px" class="hide-tablet">Solar Energy</th>
                    <th style="width:180px">Cloud Base / Vis</th>
                    <th style="width:120px">CAPE</th>
                    <th style="width:90px">Risk</th>
                </tr>
            </thead>
            <tbody id="hourlyBody"></tbody>
        </table>
    </div>
</div>

<script>
    const LAT = 30.5871;
    const LON = -97.641;
    const VC_API_KEY = "556ZX74XKT3VBMGFNX626Q9JJ";

    const getWindDir = deg => ['N','NE','E','SE','S','SW','W','NW'][Math.round(deg / 45) % 8];
    const getMoonIcon = phase => {
        if (phase === 0 || phase === 1) return '🌑'; if (phase < 0.25) return '🌙'; if (phase === 0.25) return '🌓';
        if (phase < 0.5) return '🌔'; if (phase === 0.5) return '🌕'; if (phase < 0.75) return '🌖';
        if (phase === 0.75) return '🌗'; return '🌘';
    };

    function getWeatherIcon(icon) {
        const mapping = {
            "clear-day": "☀️", "clear-night": "🌙", "partly-cloudy-day": "⛅",
            "partly-cloudy-night": "☁️", "cloudy": "☁️", "rain": "🌧️",
            "showers-day": "🌦️", "thunder-rain": "⛈️", "snow": "❄️", "fog": "🌫️", "sleet": "🌨️", "wind": "💨"
        };
        return mapping[icon] || "☁️";
    }

    async function fetchHourly() {
        try {
            const now = new Date();
            const startStr = now.toLocaleDateString('en-CA');
            const endDate = new Date(); endDate.setDate(now.getDate() + 17);
            const endStr = endDate.toLocaleDateString('en-CA');
            const url = `https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${LAT},${LON}/${startStr}/${endStr}?unitGroup=us&include=days,hours&key=${VC_API_KEY}&contentType=json`;

            const res = await fetch(url);
            const data = await res.json();
            renderHourly(data.days);
        } catch (err) {
            document.getElementById('status').innerText = "Critical Error: " + err.message;
        }
    }

    function renderHourly(days) {
        const body = document.getElementById('hourlyBody');
        body.innerHTML = '';
        const now = new Date();
        const currentHourTs = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours()).getTime();
        let renderedCount = 0;

        days.forEach(day => {
            if (!day.hours || renderedCount >= 360) return;
            const validHours = day.hours.filter(h => new Date(day.datetime + 'T' + h.datetime).getTime() >= currentHourTs);
            if (validHours.length === 0) return;

            // WATER BALANCE CALCULATION
            const netBalance = (day.precip || 0) - (day.et || 0);
            const netClass = netBalance < 0 ? 'net-loss' : 'net-gain';

            const dateObj = new Date(day.datetime + 'T00:00:00');
            const isToday = day.datetime === now.toLocaleDateString('en-CA');
            const dayLabel = isToday ? "TODAY" : dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            
            body.insertAdjacentHTML('beforeend', `
                <tr class="day-separator">
                    <td colspan="14">
                        📅 ${dayLabel.toUpperCase()} ${getMoonIcon(day.moonphase)}
                        <div class="day-summary">
                            H/L: <span class="summary-val">${Math.round(day.tempmax)}°/${Math.round(day.tempmin)}°</span> 
                            ET TOTAL: <span class="summary-val" style="color:#4ade80">${(day.et || 0).toFixed(3)}"</span>
                            <span class="${netClass}">NET: ${netBalance.toFixed(3)}"</span>
                        </div>
                    </td>
                </tr>`);

            const sunRiseH = parseInt(day.sunrise.split(':')[0]);
            const sunSetH = parseInt(day.sunset.split(':')[0]);

            validHours.forEach((hour) => {
                if (renderedCount >= 360) return;
                const hr = parseInt(hour.datetime.split(':')[0]);
                const hTs = new Date(day.datetime + 'T' + hour.datetime).getTime();
                
                if (hr === sunRiseH) body.insertAdjacentHTML('beforeend', `<tr class="sunrise-row"><td colspan="14">☀️ SUNRISE AT ${day.sunrise.slice(0,5)} AM</td></tr>`);
                if (hr === sunSetH) body.insertAdjacentHTML('beforeend', `<tr class="sunset-row"><td colspan="14">🌙 SUNSET AT ${day.sunset.slice(0,5)} PM</td></tr>`);

                const fl = hour.feelslike;
                const feelsCls = fl >= 105 ? 'warn-heat-extreme' : (fl >= 90 ? 'warn-heat-high' : (fl <= 15 ? 'warn-cold-hard' : (fl <= 32 ? 'warn-cold-freeze' : '')));
                const gustCls = hour.windgust >= 50 ? 'warn-wind-severe' : (hour.windgust >= 30 ? 'warn-wind-high' : '');
                const dewCls = hour.dew >= 70 ? 'dew-muggy' : '';
                
                // ET High Loss Highlighting
                const etVal = hour.et || 0;
                const etCls = etVal >= 0.015 ? 'et-high-loss' : 'et-cell';

                const tr = document.createElement('tr');
                if (hTs === currentHourTs) tr.className = 'is-now';
                else if (hr < 6 || hr >= 20) tr.className = 'is-night';

                const diff = hour.temp - hour.dew;
                const lcl = (diff / 4.4) * 1000;
                let cb = (hour.cloudbase && hour.cloudbase > 0) ? Math.round(hour.cloudbase).toLocaleString() + ' ft' : (hour.cloudcover > 20 ? Math.round(lcl).toLocaleString() + ' ft' : 'Clear');

                tr.innerHTML = `
                    <td class="time-cell">${hr % 12 || 12}:00 ${hr >= 12 ? 'PM' : 'AM'}</td>
                    <td style="font-size:2.5em">${getWeatherIcon(hour.icon)}</td>
                    <td style="text-align:left; padding-left:30px; font-weight:800">${hour.conditions}</td>
                    <td class="${feelsCls}">
                        <span class="temp-cell" style="color:inherit">${Math.round(hour.temp)}°</span>
                        <span style="font-size:16px; font-weight:600; opacity:0.8; display:block">Feels ${Math.round(hour.feelslike)}°</span>
                    </td>
                    <td class="${dewCls}">${Math.round(hour.dew)}°</td>
                    <td style="${hour.precip > 0 ? 'background:#eff6ff' : ''}">
                        <span class="precip-prob">${Math.round(hour.precipprob)}%</span>
                        <span class="precip-amt">${(hour.precip || 0).toFixed(2)}"</span>
                    </td>
                    <td class="${etCls}">${etVal.toFixed(3)}"</td>
                    <td class="${gustCls}">
                        ${Math.round(hour.windspeed)} 
                        <span style="font-weight:900; font-size:18px; display:block">G${Math.round(hour.windgust)}</span>
                    </td>
                    <td style="font-weight:900; color:#1e3a8a">${getWindDir(hour.winddir)}</td>
                    <td class="pressure-cell hide-tablet">${(hour.pressure * 0.02953).toFixed(2)}</td>
                    <td class="hide-tablet" style="font-weight:800">${(hour.solarenergy || 0).toFixed(1)}<br><span style="color:#ca8a04; font-size:16px">MJ/m²</span></td>
                    <td style="font-size:18px"><b>${cb}</b><br><span style="font-size:16px; opacity:0.7">Vis: ${hour.visibility || 10} mi</span></td>
                    <td><span class="badge ${hour.cape > 0 ? 'cape-active' : 'cape-none'}">${Math.round(hour.cape) || 'Stable'}</span></td>
                    <td><b style="color:${hour.severerisk > 30 ? '#ef4444' : '#111827'}; font-size:1.3em">${hour.severerisk || 0}</b></td>
                `;
                body.appendChild(tr);
                renderedCount++;
            });
        });
        document.getElementById('status').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('updateTime').innerText = `360-Hour Meteorological View | Data Updated: ${new Date().toLocaleTimeString()}`;
    }

    window.onscroll = function() { document.getElementById("topBtn").style.display = (window.pageYOffset > 800) ? "block" : "none"; };
    fetchHourly();
</script>
</body>
</html>
