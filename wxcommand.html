<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TX Weather Command | Strategic GIS Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body { height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; }
  :root { --primary: #ffcc00; --bg: #050505; --panel: #121212; --border: #333; --ai-accent: #0ea5e9; }
  body { display: flex; font-family: 'Segoe UI', system-ui, sans-serif; color: #e0e0e0; }
  
  #sidebar, #right-panel { 
    width: 340px; height: 100vh; padding: 15px; background: var(--panel); 
    z-index: 2000; overflow-y: auto; display: flex; flex-direction: column; 
    box-sizing: border-box; border-color: var(--border); border-style: solid;
  }
  #sidebar { border-right-width: 1px; }
  #right-panel { border-left-width: 1px; }
  #map { flex: 1; height: 100vh; background: #000; position: relative; z-index: 1; }

  header { 
    background: #1a1a1a; padding: 0 20px; border-bottom: 2px solid var(--primary); 
    display: flex; justify-content: space-between; align-items: center; 
    position: absolute; top: 0; left: 340px; right: 340px; z-index: 3000; 
    height: 45px; box-sizing: border-box;
  }
  
  h1 { margin: 0; font-size: 0.9rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
  .section-title { font-size: 0.7rem; text-transform: uppercase; color: var(--primary); margin: 15px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 3px; font-weight: 800; }
  
  /* AI Briefing Box Styling */
  .ai-briefing-container { margin-bottom: 20px; border: 1px solid var(--ai-accent); border-radius: 6px; background: #081220; padding: 10px; }
  .ai-label { font-size: 0.65rem; font-weight: 900; color: var(--ai-accent); text-transform: uppercase; margin-bottom: 8px; display: flex; justify-content: space-between; }
  #ai-summary-text { width: 100%; height: 180px; background: #000; border: 1px solid #1e293b; color: #94a3b8; font-family: 'Courier New', monospace; font-size: 0.7rem; padding: 8px; border-radius: 4px; resize: none; margin-bottom: 8px; line-height: 1.4; }
  .copy-btn { background: var(--ai-accent); color: #fff; border: none; padding: 4px 10px; border-radius: 3px; font-size: 0.6rem; cursor: pointer; font-weight: bold; }

  label { display: flex; align-items: center; margin: 8px 0; cursor: pointer; font-size: 0.8rem; }
  input[type="checkbox"] { margin-right: 12px; accent-color: var(--primary); }
  .btn-focus { background: var(--primary); color: #000; border: none; padding: 4px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }

  .alert-card { background: #1a1a1a; border-left: 4px solid var(--primary); padding: 12px; margin-bottom: 10px; font-size: 0.75rem; border: 1px solid #222; border-radius: 6px; }
  .alert-card.Extreme { border-left-color: #ff0000; background: #2a1010; }
  .alert-card.Severe { border-left-color: #ff6600; background: #2a1a00; }
</style>
</head>
<body>

<header>
  <h1>TX Weather Command</h1>
  <button class="btn-focus" onclick="focusVizcaya()">Focus: Vizcaya</button>
  <div id="as-of" style="font-size:0.7rem;color:#888;">Syncing...</div>
</header>

<div id="sidebar">
  <div style="height:50px;"></div>
  
  <div class="section-title">Radar & Satellite</div>
  <label><input type="checkbox" id="radar" checked> NEXRAD Live Radar</label>
  <label><input type="checkbox" id="sat"> GOES-16 IR Satellite</label>
  
  <div class="section-title">SPC Severe Outlooks</div>
  <label><input type="checkbox" id="spc1" checked> Day 1 Severe (Today)</label>
  <label><input type="checkbox" id="spc2"> Day 2 Severe (Tomorrow)</label>
  
  <div class="section-title">Other Hazards</div>
  <label><input type="checkbox" id="wwa" checked> Watches & Warnings</label>
  <label><input type="checkbox" id="meso"> Mesoscale Discussions</label>

  <div class="section-title">SPC Legend</div>
  <div style="font-size: 0.7rem; opacity: 0.8;">
    <div style="color:#c0e8c0">■ Marginal</div>
    <div style="color:#f6e38b">■ Slight</div>
    <div style="color:#ffbc7b">■ Enhanced</div>
    <div style="color:#ff8a8a">■ Moderate</div>
    <div style="color:#ff6060">■ High Risk</div>
  </div>
</div>

<div id="map"></div>

<div id="right-panel">
  <div style="height:50px;"></div>
  
  <div class="section-title">AI Strategic Briefing (Untruncated)</div>
  <div class="ai-briefing-container">
    <div class="ai-label"><span>Live Text Analysis</span> <button class="copy-btn" onclick="copyBriefing()">COPY BRIEFING</button></div>
    <textarea id="ai-summary-text" readonly placeholder="Processing Texas NWS data..."></textarea>
  </div>

  <div class="section-title">Live Alert Feed</div>
  <div id="alert-list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>

<script>
// Base Map Initialization
const map = L.map('map', { zoomControl: false }).setView([31.2, -99.5], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: 'CARTO' }).addTo(map);

function focusVizcaya() { map.flyTo([30.5871, -97.6410], 10); }

// WMS and Dynamic Layers
const layers = {
  radar: L.tileLayer.wms('https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0r.cgi', { layers: 'nexrad-n0r-900913', format: 'image/png', transparent: true, opacity: 0.7 }).addTo(map),
  sat: L.tileLayer.wms('https://mesonet.agron.iastate.edu/cgi-bin/wms/goes/conus_ir.cgi', { layers: 'conus_ir_4km', format: 'image/png', transparent: true, opacity: 0.4 }),
  wwa: L.esri.featureLayer({ url: 'https://mapservices.weather.noaa.gov/eventdriven/rest/services/WWA/watch_warn_adv/MapServer/1' }).addTo(map),
  spc1: L.esri.dynamicMapLayer({ url: 'https://mapservices.weather.noaa.gov/vector/rest/services/outlooks/SPC_wx_outlks/MapServer', layers: [1], opacity: 0.5 }).addTo(map),
  spc2: L.esri.dynamicMapLayer({ url: 'https://mapservices.weather.noaa.gov/vector/rest/services/outlooks/SPC_wx_outlks/MapServer', layers: [9], opacity: 0.5 }),
  meso: L.esri.featureLayer({ url: 'https://mapservices.weather.noaa.gov/vector/rest/services/outlooks/SPC_mesoscale_discussions/MapServer/0' })
};

// Layer Toggle Logic
document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
  checkbox.onchange = () => {
    const layer = layers[checkbox.id];
    if (checkbox.checked) { map.addLayer(layer); } 
    else { map.removeLayer(layer); }
  };
});

async function updateAlerts() {
  try {
    const res = await fetch('https://api.weather.gov/alerts/active?area=TX');
    const data = await res.json();
    const list = document.getElementById('alert-list');
    const aiText = document.getElementById('ai-summary-text');
    document.getElementById('as-of').innerText = 'Sync: ' + new Date().toLocaleTimeString();

    if (!data.features?.length) {
      list.innerHTML = '<div style="color:#666; padding:20px;">No active alerts.</div>';
      aiText.value = "TX STRATEGIC BRIEFING: All sectors quiet.";
      return;
    }

    // Update the Sidebar Feed
    list.innerHTML = data.features.slice(0, 15).map(f => {
      const p = f.properties;
      return `<div class="alert-card ${p.severity}">
          <span style="font-weight:bold; color:#fff; display:block;">${p.event}</span>
          <div style="color:var(--primary); font-size:0.7rem;">${p.senderName}</div>
          <div style="color:#bbb; font-size:0.65rem; margin-top:4px;">${p.areaDesc.split(';')[0]}</div>
        </div>`;
    }).join('');

    // Generate Untruncated AI Briefing Text
    const counts = {};
    const locations = {};
    
    data.features.forEach(f => {
        const e = f.properties.event;
        counts[e] = (counts[e] || 0) + 1;
        if(!locations[e]) locations[e] = [];
        // Flatten and clean all listed counties/areas
        const areas = f.properties.areaDesc.split(';').map(s => s.trim());
        locations[e].push(...areas);
    });

    let briefing = `FULL TX STRATEGIC BRIEFING | ${new Date().toLocaleString()}\n`;
    briefing += `TOTAL HAZARDS: ${data.features.length}\n`;
    briefing += `-------------------------------------------\n`;

    for (const [hazard, count] of Object.entries(counts)) {
        const uniqueLocs = [...new Set(locations[hazard])].sort();
        briefing += `[${count}] ${hazard.toUpperCase()}\n`;
        briefing += `IMPACTED AREAS: ${uniqueLocs.join(", ")}\n\n`;
    }

    aiText.value = briefing;

  } catch (e) { console.error("Update Error:", e); }
}

function copyBriefing() {
    const copyText = document.getElementById("ai-summary-text");
    copyText.select();
    document.execCommand("copy");
}

updateAlerts();
setInterval(updateAlerts, 300000); // 5 min refresh
</script>
</body>
</html>
