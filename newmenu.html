<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Weather Ops Center | Pro</title>
<style>:root {  --bg-dark: #0a0f18;  --bg-sidebar: #111827;  --bg-card: #1f2937;  --accent: #38bdf8;  --text-main: #f3f4f6;  --text-dim: #9ca3af;  --border: #374151;}
*{  margin:0;  padding:0;  box-sizing:border-box;}
body{  font-family:'Segoe UI',Roboto,Arial;  background:var(--bg-dark);  color:var(--text-main);  height:100vh;  overflow:hidden;}
.dashboard{  display:flex;  height:100vh;  width:100vw;}
/* SIDEBAR */.sidebar{  width:280px;  background:var(--bg-sidebar);  border-right:1px solid var(--border);  display:flex;  flex-direction:column;}
.header-area{  padding:15px;  border-bottom:1px solid var(--border);}
.header{  font-weight:800;  color:var(--accent);  text-align:center;  font-size:16px;  letter-spacing:2px;}
.search-box{  width:100%;  padding:8px;  background:var(--bg-dark);  border:1px solid var(--border);  color:white;}
.tabs{  flex:1;  overflow-y:auto;  padding:12px;}
.group-label{  font-size:14px;  color:var(--accent);  margin:18px 0 6px;  font-weight:bold;}
.tab{  width:100%;  padding:10px 12px;  margin-bottom:3px;  background:transparent;  border:1px solid transparent;  color:var(--text-dim);  cursor:pointer;  text-align:left;  font-size:15px;}
.tab:hover{  background:var(--bg-card);  color:white;}
.tab.active{  background:var(--accent);  color:black;  font-weight:bold;}
/* MAIN */.main{  flex:1;  display:flex;  flex-direction:column;}
.topbar{  height:60px;  background:var(--bg-sidebar);  border-bottom:1px solid var(--border);  display:flex;  align-items:center;  justify-content:space-between;  padding:0 15px;}
.btn{  background:var(--bg-card);  border:1px solid var(--border);  color:white;  padding:6px 10px;  font-size:11px;  cursor:pointer;}
.btn:hover{  border-color:var(--accent);}
/* VIEWER */.viewer{  flex:1;  position:relative;  background:black;  overflow:hidden; /* prevents overflow bleed */}
/* FIXED IFRAME CONTAINER */#frameContainer{  width:100%;  height:100%;  position:relative;  overflow:hidden;}
/* ✅ KEY FIX: NO 100vw ANYWHERE */#frame{  width:100%;  height:100%;  border:none;  position:absolute;  top:0;  left:0;}</style></head>
<body>
<div class="dashboard">
<!-- SIDEBAR --><div class="sidebar">
<div class="header-area">  <div class="header">WEATHER OPS CENTER</div>  <input class="search-box" id="tabSearch" onkeyup="filterTabs()" placeholder="Search..."></div>
<div class="tabs">
<div class="group-label">Core Operations</div><button class="tab active" onclick="openTab(this,'https://jimegan2025.github.io/index.html','Home')">Home</button><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/command.html','Command')">Command</button><button class="tab" onclick="openTab(this,'https://www.weatherlink.com/embeddablePage/show/d318c2a4245b47fa955bd8f9ed3b22c2/summary','Station Summary')">Station Summary</button>
<div class="group-label">Forecasts</div><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/vizcayawx.html','Lead Forecast')">Lead Forecast</button><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/newspc.html','SPC Forecast')">SPC Forecast</button><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/texasdash','NWS Offices')">NWS Offices</button>
<button class="tab" onclick="openTab(this,'https://www.spc.noaa.gov/products/activity_loop.gif','SPC Activity Loop')">SPC Activity Loop</button><button class="tab" onclick="openTab(this,'https://www.wpc.ncep.noaa.gov/sfc/newnamsfc.gif','WPC NAM Surface Forecast')">WPC NAM Surface Forecast</button>
<button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/nowcast.html','NowCast')">NowCast</button><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/rev_dash.html','Rev Dash')">Alternate Dash</button>
<div class="group-label">Radar & Severe</div><button class="tab" onclick="openTab(this,'https://staticbaronwebapps.velocityweather.com/digitial_wx/widgets/mapv2/index.html?initjson=/digitial_wx/widgets/dcms/26f8a917-6849-45c5-bb15-4fd8e1adb40b/live/init.json#6/30.515/-97.669','Baron Radar')">Baron Radar</button><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/masterrad.html','Master Radar')">Master Radar</button><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/sky.html','NWS Radar')">NWS Radar</button>
<button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/txradar.html','TX Radar')">TX Radar</button><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/risk.html','Risk')">Risk</button><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/alerts.html','Alerts')">Alerts</button>
<div class="group-label">Atmospheric Profile</div><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/newoverhead.html','Overhead')">Overhead</button>
<div class="group-label">Almanac & Records</div><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/almanac.html','Almanac')">Almanac</button><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/annualalmanac.html','Annual Almanac')">Annual Almanac</button>
<div class="group-label">Metrics</div><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/textemps.html','Temps')">Temps</button><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/muggyMeter.html','Muggy Meter')">Muggy Meter</button><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/rainMeter.html','Rain Meter')">Rain Meter</button>
<div class="group-label">Tropical</div><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/tropical.html','Tropical')">Tropical</button><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/region.html','Region')">Region</button><button class="tab" onclick="openTab(this,'https://jimegan2025.github.io/tropicalwatch.html','Tropical Watch')">Tropical Watch</button><button class="tab" onclick="openTab(this,'https://www.nhc.noaa.gov/text/MIATWDAT.shtml','NHC Discussion')">NHC Discussion</button><button class="tab" onclick="openTab(this,'https://www.cpc.ncep.noaa.gov/products/precip/CWlink/ghaz/gth_full.png','Global Tropical Hazards Outlook')">Global Tropical Hazards Outlook</button>
</div></div>
<!-- MAIN --><div class="main">
<div class="topbar">  <div id="title">Home</div>  <div>    <button class="btn" onclick="refresh()">Refresh</button>    <button class="btn" onclick="popOut()">Pop Out</button>  </div></div>
<div class="viewer">  <div id="frameContainer">    <iframe id="frame" src="https://jimegan2025.github.io/index.html"></iframe>    <img id="imgView" style="display:none;width:100%;height:100%;object-fit:contain;background:black;" />  </div></div>
</div></div>
<script>
function isImageUrl(url){  return /\.(png|jpe?g|gif|webp|svg)(\?.*)?$/i.test(url);}
function openTab(el,url,title){  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));  el.classList.add('active');  document.getElementById('title').innerText = title;
  const iframe = document.getElementById('frame');  const img = document.getElementById('imgView');
  if(isImageUrl(url)){    iframe.style.display = 'none';    iframe.src = 'about:blank';    img.style.display = 'block';    img.src = url + (url.includes('?') ? '&' : '?') + 'cachebust=' + Date.now();  } else {    img.style.display = 'none';    img.src = '';    iframe.style.display = 'block';    iframe.src = url;  }}
function refresh(){  const iframe = document.getElementById('frame');  const img = document.getElementById('imgView');  if(img.style.display !== 'none'){    const base = img.src.split('?')[0];    img.src = base + '?cachebust=' + Date.now();  } else {    iframe.src = iframe.src;  }}
function popOut(){  const iframe = document.getElementById('frame');  const img = document.getElementById('imgView');  const url = img.style.display !== 'none' ? img.src : iframe.src;  window.open(url, '_blank');}
function filterTabs(){  let v = document.getElementById('tabSearch').value.toLowerCase();  document.querySelectorAll('.tab').forEach(t=>{    t.style.display = t.innerText.toLowerCase().includes(v) ? 'block' : 'none';  });}
</script>
</body></html>
