<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIZCAYA COMMAND v10.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #05070a; color: #cbd5e1; }
        .sector-card { background: rgba(15, 23, 42, 0.9); border: 1px solid #334155; }
        .sector-nw { border-top: 3px solid #a855f7; }       /* Purple/Northwest */
        .sector-initiation { border-top: 3px solid #6366f1; } /* Blue/West */
        .sector-trigger { border-top: 3px solid #f59e0b; }    /* Orange/Mid */
        .sector-inflow { border-top: 3px solid #10b981; }     /* Green/East */
        .status-breach { background: #991b1b; color: #fee2e2; border: 1px solid #ef4444; animation: pulse 2s infinite; }
        .status-weak { background: #78350f; color: #fef3c7; border: 1px solid #d97706; }
        .status-capped { background: #064e3b; color: #d1fae5; border: 1px solid #059669; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-2 md:p-6 text-xs">

    <div class="max-w-7xl mx-auto">
        <!-- HEADER -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-3xl font-black italic text-white tracking-tighter uppercase italic">Vizcaya<span class="text-red-600 underline">Strategic</span>_v10.1</h1>
                <p class="text-[10px] font-bold text-slate-500 tracking-[0.3em]">Full-Sector Surveillance Grid // Round Rock, TX</p>
            </div>
            <div class="flex gap-4 items-center">
                <div id="engineMode" class="text-[9px] font-bold text-slate-600 uppercase italic">Standby</div>
                <button onclick="runNetworkScan()" class="bg-red-600 hover:bg-red-700 text-white text-xs font-black px-8 py-3 rounded-lg uppercase tracking-widest transition-all shadow-lg">
                    Update All Sectors
                </button>
            </div>
        </div>

        <!-- SENSOR INPUT & SECTOR GRID -->
        <div class="grid grid-cols-1 lg:grid-cols-6 gap-4 mb-8 text-center">
            <!-- DAVIS ANCHOR -->
            <div class="sector-card p-5 rounded-xl border-l-4 border-l-red-600 bg-slate-900/50 lg:col-span-1">
                <label class="block text-[9px] font-black text-red-500 uppercase mb-4 tracking-widest italic">Davis Console</label>
                <div class="space-y-4">
                    <div>
                        <span class="text-[10px] font-bold text-slate-400 block mb-1">TEMP</span>
                        <input type="number" id="localTemp" value="78.0" step="0.1" class="w-full bg-slate-950 border border-slate-700 rounded p-2 text-center text-white font-black text-xl outline-none focus:border-red-500">
                    </div>
                    <div>
                        <span class="text-[10px] font-bold text-blue-400 block mb-1">DEW</span>
                        <input type="number" id="localDew" value="68.5" step="0.1" class="w-full bg-slate-950 border border-slate-700 rounded p-2 text-center text-blue-400 font-black text-xl outline-none focus:border-blue-500">
                    </div>
                </div>
            </div>

            <!-- REGIONAL SECTOR GRID -->
            <div id="sectorGrid" class="lg:col-span-5 grid grid-cols-2 md:grid-cols-4 xl:grid-cols-6 gap-2">
                <!-- Sector cards auto-populated -->
            </div>
        </div>

        <!-- DATA MATRIX -->
        <div class="sector-card rounded-xl overflow-hidden border border-slate-800 shadow-2xl">
            <div class="p-3 bg-slate-900/80 border-b border-slate-800 flex justify-between items-center font-bold">
                <span class="text-[10px] uppercase text-slate-400 italic">Meso-Stability Matrix // NW-Expansion</span>
                <span id="breachAlert" class="text-[10px] uppercase text-orange-500 font-black tracking-tighter italic font-mono">---</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-[9px] font-black uppercase text-slate-500 bg-black/40">
                        <tr>
                            <th class="p-4">Sector Location</th>
                            <th class="p-4 text-center">Model T/D</th>
                            <th class="p-4 text-center text-red-500 italic underline font-black">CAPE</th>
                            <th class="p-4 text-center text-orange-400 italic underline font-black">CIN</th>
                            <th class="p-4 text-center">LI</th>
                            <th class="p-4 text-center text-blue-400">PWAT</th>
                            <th class="p-4">Condition</th>
                        </tr>
                    </thead>
                    <tbody id="regionalBody" class="text-[11px] divide-y divide-slate-800/50 text-slate-400 font-bold font-mono">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const LOCATIONS = [
            // NW SENTINELS (The Frontal Approach)
            { name: "LAMPASAS", lat: 31.0632, lon: -98.1817, sector: "Northwest", local: false },
            { name: "KILLEEN/GRK", lat: 31.0672, lon: -97.8289, sector: "Northwest", local: false },
            { name: "SALADO", lat: 30.9474, lon: -97.5381, sector: "Northwest", local: false },
            // WESTERN INITIATION (The Gun)
            { name: "MASON", lat: 30.7488, lon: -99.2306, sector: "Initiation", local: false },
            { name: "LLANO", lat: 30.7593, lon: -98.6750, sector: "Initiation", local: false },
            { name: "BURNET", lat: 30.7577, lon: -98.2242, sector: "Trigger", local: false },
            { name: "LIBERTY HILL", lat: 30.6644, lon: -97.9228, sector: "Trigger", local: false },
            // CORE
            { name: "VIZCAYA (LOCAL)", lat: 30.5871, lon: -97.6410, sector: "Core", local: true },
            { name: "GEORGETOWN", lat: 30.6333, lon: -97.6775, sector: "Core", local: false },
            // INFLOW (The Fuel)
            { name: "AUSTIN EXEC", lat: 30.3972, lon: -97.5667, sector: "Inflow", local: false },
            { name: "TAYLOR", lat: 30.5708, lon: -97.4094, sector: "Inflow", local: false }
        ];

        const CAPE_DEW_MULT = 0.22;
        const CAPE_TEMP_MULT = 0.12;
        const CIN_DEW_MULT = -28;
        const CIN_TEMP_MULT = -22;

        async function runNetworkScan() {
            const lTemp = parseFloat(document.getElementById('localTemp').value);
            const lDew = parseFloat(document.getElementById('localDew').value);
            const grid = document.getElementById('sectorGrid');
            const tbody = document.getElementById('regionalBody');
            const alertTag = document.getElementById('breachAlert');

            grid.innerHTML = '';
            tbody.innerHTML = '<tr><td colspan="7" class="p-20 text-center animate-pulse text-slate-600 font-black uppercase tracking-[0.5em]">Scanning Regional Grids...</td></tr>';

            const lats = LOCATIONS.map(l => l.lat).join(',');
            const lons = LOCATIONS.map(l => l.lon).join(',');
            
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&hourly=temperature_2m,dew_point_2m,cape,convective_inhibition,total_column_integrated_water_vapour,lifted_index&temperature_unit=fahrenheit&timezone=America%2FChicago&forecast_days=1`);
                const data = await res.json();
                
                tbody.innerHTML = '';
                document.getElementById('engineMode').innerText = "ENGINE: ACTIVE // " + new Date().toLocaleTimeString();

                const now = new Date();
                const hourStr = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().substring(0, 14) + "00";

                LOCATIONS.forEach((loc, idx) => {
                    const locData = Array.isArray(data) ? data[idx].hourly : data.hourly;
                    let hIdx = locData.time.findIndex(t => t.startsWith(hourStr));
                    if (hIdx === -1) hIdx = 0;

                    const mT = locData.temperature_2m[hIdx], mD = locData.dew_point_2m[hIdx];
                    const rawCape = locData.cape[hIdx] || 0, rawCin = Math.abs(locData.convective_inhibition[hIdx] || 0);
                    const rawLi = locData.lifted_index[hIdx] || 0, pwat = (locData.total_column_integrated_water_vapour[hIdx] / 25.4).toFixed(2);

                    let aCape = rawCape, aCin = rawCin, aLi = rawLi;

                    if (loc.local) {
                        const dT = lTemp - mT, dD = lDew - mD;
                        aCape = rawCape * (1 + (dD * CAPE_DEW_MULT) + (dT * CAPE_TEMP_MULT));
                        aCin = Math.max(0, rawCin + (dD * CIN_DEW_MULT) + (dT * CIN_TEMP_MULT));
                        aLi = rawLi - (dD * 0.4);
                        alertTag.innerText = aCin < 20 ? "ALERT: VIZCAYA CAP BREACHED" : `CAP INTENSITY: ${Math.round(aCin)}`;
                    }

                    let cond = "CAPPED", cClass = "status-capped", sectorClass = "sector-trigger";
                    if (loc.sector === "Initiation") sectorClass = "sector-initiation";
                    if (loc.sector === "Inflow") sectorClass = "sector-inflow";
                    if (loc.sector === "Northwest") sectorClass = "sector-nw";

                    if (aCape > 500) {
                        if (aCin < 20) { cond = "BREACH"; cClass = "status-breach"; }
                        else if (aCin < 60) { cond = "WEAKENING"; cClass = "status-weak"; }
                    } else { cond = "STABLE"; cClass = "bg-slate-800 text-slate-500 border border-slate-700"; }

                    grid.innerHTML += `
                        <div class="sector-card p-2 rounded-lg text-center ${sectorClass} ${loc.local ? 'ring-1 ring-white' : ''}">
                            <p class="text-[7px] font-black text-slate-500 uppercase mb-1 tracking-tighter">${loc.name}</p>
                            <p class="text-lg font-black ${cond === 'BREACH' ? 'text-red-500' : 'text-white'}">${Math.round(aCape)}</p>
                            <p class="text-[7px] font-bold text-slate-600 uppercase">CIN: ${Math.round(aCin)}</p>
                        </div>`;

                    tbody.innerHTML += `
                        <tr>
                            <td class="p-4 font-black text-slate-300 ${loc.local ? 'text-blue-400' : ''}">
                                <span class="text-[8px] text-slate-600 uppercase mr-2 opacity-50 font-normal">${loc.sector}</span>${loc.name}
                            </td>
                            <td class="p-4 text-center text-slate-600">${Math.round(mT)}°/${Math.round(mD)}°</td>
                            <td class="p-4 text-center font-black text-lg text-red-500">${Math.round(aCape)}</td>
                            <td class="p-4 text-center font-black text-lg text-orange-400 font-mono">${Math.round(aCin)}</td>
                            <td class="p-4 text-center font-bold text-slate-500 font-mono">${aLi.toFixed(1)}</td>
                            <td class="p-4 text-center font-bold text-blue-500 font-mono">${pwat}"</td>
                            <td class="p-4 text-center"><span class="px-2 py-1 rounded text-[8px] font-black tracking-widest ${cClass}">${cond}</span></td>
                        </tr>`;
                });
            } catch (e) { console.error(e); }
        }

        window.onload = runNetworkScan;
    </script>
</body>
</html>
