<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vizcaya Climate Command</title>
  <style>
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f0f2f5; padding: 30px; color: #1f2937; line-height: 1.5; }
    .container { max-width: 1750px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 30px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    h1 { margin: 0; color: #1e3a8a; font-size: 2.2rem; }
    .table-wrapper { background: white; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 30px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th { background: #1e3a8a; color: white; padding: 18px 10px; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
    td { padding: 16px 10px; border-bottom: 1px solid #e5e7eb; text-align: center; }
    .date-col { font-weight: 700; font-size: 16px; color: #1e3a8a; text-align: left !important; padding-left: 20px; }
    .day-label { font-size: 12px; color: #64748b; display: block; text-transform: uppercase; font-weight: 800; }
    .record-break { background: #fff1f2 !important; border-left: 5px solid #e11d48 !important; }
    .record-text { color: #e11d48; font-weight: 900; font-size: 11px; }
    .temp-hot { color: #b91c1c; font-weight: 800; font-size: 18px; }
    .temp-cold { color: #1d4ed8; font-weight: 800; font-size: 18px; }
    .summary-footer { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); border-left: 10px solid #1e3a8a; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
    .sum-val { font-size: 26px; font-weight: 800; display: block; margin-top: 8px; color: #1e293b; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Vizcaya Climate Command</h1>
    <div id="currentDateTime" style="font-size: 1.1rem; color: #4b5563; margin-top: 10px;"></div>
  </header>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Sky Condition</th>
          <th>Storm Potential</th>
          <th>Cloud %</th>
          <th>Temp (H/L)</th>
          <th>Feels (H/L)</th>
          <th>130yr Records</th>
          <th>Rain (Prob)</th>
          <th>Sun / UV</th>
          <th>Wind/Gust</th>
        </tr>
      </thead>
      <tbody id="forecastBody"></tbody>
    </table>
  </div>

  <div class="summary-footer">
    <div class="summary-grid">
      <div>
        <span style="font-size: 13px; color: #64748b; font-weight: 700;">TOTAL PRECIPITATION</span>
        <span class="sum-val" id="sumRain">--</span>
        <span id="rainVerdict" style="font-size:14px; font-weight:bold;">Next 16 Days Accumulation</span>
      </div>
      <div>
        <span style="font-size: 13px; color: #64748b; font-weight: 700;">TEMPERATURE VARIANCE</span>
        <span class="sum-val" id="sumTemp">--</span>
        <span id="tempVerdict" style="font-size:14px; font-weight:bold;"></span>
      </div>
      <div>
        <span style="font-size: 13px; color: #64748b; font-weight: 700;">HISTORIC ALERTS</span>
        <span class="sum-val" id="recordCount" style="color:#e11d48">0</span>
        <span style="color:#1e3a8a; font-size:13px; font-weight:600;">Record-Breaking Days Expected</span>
      </div>
    </div>
  </div>
</div>

<script>
async function loadDash() {
  const tbody = document.getElementById("forecastBody");
  tbody.innerHTML = `<tr><td colspan="10" style="padding:60px; color:#64748b; text-align:center;">📡 Fetching GFS Models & Almanac Data...</td></tr>`;

  let almanacData = {};

  try {
    const almanacRes = await fetch('https://jimegan2025.github.io/almanac.json');
    almanacData = await almanacRes.json();
  } catch (e) { console.error("Almanac load failed"); }

  try {
    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=30.509747&longitude=-97.692116&daily=temperature_2m_max,temperature_2m_min,apparent_temperature_max,apparent_temperature_min,precipitation_probability_max,rain_sum,wind_speed_10m_max,wind_gusts_10m_max,uv_index_max,sunshine_duration&hourly=cloud_cover,cape,lifted_index&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America/Chicago&forecast_days=16`);
    const weather = await weatherRes.json();

    let s = { rain: 0, tSum: 0, nSum: 0, count: 0, recAlerts: 0 };
    tbody.innerHTML = "";

    weather.daily.time.forEach((i_date, i) => {
      const mmdd = i_date.slice(5);
      const dateObj = new Date(i_date + 'T00:00:00');
      const dayName = dateObj.toLocaleDateString('en-US', { weekday: 'short' });

      // FORCE ALL ALMANAC DATA TO NUMBERS TO AVOID THE -4000 BUG
      const rawH = almanacData[mmdd];
      const h = {
        avgH: rawH ? Number(rawH.avgH) : 75,
        avgL: rawH ? Number(rawH.avgL) : 55,
        recH: rawH ? Number(rawH.recH) : 100,
        recHY: rawH ? rawH.recHY : '?',
        recL: rawH ? Number(rawH.recL) : 32,
        recLY: rawH ? rawH.recLY : '?'
      };

      const tH = weather.daily.temperature_2m_max[i];
      const tL = weather.daily.temperature_2m_min[i];
      const dayStart = i * 24;
      const avgC = Math.round(weather.hourly.cloud_cover.slice(dayStart, dayStart + 24).reduce((a,b) => a + b, 0) / 24);
      const dayCape = Math.max(...weather.hourly.cape.slice(dayStart, dayStart + 24));

      const isRecord = (tH >= h.recH || tL <= h.recL);
      if (isRecord) s.recAlerts++;

      let sky = "☁️ Cloudy";
      if (avgC <= 15) sky = "☀️ Sunny";
      else if (avgC <= 35) sky = "🌤️ Mostly Sunny";
      else if (avgC <= 65) sky = "⛅ Partly Cloudy";
      else if (avgC <= 90) sky = "☁️ Mostly Cloudy";

      const rainInches = (weather.daily.rain_sum[i] || 0) / 25.4;

      const tr = document.createElement("tr");
      if (isRecord) tr.className = "record-break";

      tr.innerHTML = `
        <td class="date-col">
            <span class="day-label">${dayName}</span>${mmdd}
            ${isRecord ? '<div class="record-text">HISTORIC</div>' : ''}
        </td>
        <td style="font-weight:700;">${sky}</td>
        <td>
            <span style="color:${dayCape > 1000 ? '#b91c1c' : '#1e293b'}; font-weight:bold;">
                ${dayCape > 1500 ? 'STORM RISK' : (dayCape > 500 ? 'Unstable' : 'Stable')}
            </span>
        </td>
        <td>${avgC}%</td>
        <td><span class="${tH > 85 ? 'temp-hot' : 'temp-cold'}">${Math.round(tH)}°</span> / <span class="${tL < 45 ? 'temp-cold' : ''}">${Math.round(tL)}°</span></td>
        <td style="font-weight:600">${Math.round(weather.daily.apparent_temperature_max[i])}° / ${Math.round(weather.daily.apparent_temperature_min[i])}°</td>
        <td>
          <div style="color:#b91c1c; font-weight:700;">${h.recH}° <span style="font-size:10px; font-weight:400; color:#64748b;">(${h.recHY})</span></div>
          <div style="color:#1d4ed8; font-weight:700;">${h.recL}° <span style="font-size:10px; font-weight:400; color:#64748b;">(${h.recLY})</span></div>
        </td>
        <td><strong>${rainInches.toFixed(2)}"</strong> (${weather.daily.precipitation_probability_max[i]}%)</td>
        <td>${(weather.daily.sunshine_duration[i]/3600).toFixed(1)}h / <span style="color:#d97706; font-weight:bold;">${weather.daily.uv_index_max[i]} UV</span></td>
        <td>${Math.round(weather.daily.wind_speed_10m_max[i])} <span style="font-size:11px; color:#64748b">G:${Math.round(weather.daily.wind_gusts_10m_max[i])}</span></td>
      `;
      tbody.appendChild(tr);

      // Variance Math
      s.rain += rainInches;
      s.tSum += (tH + tL) / 2;
      s.nSum += (h.avgH + h.avgL) / 2;
      s.count++;
    });

    // Final Summary Block
    document.getElementById("sumRain").innerText = `${s.rain.toFixed(2)}"`;
    document.getElementById("recordCount").innerText = s.recAlerts;

    const variance = (s.tSum - s.nSum) / s.count;
    document.getElementById("sumTemp").innerText = `${variance >= 0 ? '+' : ''}${variance.toFixed(1)}°F`;
    document.getElementById("tempVerdict").innerHTML = `<span style="color:${variance >= 0 ? '#dc2626' : '#2563eb'}">VS 130-Year Local Norm</span>`;

  } catch (err) {
    console.error(err);
    tbody.innerHTML = `<tr><td colspan="10" style="padding:60px; color:#b91c1c; text-align:center;">Failed to connect to forecast API.</td></tr>`;
  }
}

setInterval(() => {
  document.getElementById("currentDateTime").innerText = new Date().toLocaleString('en-US', {timeZone: 'America/Chicago', dateStyle: 'full', timeStyle: 'medium'});
}, 1000);

loadDash();
</script>
</body>
</html>
